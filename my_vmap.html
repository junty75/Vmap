<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 브이월드 지도</title>
<script type="text/javascript" src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=55FD7275-A6F5-3B69-9966-CD4BFA2FD35F"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 상단 헤더 ── */
  #header {
    background: linear-gradient(135deg, #0f3460, #16213e);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    z-index: 100;
  }
  #header h1 {
    font-size: 16px;
    font-weight: 700;
    color: #e94560;
    letter-spacing: 1px;
  }
  #header .subtitle {
    font-size: 11px;
    color: #7ecae3;
    margin-top: 2px;
  }

  /* ── 지도 타입 버튼 ── */
  #maptype-bar {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .mtype-btn {
    padding: 5px 11px;
    border: 1px solid #7ecae3;
    background: transparent;
    color: #7ecae3;
    border-radius: 14px;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .mtype-btn:hover, .mtype-btn.active {
    background: #7ecae3;
    color: #0f3460;
    font-weight: 700;
  }

  /* ── 툴바 패널 ── */
  #toolbar {
    background: #16213e;
    padding: 8px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    border-bottom: 1px solid #0f3460;
    z-index: 99;
  }

  .tool-group {
    display: flex;
    align-items: center;
    gap: 5px;
    padding-right: 12px;
    border-right: 1px solid #2a3a5e;
  }
  .tool-group:last-child { border-right: none; }
  .tool-group label {
    font-size: 10px;
    color: #7ecae3;
    font-weight: 600;
    white-space: nowrap;
  }

  .tool-btn {
    padding: 5px 12px;
    border: none;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 600;
    transition: all .18s;
    white-space: nowrap;
  }
  .btn-marker   { background: #e94560; color: #fff; }
  .btn-marker:hover { background: #c73652; }
  .btn-polygon  { background: #4ade80; color: #0a2000; }
  .btn-polygon:hover { background: #22c55e; }
  .btn-route    { background: #f59e0b; color: #1a0a00; }
  .btn-route:hover { background: #d97706; }
  .btn-clear    { background: #6b7280; color: #fff; }
  .btn-clear:hover { background: #4b5563; }
  .btn-zoom     { background: #0f3460; color: #7ecae3; border: 1px solid #7ecae3; }
  .btn-zoom:hover { background: #1a4a80; }

  /* ── 지도 영역 ── */
  #vmap {
    flex: 1;
    width: 100%;
    min-height: 0;
  }

  /* ── 상태바 ── */
  #statusbar {
    background: #0f1b2e;
    padding: 5px 14px;
    font-size: 11px;
    color: #7ecae3;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #0f3460;
  }
  #coord-display { color: #fbbf24; }
  #mode-display  { color: #4ade80; font-weight: 600; }

  /* ── 안내 토스트 ── */
  #toast {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15,52,96,0.95);
    border: 1px solid #7ecae3;
    color: #e0f4ff;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- 헤더 -->
<div id="header">
  <div>
    <h1>🗺️ 내 브이월드 지도</h1>
    <div class="subtitle">VWorld Open API 2.0 · 전주/전북 중심</div>
  </div>
  <div id="maptype-bar">
    <button class="mtype-btn" onclick="setMapType('GRAPHIC')">일반</button>
    <button class="mtype-btn" onclick="setMapType('GRAPHIC_WHITE')">백지도</button>
    <button class="mtype-btn" onclick="setMapType('GRAPHIC_NIGHT')">야간</button>
    <button class="mtype-btn active" onclick="setMapType('PHOTO')">항공사진</button>
    <button class="mtype-btn" onclick="setMapType('PHOTO_HYBRID')">하이브리드</button>
  </div>
</div>

<!-- 툴바 -->
<div id="toolbar">
  <div class="tool-group">
    <label>📍 마커</label>
    <button class="tool-btn btn-marker" onclick="addPresetMarker()">마커 추가</button>
    <button class="tool-btn btn-marker" onclick="removeAllMarker()" style="background:#7b2233;">마커 삭제</button>
  </div>
  <div class="tool-group">
    <label>🔷 폴리곤</label>
    <button class="tool-btn btn-polygon" onclick="addPolygon()">폴리곤 그리기</button>
    <button class="tool-btn btn-polygon" onclick="clearPolygon()" style="background:#166534;color:#fff;">폴리곤 삭제</button>
  </div>
  <div class="tool-group">
    <label>🛣️ 경로</label>
    <button class="tool-btn btn-route" id="routeBtn" onclick="toggleRoute()">경로 시작</button>
    <button class="tool-btn btn-route" onclick="completeRoute()" style="background:#92400e;color:#fff;">경로 완료</button>
    <button class="tool-btn btn-route" onclick="removeRoute()" style="background:#6b7280;color:#fff;">경로 삭제</button>
  </div>
  <div class="tool-group">
    <label>🔍 이동</label>
    <button class="tool-btn btn-zoom" onclick="moveToJeonju()">전주</button>
    <button class="tool-btn btn-zoom" onclick="moveToSeoul()">서울</button>
    <button class="tool-btn btn-zoom" onclick="moveToBusan()">부산</button>
  </div>
</div>

<!-- 지도 -->
<div id="vmap"></div>

<!-- 상태바 -->
<div id="statusbar">
  <span id="coord-display">지도를 클릭하면 좌표가 표시됩니다</span>
  <span id="mode-display">모드: 일반</span>
</div>

<!-- 안내 토스트 -->
<div id="toast"></div>

<script>
/* ── 초기 위치: 전주 ── */
vw.ol3.CameraPosition.center = [14086424.137257246, 4301029.874526409];
vw.ol3.CameraPosition.zoom = 12;

vw.ol3.MapOptions = {
  basemapType: vw.ol3.BasemapType.PHOTO,
  controlDensity: vw.ol3.DensityType.EMPTY,
  interactionDensity: vw.ol3.DensityType.FULL,
  controlsAutoArrange: true,
  homePosition: vw.ol3.CameraPosition,
  initPosition: vw.ol3.CameraPosition
};

var vmap = new vw.ol3.Map("vmap", vw.ol3.MapOptions);

/* ── 팝업 ── */
var pop = null;

/* ── 마커 레이어 ── */
var markerLayer = null;

/* ── 폴리곤 레이어 ── */
var polygonLayer = null;

/* ── 루트맵 ── */
var routeMap = null;
var routeActive = false;

/* ━━━━━━━━━━━━━━━━━━━━
   지도 클릭 이벤트
━━━━━━━━━━━━━━━━━━━━ */
vmap.on("click", function(evt) {
  var coord = evt.coordinate;

  /* 경위도 변환 표시 */
  try {
    var ll = ol.proj.transform(coord, "EPSG:3857", "EPSG:4326");
    document.getElementById('coord-display').textContent =
      '클릭 좌표 → 경도: ' + ll[0].toFixed(6) + '  위도: ' + ll[1].toFixed(6);
  } catch(e) {}

  /* 경로 모드일 때 좌표 추가 */
  if (routeActive && routeMap != null) {
    routeMap.addRoute("myRoute", "myRoute", "경로 지점", coord);
    showToast("경로 지점이 추가되었습니다.");
    return;
  }

  /* 피처 클릭 감지 → 팝업 */
  var feature = vmap.forEachFeatureAtPixel(evt.pixel, function(f, l) { return f; });
  if (feature) {
    var title   = feature.get('title')   || feature.get('name') || '정보';
    var contents = feature.get('contents') || '클릭한 객체입니다.';
    showPopup(title, contents, coord);
  }
});

/* ━━━━━━━━━━━━━━━━━━━━
   팝업
━━━━━━━━━━━━━━━━━━━━ */
function showPopup(title, content, coord) {
  if (pop == null) {
    pop = new vw.ol3.popup.Popup();
  }
  pop.title   = title;
  pop.content = content;
  vmap.addOverlay(pop);
  pop.show(content, coord);
}

/* ━━━━━━━━━━━━━━━━━━━━
   마커
━━━━━━━━━━━━━━━━━━━━ */
var markerData = [
  {
    x: 127.1470, y: 35.8217, epsg: "EPSG:4326",
    title: "전주 한옥마을",
    contents: "📍 전주 한옥마을<br>전통 한옥과 문화가 살아있는 관광명소입니다.",
    label: "한옥마을"
  },
  {
    x: 127.1536, y: 35.8113, epsg: "EPSG:4326",
    title: "전주 객사",
    contents: "📍 전주 객사<br>조선시대 국왕의 위패를 모시던 관아 건물입니다.",
    label: "전주 객사"
  },
  {
    x: 127.1286, y: 35.8445, epsg: "EPSG:4326",
    title: "전북특별자치도청",
    contents: "📍 전북특별자치도청<br>전북의 행정 중심지입니다.",
    label: "도청"
  }
];

function addPresetMarker() {
  if (markerLayer != null) {
    showToast("마커가 이미 추가되어 있습니다. 먼저 삭제 후 다시 추가하세요.");
    return;
  }
  markerLayer = new vw.ol3.layer.Marker(vmap);
  vmap.addLayer(markerLayer);

  markerData.forEach(function(m) {
    vw.ol3.markerOption = {
      x: m.x, y: m.y, epsg: m.epsg,
      title: m.title,
      contents: m.contents,
      iconUrl: 'https://map.vworld.kr/images/ol3/marker_red.png',
      text: {
        offsetX: 0.5, offsetY: 22,
        font: 'bold 12px Malgun Gothic, sans-serif',
        fill: { color: '#fff' },
        stroke: { color: '#e94560', width: 3 },
        text: m.label
      },
      attr: { id: m.label, name: m.title }
    };
    markerLayer.addMarker(vw.ol3.markerOption);
  });

  showToast("전주 주요 명소 마커 3개가 추가되었습니다.");
}

function removeAllMarker() {
  if (markerLayer != null) {
    vmap.removeLayer(markerLayer);
    markerLayer = null;
    showToast("마커가 모두 삭제되었습니다.");
  } else {
    showToast("삭제할 마커가 없습니다.");
  }
}

/* ━━━━━━━━━━━━━━━━━━━━
   폴리곤 (전주 구도심 영역)
━━━━━━━━━━━━━━━━━━━━ */
function addPolygon() {
  if (polygonLayer != null) {
    showToast("폴리곤이 이미 추가되어 있습니다. 먼저 삭제 후 다시 추가하세요.");
    return;
  }

  /* 전주 한옥마을 주변 영역 (EPSG:3857) */
  var coords = [
    [14144000, 4301500],
    [14144000, 4311000],
    [14152000, 4311000],
    [14152000, 4301500]
  ];

  var feature = new ol.Feature({
    geometry: new ol.geom.Polygon([coords]),
    title: "전주 한옥마을 권역",
    contents: "전주 한옥마을 및 구도심 권역을 나타냅니다."
  });

  feature.setStyle(new ol.style.Style({
    stroke: new ol.style.Stroke({ color: [78, 222, 128, 0.9], width: 3 }),
    fill:   new ol.style.Fill({ color: [78, 222, 128, 0.15] })
  }));

  polygonLayer = new ol.layer.Vector({
    source: new ol.source.Vector({ features: [feature] })
  });

  vmap.addLayer(polygonLayer);
  showToast("전주 권역 폴리곤이 추가되었습니다. 폴리곤을 클릭해보세요!");
}

function clearPolygon() {
  if (polygonLayer != null) {
    vmap.removeLayer(polygonLayer);
    polygonLayer = null;
    showToast("폴리곤이 삭제되었습니다.");
  } else {
    showToast("삭제할 폴리곤이 없습니다.");
  }
}

/* ━━━━━━━━━━━━━━━━━━━━
   경로(루트맵)
━━━━━━━━━━━━━━━━━━━━ */
function toggleRoute() {
  if (routeMap == null) {
    routeMap = new vw.ol3.control.RouteMap(
      vmap, "myRoute", null,
      "https://map.vworld.kr/images/maps/marker.png"
    );
    routeMap.setFunction(function(evt) {
      var coord = routeMap.coordinate_;
      if (coord) {
        routeMap.addRoute("myRoute", "myRoute", "경로 지점", coord);
      }
    });
  }

  if (!routeActive) {
    routeMap.start();
    routeActive = true;
    document.getElementById('routeBtn').textContent = '경로 중지';
    document.getElementById('routeBtn').style.background = '#dc2626';
    document.getElementById('mode-display').textContent = '모드: 경로 입력 중 🛣️';
    showToast("지도를 클릭하여 경로 지점을 추가하세요.");
  } else {
    routeMap.stop();
    routeActive = false;
    document.getElementById('routeBtn').textContent = '경로 시작';
    document.getElementById('routeBtn').style.background = '#f59e0b';
    document.getElementById('mode-display').textContent = '모드: 일반';
    showToast("경로 입력이 일시 중지되었습니다.");
  }
}

function completeRoute() {
  if (routeMap != null && routeActive) {
    routeMap.stop();
    routeActive = false;
    document.getElementById('routeBtn').textContent = '경로 시작';
    document.getElementById('routeBtn').style.background = '#f59e0b';
    document.getElementById('mode-display').textContent = '모드: 일반';
    showToast("경로 입력이 완료되었습니다.");
  } else {
    showToast("입력 중인 경로가 없습니다.");
  }
}

function removeRoute() {
  if (routeMap != null) {
    try { routeMap.stop(); } catch(e) {}
    try { routeMap.removeRouteMap("myRoute"); } catch(e) {}
    routeMap = null;
    routeActive = false;
    document.getElementById('routeBtn').textContent = '경로 시작';
    document.getElementById('routeBtn').style.background = '#f59e0b';
    document.getElementById('mode-display').textContent = '모드: 일반';
    showToast("경로가 삭제되었습니다.");
  } else {
    showToast("삭제할 경로가 없습니다.");
  }
}

/* ━━━━━━━━━━━━━━━━━━━━
   지도 타입 변경
━━━━━━━━━━━━━━━━━━━━ */
function setMapType(type) {
  vmap.setBasemapType(vw.ol3.BasemapType[type]);
  document.querySelectorAll('.mtype-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
}

/* ━━━━━━━━━━━━━━━━━━━━
   위치 이동
━━━━━━━━━━━━━━━━━━━━ */
function moveToJeonju() {
  vmap.getView().setCenter([14086424.137257246, 4301029.874526409]);
  vmap.getView().setZoom(12);
  showToast("전주로 이동합니다.");
}
function moveToSeoul() {
  vmap.getView().setCenter([14135087.165466234, 4518348.216242027]);
  vmap.getView().setZoom(12);
  showToast("서울로 이동합니다.");
}
function moveToBusan() {
  vmap.getView().setCenter([14368621.862591665, 4188437.443236093]);
  vmap.getView().setZoom(12);
  showToast("부산으로 이동합니다.");
}

/* ━━━━━━━━━━━━━━━━━━━━
   토스트 메시지
━━━━━━━━━━━━━━━━━━━━ */
var toastTimer = null;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 2800);
}
</script>
</body>
</html>
