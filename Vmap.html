<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KMZ & мӮ¬м§„ м§ҖлҸ„ (VWorld)</title>
<script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=55FD7275-A6F5-3B69-9966-CD4BFA2FD35F"></script>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
html,body{height:100%;margin:0;overflow:hidden;font-family:'л§‘мқҖ кі л”•',sans-serif;}
#vmap{width:100%;height:100%;position:absolute;top:0;left:0;}
#search-form{position:absolute;top:10px;left:10px;z-index:2000;background:#fff;padding:5px;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;gap:5px;}
#address-display{position:absolute;top:10px;left:260px;z-index:2000;background:rgba(0,0,0,.6);color:#fff;font-size:12px;padding:6px 10px;border-radius:5px;cursor:pointer;white-space:nowrap;max-width:440px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.3);}
#address-display:hover{background:rgba(0,0,0,.82);}
.controls{position:absolute;top:10px;right:10px;z-index:2000;display:flex;gap:5px;flex-wrap:wrap;max-width:700px;background:#fff;padding:6px 8px;border-radius:5px;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.controls button,.controls select,.controls input{padding:4px 7px;font-size:12px;font-family:inherit;border:1px solid #ccc;border-radius:4px;cursor:pointer;}
#polyMenu{display:none;position:fixed;z-index:9999;background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);min-width:140px;overflow:hidden;}
#polyMenu.show{display:block;}
#polyMenu button{display:block;width:100%;padding:12px 18px;border:none;background:none;text-align:left;font-size:14px;cursor:pointer;font-family:inherit;}
#polyMenu button:hover{background:#f1f3f4;}
#polyMenu .danger{color:#e53935;}
.mpopup{background:#fff;padding:8px 10px;border-radius:7px;box-shadow:0 3px 12px rgba(0,0,0,.4);min-width:170px;font-size:13px;font-family:'л§‘мқҖ кі л”•',sans-serif;position:relative;}
.mpopup .head{display:flex;justify-content:space-between;align-items:center;font-weight:bold;margin-bottom:5px;gap:8px;}
.mpopup .head button{border:none;background:none;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.mpopup .pimg{max-height:450px;max-width:420px;display:block;margin-top:4px;object-fit:contain;cursor:pointer;}
.mpopup .brow{display:flex;gap:5px;margin-top:6px;}
.mpopup .brow button{flex:1;padding:4px 0;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-family:inherit;}
.mpopup .brow button:hover{background:#e0e0e0;}
.mpopup .inp{width:100%;box-sizing:border-box;padding:4px;font-size:13px;border:1px solid #ccc;border-radius:4px;font-family:inherit;margin-bottom:5px;}
.dist-tip{background:#fff;border:1px solid #db4040;border-radius:3px;padding:3px 7px;font-size:12px;white-space:nowrap;pointer-events:none;}
.draw-mode,.draw-mode *{cursor:crosshair !important;}
#cadastralBtn.active{background:#e8f5e9;border-color:#43a047;color:#2e7d32;font-weight:bold;}
</style>
</head>
<body>

<form id="search-form">
  <input id="addr-input" type="text" placeholder="мЈјмҶҢ кІҖмғү" style="width:175px;padding:4px;">
  <button type="submit">кІҖмғү</button>
</form>

<div id="address-display" onclick="copyAndMark()">мЈјмҶҢ м—ҶмқҢ</div>

<div id="polyMenu">
  <button id="polyEditBtn">вңҸпёҸ мҲҳм •</button>
  <button id="polyDeleteBtn" class="danger">рҹ—‘пёҸ мӮӯм ң</button>
  <button id="polyMenuCancelBtn">вң• м·ЁмҶҢ</button>
</div>

<!-- вҳ… мҲҳм •1: нҲҙл°” мһ¬кө¬м„ұ -->
<div class="controls">
  <input id="latlng-box" readonly style="width:220px;" title="нҒҙлҰӯн•ҳм—¬ ліөмӮ¬" onclick="copyLL(this)">
  <button onclick="openHelp()" title="лҸ„мӣҖл§җ (F1)">вқ“ лҸ„мӣҖл§җ</button>
  <button id="drawBtn" onclick="toggleDraw()">м„  к·ёлҰ¬кё°(Alt)</button>
  <button onclick="resetLines()">м„  мҙҲкё°нҷ”</button>
  <button onclick="resetAll()">нҷ”л©ҙ мҙҲкё°нҷ”</button>
  <select id="exportFmt" onchange="onFmtChange(this.value)">
    <option value="kmz">KMZ лӮҙліҙлӮҙкё°</option>
    <option value="gpx">GPX лӮҙліҙлӮҙкё°</option>
    <option value="csv">CSV лӮҙліҙлӮҙкё°</option>
    <option value="photos">рҹ“ё мӮ¬м§„ лӢӨмҡҙлЎңл“ң</option>
  </select>
  <select id="exportArea">
    <option value="all">м „мІҙ мҳҒм—ӯ</option>
    <option value="visible">нҳ„мһ¬ мҳҒм—ӯ</option>
  </select>
  <select id="photoQuality">
    <option value="200">200KBвҶ“</option>
    <option value="300">300KBвҶ“</option>
    <option value="500" selected>500KBвҶ“</option>
    <option value="800">800KBвҶ“</option>
    <option value="1024">1MBвҶ“</option>
    <option value="0">мӣҗліё</option>
  </select>
  <button onclick="doExport()">рҹ’ҫ м ҖмһҘ</button>
  <br>
  <select id="mapType" onchange="chgMapType(this.value)" style="margin-top:4px;">
    <option value="GRAPHIC">мқјл°ҳм§ҖлҸ„</option>
    <option value="GRAPHIC_WHITE">л°ұм§ҖлҸ„</option>
    <option value="GRAPHIC_NIGHT">м•јк°„м§ҖлҸ„</option>
    <option value="PHOTO">н•ӯкіөмӮ¬м§„</option>
    <option value="PHOTO_HYBRID" selected>н•ҳмқҙлёҢлҰ¬л“ң</option>
  </select>
  <button id="cadastralBtn" onclick="toggleCadastral()" title="м§Җм ҒлҸ„ мјңкё°/лҒ„кё°" style="margin-top:4px;">рҹ—әпёҸ м§Җм ҒлҸ„</button>
</div>

<div id="vmap"></div>

<script>
'use strict';

let vmap=null,markers=[],polylines=[],drawing=false,drawCoords=[],drawLayer=null;
let guideLine=null,distOv=null,distEl=null;
let movingMk=null,inputOv=null,locCount=0;
let translateInteraction=null,isDraggingMk=false,vp=null;
let lastCX=0,lastCY=0,polyTarget=null;
let lastAddr='мЈјмҶҢ м—ҶмқҢ',lastLL=null;
let searchMarker=null;

const VWORLD_KEY='55FD7275-A6F5-3B69-9966-CD4BFA2FD35F';

function initMap(lat,lng){
  vw.ol3.CameraPosition.center=ol.proj.transform([lng,lat],'EPSG:4326','EPSG:3857');
  vw.ol3.CameraPosition.zoom=14;
  vw.ol3.MapOptions={basemapType:vw.ol3.BasemapType.PHOTO_HYBRID,controlDensity:vw.ol3.DensityType.EMPTY,interactionDensity:vw.ol3.DensityType.FULL,controlsAutoArrange:true,homePosition:vw.ol3.CameraPosition,initPosition:vw.ol3.CameraPosition};
  vmap=new vw.ol3.Map('vmap',vw.ol3.MapOptions);
  vmap.on('click',mapClick);
  vmap.on('pointermove',mapMove);
  vmap.getViewport().addEventListener('contextmenu',mapRightClick);
  vmap.getInteractions().forEach(i=>{if(i instanceof ol.interaction.DoubleClickZoom)i.setActive(false);});
  let holdTimer=null,holdTarget=null,holdStartX=0,holdStartY=0;
  vp=vmap.getViewport();
  vp.addEventListener('pointerdown',e=>{
    if(e.button!==0||drawing||movingMk)return;
    const px=vmap.getEventPixel(e);let target=null;
    vmap.forEachFeatureAtPixel(px,feat=>{if(target)return;const m=markers.find(mk=>mk.feat===feat);if(m)target=m;},{hitTolerance:16});
    if(!target)return;
    holdTarget=target;holdStartX=e.clientX;holdStartY=e.clientY;
    vp.setPointerCapture(e.pointerId);
    holdTimer=setTimeout(()=>{
      if(!holdTarget)return;
      const m=holdTarget;holdTarget=null;holdTimer=null;
      if(m.ov){vmap.removeOverlay(m.ov);m.ov=null;}
      vmap.getInteractions().forEach(i=>{if(i instanceof ol.interaction.DragPan)i.setActive(false);});
      movingMk=m;isDraggingMk=true;document.body.style.cursor='move';
    },1000);
  });
  vp.addEventListener('pointermove',e=>{
    if(holdTimer&&Math.hypot(e.clientX-holdStartX,e.clientY-holdStartY)>5){clearTimeout(holdTimer);holdTimer=null;holdTarget=null;try{vp.releasePointerCapture(e.pointerId);}catch(_){}}
    if(movingMk){const rect=vp.getBoundingClientRect();const pixel=[(e.clientX-rect.left)*(vp.offsetWidth/rect.width),(e.clientY-rect.top)*(vp.offsetHeight/rect.height)];const coord=vmap.getCoordinateFromPixel(pixel);if(coord)movingMk.feat.getGeometry().setCoordinates(coord);}
  });
  vp.addEventListener('pointerup',e=>{try{vp.releasePointerCapture(e.pointerId);}catch(_){}if(holdTimer){clearTimeout(holdTimer);holdTimer=null;holdTarget=null;return;}if(movingMk&&isDraggingMk)endMoveMode();});
  vp.addEventListener('pointercancel',e=>{try{vp.releasePointerCapture(e.pointerId);}catch(_){}if(holdTimer){clearTimeout(holdTimer);holdTimer=null;holdTarget=null;}if(movingMk&&isDraggingMk)endMoveMode();});
}

function endMoveMode(){if(translateInteraction){vmap.removeInteraction(translateInteraction);translateInteraction=null;}movingMk=null;isDraggingMk=false;document.body.style.cursor='';vmap.getInteractions().forEach(i=>{if(i instanceof ol.interaction.DragPan)i.setActive(true);});}
function restoreDragPan(){endMoveMode();}

window.onload=()=>{
  if(!navigator.geolocation){initMap(35.8242,127.1480);return;}
  navigator.geolocation.getCurrentPosition(p=>initMap(p.coords.latitude,p.coords.longitude),()=>initMap(35.8242,127.1480),{timeout:5000,maximumAge:60000});
};

function chgMapType(t){if(vmap)vmap.setBasemapType(vw.ol3.BasemapType[t]);}

/* вҳ… мҲҳм •2: м§Җм ҒлҸ„ - ol.source.TileWMS + KEYлҘј paramsм—җ нҸ¬н•Ё */
let cadastralLayer=null;
function toggleCadastral(){
  const btn=document.getElementById('cadastralBtn');
  if(cadastralLayer){
    vmap.removeLayer(cadastralLayer);cadastralLayer=null;
    btn.classList.remove('active');btn.textContent='рҹ—әпёҸ м§Җм ҒлҸ„';
  } else {
    cadastralLayer=new ol.layer.Tile({
      source:new ol.source.TileWMS({
        url:'https://api.vworld.kr/req/wms',
        params:{KEY:VWORLD_KEY,LAYERS:'lt_c_landinfobasemap',STYLES:'lt_c_landinfobasemap',FORMAT:'image/png',TRANSPARENT:'TRUE',VERSION:'1.3.0',TILESIZE:'256'},
        crossOrigin:'anonymous'
      }),
      opacity:0.8,zIndex:9999
    });
    vmap.addLayer(cadastralLayer);
    btn.classList.add('active');btn.textContent='рҹ—әпёҸ м§Җм ҒлҸ„ ON';
  }
}

function addLyr(lyr){vmap.addLayer(lyr);}
function removeLyr(lyr){try{vmap.removeLayer(lyr);}catch(e){}}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb='_jsonp_'+Date.now()+'_'+Math.random().toString(36).slice(2);
    window[cb]=data=>{delete window[cb];script.remove();resolve(data);};
    const fullUrl=url+(url.includes('?')?'&':'?')+'callback='+cb;
    const script=document.createElement('script');script.src=fullUrl;
    script.onerror=()=>{delete window[cb];script.remove();reject(new Error('JSONP мӢӨнҢЁ'));};
    document.body.appendChild(script);
    setTimeout(()=>{if(window[cb]){delete window[cb];script.remove();reject(new Error('нғҖмһ„м•„мӣғ'));}},8000);
  });
}

/* вҳ… мҲҳм •3: лҸ„лЎңлӘ… лҸҷмқҙлҰ„(кҙ„нҳё) м ңкұ° */
async function reverseGeocode(lng,lat,cb){
  const url=`https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${lng},${lat}&type=both&zipcode=true&simple=false&format=json&key=${VWORLD_KEY}`;
  try{
    const d=await jsonp(url);
    if(d?.response?.status==='OK'&&d.response.result?.length){
      const res=d.response.result;
      let parcel='',road='';
      for(const r of res){if(r.type==='parcel')parcel=r.text||'';else if(r.type==='road')road=r.text||'';}
      if(!parcel&&!road){parcel=res[0]?.text||'';road=res[1]?.text||'';}
      if(road){
        road=road.replace(/\s*\([^)]*\)/g,'').trim(); // вҳ… (лҸҷмқҙлҰ„) м ңкұ°
        const parts=road.split(' ');
        if(parts.length>1)road=parts.slice(1).join(' ');
      }
      cb((parcel&&road)?`${parcel} / ${road}`:(parcel||road||'мЈјмҶҢ м—ҶмқҢ'));return;
    }
  }catch(e){}
  cb('мЈјмҶҢ м—ҶмқҢ');
}

async function geocodeExact(address,type){
  const url=`https://api.vworld.kr/req/address?service=address&request=getcoord&version=2.0&crs=epsg:4326&address=${encodeURIComponent(address)}&format=json&type=${type}&key=${VWORLD_KEY}`;
  try{const d=await jsonp(url);if(d?.response?.status==='OK'&&d.response.result?.point)return{lng:parseFloat(d.response.result.point.x),lat:parseFloat(d.response.result.point.y)};}catch(e){}
  return null;
}
async function searchAddress(query){
  for(const category of['parcel','road']){
    const url=`https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=5&page=1&query=${encodeURIComponent(query)}&type=address&category=${category}&format=json&errorformat=json&key=${VWORLD_KEY}`;
    try{const d=await jsonp(url);const item=d?.response?.result?.items?.[0];if(item)return{lng:parseFloat(item.point.x),lat:parseFloat(item.point.y)};}catch(e){}
  }
  try{const url=`https://api.vworld.kr/req/search?service=search&request=search&version=2.0&crs=EPSG:4326&size=5&page=1&query=${encodeURIComponent(query)}&type=place&format=json&errorformat=json&key=${VWORLD_KEY}`;const d=await jsonp(url);const item=d?.response?.result?.items?.[0];if(item)return{lng:parseFloat(item.point.x),lat:parseFloat(item.point.y)};}catch(e){}
  return null;
}

document.getElementById('search-form').addEventListener('submit',async e=>{
  e.preventDefault();const q=document.getElementById('addr-input').value.trim();if(!q||!vmap)return;
  let result=await geocodeExact(q,'parcel');if(!result)result=await geocodeExact(q,'road');if(!result)result=await searchAddress(q);
  if(!result){alert('мЈјмҶҢлҘј м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ.');return;}
  const coord=toMerc(result.lng,result.lat);vmap.getView().setCenter(coord);vmap.getView().setZoom(17);
  if(searchMarker){vmap.removeLayer(searchMarker.lyr);searchMarker=null;}
  const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});
  feat.setStyle(new ol.style.Style({image:new ol.style.Icon({src:'https://map.vworld.kr/images/ol3/marker_blue.png',anchor:[0.5,1],scale:1.1})}));
  const lyr=new ol.layer.Vector({source:new ol.source.Vector({features:[feat]}),zIndex:100});
  vmap.addLayer(lyr);searchMarker={feat,lyr};
});

function mapClick(evt){
  if(inputOv)closeInputOv();
  if(drawing){drawCoords.push(evt.coordinate);refreshDraw();return;}
  let hit=false;
  vmap.forEachFeatureAtPixel(evt.pixel,feat=>{if(hit)return;const m=markers.find(mk=>mk.feat===feat);if(m){hit=true;openPopup(m);}},{hitTolerance:16});
  if(hit)return;
  closeAllPopups();
  const ll=fromMerc(evt.coordinate);lastLL=ll;
  document.getElementById('latlng-box').value=`${ll[1].toFixed(6)}, ${ll[0].toFixed(6)}`;
  document.getElementById('address-display').innerText='мЈјмҶҢ мЎ°нҡҢ мӨ‘вҖҰ';
  reverseGeocode(ll[0],ll[1],addr=>{lastAddr=addr;document.getElementById('address-display').innerText=addr;});
}
function mapMove(evt){if(!drawing||!drawCoords.length){clearGuide();return;}updateGuide(drawCoords[drawCoords.length-1],evt.coordinate);}
document.addEventListener('mousemove',e=>{lastCX=e.clientX;lastCY=e.clientY;},{passive:true});

function mapRightClick(e){
  e.preventDefault();if(!vmap)return;
  const px=vmap.getEventPixel(e);const coord=vmap.getCoordinateFromPixel(px);
  if(drawing){endDraw();return;}
  if(searchMarker){const hit=vmap.forEachFeatureAtPixel(px,feat=>feat===searchMarker.feat,{hitTolerance:14});if(hit){vmap.removeLayer(searchMarker.lyr);searchMarker=null;return;}}
  let hitMk=false;
  vmap.forEachFeatureAtPixel(px,feat=>{if(hitMk)return;const m=markers.find(mk=>mk.feat===feat);if(m){hitMk=true;showEditInput(m);}},{hitTolerance:16});
  if(hitMk)return;
  const nearPoly=findNearPoly(px,10);
  if(nearPoly){showPolyMenu(lastCX||e.clientX,lastCY||e.clientY,nearPoly);return;}
  showMarkerInput(coord);
}

function toggleDraw(){drawing?endDraw():startDraw();}
function startDraw(){if(drawing)return;drawing=true;drawCoords=[];drawLayer=mkLineLyr([],'#FF0000',3);addLyr(drawLayer);document.getElementById('vmap').classList.add('draw-mode');document.getElementById('drawBtn').textContent='м„  к·ёлҰ¬кё° мӨ‘м§Җ';}
function endDraw(){if(!drawing)return;drawing=false;clearGuide();document.getElementById('vmap').classList.remove('draw-mode');document.getElementById('drawBtn').textContent='м„  к·ёлҰ¬кё°(Alt)';if(drawCoords.length>=2&&drawLayer)polylines.push(drawLayer);else if(drawLayer)removeLyr(drawLayer);drawLayer=null;drawCoords=[];}
function refreshDraw(){if(!drawLayer||drawCoords.length<2)return;const src=drawLayer.getSource();src.clear();const f=new ol.Feature(new ol.geom.LineString(drawCoords));f.setStyle(lineSt('#FF0000',3));src.addFeature(f);drawLayer._coords=drawCoords.slice();}

function lineSt(color,width){return new ol.style.Style({stroke:new ol.style.Stroke({color,width})});}
function mkLineLyr(coords,color,width){const src=new ol.source.Vector();if(coords.length>=2){const f=new ol.Feature(new ol.geom.LineString(coords));f.setStyle(lineSt(color,width));src.addFeature(f);}const lyr=new ol.layer.Vector({source:src,zIndex:100});lyr._color=color;lyr._coords=coords.slice();return lyr;}
function getCoords(lyr){const fs=lyr.getSource().getFeatures();return fs.length?fs[0].getGeometry().getCoordinates():(lyr._coords||[]);}

function updateGuide(from,to){
  if(guideLine){removeLyr(guideLine);guideLine=null;}
  guideLine=mkLineLyr([from,to],'#FF6666',1.5);addLyr(guideLine);
  const all=[...drawCoords,to];let dist=0;
  for(let i=1;i<all.length;i++)dist+=haversine(all[i-1],all[i]);
  const fmt=d=>d<1000?`${d.toFixed(1)}m`:`${(d/1000).toFixed(2)}km`;
  if(!distEl){distEl=document.createElement('div');distEl.className='dist-tip';}
  distEl.textContent=`мҙқкұ°лҰ¬ ${fmt(dist)}`;
  if(!distOv){distOv=new ol.Overlay({element:distEl,offset:[8,-18],positioning:'bottom-left'});vmap.addOverlay(distOv);}
  distOv.setPosition(to);
}
function clearGuide(){if(guideLine){removeLyr(guideLine);guideLine=null;}if(distOv){vmap.removeOverlay(distOv);distOv=null;}distEl=null;}
function haversine(c1,c2){const[lo1,la1]=fromMerc(c1),[lo2,la2]=fromMerc(c2);const R=6371000,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}

function findNearPoly(pixel,thr){let near=null,minD=Infinity;polylines.forEach(lyr=>{const cs=getCoords(lyr);for(let i=0;i<cs.length-1;i++){const a=vmap.getPixelFromCoordinate(cs[i]);const b=vmap.getPixelFromCoordinate(cs[i+1]);if(!a||!b)continue;const d=ptSegDist(pixel,a,b);if(d<minD){minD=d;near=lyr;}}});return minD<=thr?near:null;}
function ptSegDist(p,a,b){const dx=b[0]-a[0],dy=b[1]-a[1];if(!dx&&!dy)return Math.hypot(p[0]-a[0],p[1]-a[1]);const t=Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));return Math.hypot(p[0]-(a[0]+t*dx),p[1]-(a[1]+t*dy));}

function showPolyMenu(x,y,lyr){polyTarget=lyr;const m=document.getElementById('polyMenu');m.style.left=Math.min(x,innerWidth-160)+'px';m.style.top=Math.min(y,innerHeight-120)+'px';m.classList.add('show');}
function hidePolyMenu(){document.getElementById('polyMenu').classList.remove('show');polyTarget=null;}
document.addEventListener('click',e=>{if(!document.getElementById('polyMenu').contains(e.target))hidePolyMenu();});
document.getElementById('polyMenuCancelBtn').onclick=hidePolyMenu;
document.getElementById('polyDeleteBtn').onclick=()=>{if(!polyTarget)return;removeLyr(polyTarget);polylines=polylines.filter(p=>p!==polyTarget);hidePolyMenu();};
document.getElementById('polyEditBtn').onclick=()=>{if(!polyTarget)return;const lyr=polyTarget;hidePolyMenu();if(drawing)endDraw();const coords=getCoords(lyr);removeLyr(lyr);polylines=polylines.filter(p=>p!==lyr);drawing=true;drawCoords=coords.slice();drawLayer=mkLineLyr(drawCoords,'#FF0000',3);addLyr(drawLayer);document.getElementById('vmap').classList.add('draw-mode');document.getElementById('drawBtn').textContent='м„  к·ёлҰ¬кё° мӨ‘м§Җ';};

document.addEventListener('keydown',e=>{
  if(e.key==='F1'){e.preventDefault();openHelp();return;}
  if(e.key==='Escape'){if(movingMk){isDraggingMk=false;movingMk=null;document.body.style.cursor='';restoreDragPan();e.preventDefault();return;}if(inputOv){closeInputOv();e.preventDefault();return;}}
  if(e.altKey){e.preventDefault();toggleDraw();return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();doExport();return;}
  if(e.ctrlKey&&e.key.toLowerCase()==='c'&&!getSelection().toString()){e.preventDefault();copyAndMark();return;}
  if(drawing&&(e.key==='Backspace'||e.key==='Escape'||(e.ctrlKey&&e.key==='z'))){e.preventDefault();drawCoords.pop();refreshDraw();if(!drawCoords.length)clearGuide();}
});

function mkNormalStyle(){return new ol.style.Style({image:new ol.style.Circle({radius:8,fill:new ol.style.Fill({color:'#e53935'}),stroke:new ol.style.Stroke({color:'white',width:1.5})})});}
function mkPhotoStyle(){return new ol.style.Style({image:new ol.style.Circle({radius:8,fill:new ol.style.Fill({color:'#1565C0'}),stroke:new ol.style.Stroke({color:'white',width:1.5})})});}

function addMarker(coord,name,addr){const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});feat.setStyle(mkNormalStyle());const lyr=new ol.layer.Vector({source:new ol.source.Vector({features:[feat]}),zIndex:100});addLyr(lyr);const obj={feat,lyr,ov:null,name,addr:addr||'',isPhoto:false,imgSrc:null};markers.push(obj);return obj;}
function addPhotoMarker(coord,imgSrc,name){const feat=new ol.Feature({geometry:new ol.geom.Point(coord)});feat.setStyle(mkPhotoStyle());const lyr=new ol.layer.Vector({source:new ol.source.Vector({features:[feat]}),zIndex:100});addLyr(lyr);const obj={feat,lyr,ov:null,name,addr:'',isPhoto:true,imgSrc};markers.push(obj);return obj;}

function openPopup(m){closeAllPopups();const el=m.isPhoto?makePhotoEl(m):makeTextEl(m);const ov=new ol.Overlay({element:el,positioning:'bottom-center',offset:[0,-50],stopEvent:true,autoPan:false});vmap.addOverlay(ov);ov.setPosition(m.feat.getGeometry().getCoordinates());m.ov=ov;}
function makeTextEl(m){const d=document.createElement('div');d.className='mpopup';d.innerHTML=`<div class="head"><span>${esc(m.name)}</span><button onclick="closePop(this)">вң–</button></div>`;d.addEventListener('mousedown',e=>e.stopPropagation());return d;}
function makePhotoEl(m){const d=document.createElement('div');d.className='mpopup';d.innerHTML=`<div class="head"><span>${esc(m.name)}</span><span style="display:flex;gap:3px;"><button onclick="dlPhoto(this)" title="лӢӨмҡҙлЎңл“ң">рҹ’ҫ</button><button onclick="closePop(this)">вң–</button></span></div><img class="pimg" src="${m.imgSrc}" draggable="false">`;d.addEventListener('mousedown',e=>e.stopPropagation());return d;}
function closePop(btn){const el=btn.closest('.mpopup');const m=markers.find(x=>x.ov&&x.ov.getElement()===el);if(m){vmap.removeOverlay(m.ov);m.ov=null;}}
function dlPhoto(btn){const el=btn.closest('.mpopup');const m=markers.find(x=>x.ov&&x.ov.getElement()===el);if(!m)return;const ll=fromMerc(m.feat.getGeometry().getCoordinates());downloadPhotoWithGPS(m.imgSrc,m.name,ll[1],ll[0]);}
function closeAllPopups(){markers.forEach(m=>{if(m.ov){vmap.removeOverlay(m.ov);m.ov=null;}});}

function showMarkerInput(coord){closeInputOv();const el=buildInput('','л§Ҳм»Ө мқҙлҰ„ мһ…л Ҙ','м¶”к°Җ','м·ЁмҶҢ');inputOv=new ol.Overlay({element:el,positioning:'bottom-center',offset:[0,-12],stopEvent:true});vmap.addOverlay(inputOv);inputOv.setPosition(coord);const inp=el.querySelector('.inp');setTimeout(()=>inp.focus(),30);el.querySelector('.ok').onclick=()=>{addMarker(coord,inp.value.trim()||'м„ӨлӘ… м—ҶмқҢ','');closeInputOv();};el.querySelector('.cancel').onclick=closeInputOv;inp.onkeydown=e=>{if(e.key==='Enter')el.querySelector('.ok').click();};}
function showEditInput(m){closeInputOv();const coord=m.feat.getGeometry().getCoordinates();const el=buildInput(m.name,'','мҲҳм •','мӮӯм ң');inputOv=new ol.Overlay({element:el,positioning:'bottom-center',offset:[0,-12],stopEvent:true});vmap.addOverlay(inputOv);inputOv.setPosition(coord);const inp=el.querySelector('.inp');setTimeout(()=>{inp.focus();inp.select();},30);el.querySelector('.ok').onclick=()=>{m.name=inp.value.trim()||'м„ӨлӘ… м—ҶмқҢ';if(m.ov){vmap.removeOverlay(m.ov);m.ov=null;}closeInputOv();};el.querySelector('.cancel').onclick=()=>{removeLyr(m.lyr);if(m.ov)vmap.removeOverlay(m.ov);markers=markers.filter(x=>x!==m);closeInputOv();};inp.onkeydown=e=>{if(e.key==='Enter')el.querySelector('.ok').click();};}
function buildInput(value,placeholder,okTxt,cancelTxt){const d=document.createElement('div');d.className='mpopup';d.style.minWidth='195px';d.innerHTML=`<input class="inp" type="text" value="${esc(value)}" placeholder="${esc(placeholder)}" lang="ko" autocomplete="off"><div class="brow" style="margin-top:5px;"><button class="ok">${okTxt}</button><button class="cancel" style="color:#e53935;">${cancelTxt}</button></div>`;d.addEventListener('mousedown',e=>e.stopPropagation());return d;}
function closeInputOv(){if(inputOv){vmap.removeOverlay(inputOv);inputOv=null;}}

function copyLL(el){if(el.value)navigator.clipboard.writeText(el.value).catch(()=>{});}
function copyAndMark(){const val=document.getElementById('latlng-box').value;if(!val)return;const[latS,lngS]=val.split(',');const lat=parseFloat(latS),lng=parseFloat(lngS);if(isNaN(lat)||isNaN(lng))return;navigator.clipboard.writeText(`${lat}\t${lng}\t${lastAddr}`).catch(()=>{});locCount++;const m=addMarker(toMerc(lng,lat),String(locCount),lastAddr);openPopup(m);const el=document.getElementById('address-display');const prev=el.innerText;el.innerText='вң… ліөмӮ¬лҗЁ';setTimeout(()=>el.innerText=prev,1300);}

function resetLines(){polylines.forEach(l=>removeLyr(l));polylines=[];if(drawing)endDraw();}
function resetAll(){closeAllPopups();closeInputOv();markers.forEach(m=>removeLyr(m.lyr));markers=[];resetLines();movingMk=null;locCount=0;if(searchMarker){vmap.removeLayer(searchMarker.lyr);searchMarker=null;}}

document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  e.preventDefault();if(!vmap)return;
  let noGPS=null;
  const files=Array.from(e.dataTransfer.files);
  const imageFiles=files.filter(f=>f.type.startsWith('image/')||/\.(jpe?g|png)$/i.test(f.name.toLowerCase()));
  const otherFiles=files.filter(f=>!f.type.startsWith('image/')&&!/\.(jpe?g|png)$/i.test(f.name.toLowerCase()));
  otherFiles.forEach(file=>{const n=file.name.toLowerCase();if(n.endsWith('.kmz')||n.endsWith('.zip'))loadKMZ(file);else if(n.endsWith('.gpx'))loadGPX(file);else if(n.endsWith('.csv'))loadCSV(file);else if(n.endsWith('.htm')||n.endsWith('.html'))loadHTM(file);});
  if(imageFiles.length>0){const photoPts=[];let doneCount=0;imageFiles.forEach(file=>{loadImage(file,()=>noGPS,v=>noGPS=v,(coord)=>{if(coord)photoPts.push(coord);doneCount++;if(doneCount===imageFiles.length&&photoPts.length>0)fitPts(photoPts);});});}
});
document.addEventListener('paste',e=>{
  if(!vmap)return;
  const item=Array.from(e.clipboardData?.items||[]).find(i=>i.type.startsWith('image/'));
  if(!item)return;e.preventDefault();
  const reader=new FileReader();
  reader.onload=ev=>{const src=ev.target.result,ll=extractGPS(src);const now=new Date();const name=`л¶ҷм—¬л„Јкё°_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;if(ll){const c=toMerc(ll[0],ll[1]);addPhotoMarker(c,src,name);fitPts([c]);}else{const c=vmap.getView().getCenter();addPhotoMarker(c,src,name);}};
  reader.readAsDataURL(item.getAsFile());
});

function loadImage(file,getNG,setNG,onDone){const r=new FileReader();r.onload=ev=>{const src=ev.target.result,name=file.name.replace(/\.[^/.]+$/,''),ll=extractGPS(src);if(ll){const c=toMerc(ll[0],ll[1]);addPhotoMarker(c,src,name);if(onDone)onDone(c);else fitPts([c]);}else{if(getNG()===null)setNG(confirm(`"${file.name}" мң„м№ҳ м •ліҙ м—ҶмқҢ.\nм§ҖлҸ„ мӨ‘мӢ¬м—җ м¶”к°Җн• к№Ңмҡ”?`));if(getNG())movingMk=addPhotoMarker(vmap.getView().getCenter(),src,name);if(onDone)onDone(null);}};r.readAsDataURL(file);}

function loadGPX(file){const r=new FileReader();r.onload=ev=>{const xml=new DOMParser().parseFromString(ev.target.result,'application/xml');const pts=[];Array.from(xml.getElementsByTagName('trk')).forEach(trk=>{Array.from(trk.getElementsByTagName('trkseg')).forEach(seg=>{const cs=Array.from(seg.getElementsByTagName('trkpt')).map(pt=>{const lo=parseFloat(pt.getAttribute('lon')),la=parseFloat(pt.getAttribute('lat'));return(!isNaN(lo)&&!isNaN(la))?toMerc(lo,la):null;}).filter(Boolean);if(cs.length>=2){const lyr=mkLineLyr(cs,randColor(),4);addLyr(lyr);polylines.push(lyr);pts.push(...cs);}});});Array.from(xml.getElementsByTagName('wpt')).forEach(wpt=>{const lo=parseFloat(wpt.getAttribute('lon')),la=parseFloat(wpt.getAttribute('lat'));if(isNaN(lo)||isNaN(la))return;const c=toMerc(lo,la);addMarker(c,wpt.getElementsByTagName('name')[0]?.textContent||'м„ӨлӘ… м—ҶмқҢ','');pts.push(c);});fitPts(pts);};r.readAsText(file);}

function loadCSV(file){const r=new FileReader();r.onload=ev=>{const text=ev.target.result.replace(/^\uFEFF/,'');const lines=text.trim().split(/\r?\n/);if(lines.length<2)return;const hdrs=parseCSV(lines[0]).map(h=>h.replace(/^"|"$/g,'').toLowerCase());const iN=hdrs.findIndex(h=>h.includes('мқҙлҰ„')||h==='name');const iLat=hdrs.findIndex(h=>h.includes('мң„лҸ„')||h==='lat'||h==='latitude');const iLng=hdrs.findIndex(h=>h.includes('кІҪлҸ„')||h==='lng'||h==='lon'||h==='longitude');const iAdr=hdrs.findIndex(h=>h.includes('мЈјмҶҢ')||h==='address');const has=iLat!==-1&&iLng!==-1;const ci={n:has?iN:1,lat:has?iLat:2,lng:has?iLng:3,adr:has?iAdr:4};const pts=[];lines.slice(has?1:0).forEach(line=>{if(!line.trim())return;const cols=parseCSV(line);const la=parseFloat(cols[ci.lat]),lo=parseFloat(cols[ci.lng]);if(isNaN(la)||isNaN(lo))return;const c=toMerc(lo,la);addMarker(c,(cols[ci.n]||'л§Ҳм»Ө').replace(/^"|"$/g,''),ci.adr>=0?cols[ci.adr]||'':'');pts.push(c);});fitPts(pts);};r.readAsText(file,'utf-8');}

function loadHTM(file){const r=new FileReader();r.onload=ev=>{const html=ev.target.result,pts=[];const lineBlocks=[...html.matchAll(/var\s+(linePath\d+|polygonPath\d+)\s*=\s*\[([\s\S]*?)\];/g)];lineBlocks.forEach(m=>{const cs=[...m[2].matchAll(/new\s+kakao\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)].map(c=>{const la=parseFloat(c[1]),lo=parseFloat(c[2]);return(!isNaN(la)&&!isNaN(lo))?toMerc(lo,la):null;}).filter(Boolean);if(cs.length>=2){const lyr=mkLineLyr(cs,'#FF00FF',3);addLyr(lyr);polylines.push(lyr);pts.push(...cs);}});const posM=[...html.matchAll(/content:\s*'([^']*)'[\s\S]*?latlng:\s*new\s+kakao\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];posM.forEach(m=>{const rawName=m[1].replace(/<a\b[^>]*>[\s\S]*?<\/a>/gi,'').replace(/<[^>]+>/g,'').trim()||'л§Ҳм»Ө';const la=parseFloat(m[2]),lo=parseFloat(m[3]);if(isNaN(la)||isNaN(lo))return;const c=toMerc(lo,la);addMarker(c,rawName,'');pts.push(c);});if(posM.length===0){const mkM=[...html.matchAll(/new\s+kakao\.maps\.Marker\s*\(\s*\{[^}]*position:\s*new\s+kakao\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];mkM.forEach((m,i)=>{const la=parseFloat(m[1]),lo=parseFloat(m[2]);if(isNaN(la)||isNaN(lo))return;const c=toMerc(lo,la);addMarker(c,`л§Ҳм»Ө_${i+1}`,'');pts.push(c);});}fitPts(pts);};r.readAsText(file,'utf-8');}

async function loadKMZ(file){
  try{
    const zip=await JSZip.loadAsync(file);const keys=Object.keys(zip.files);let kmlText=null;
    for(const k of keys){if(/\.kml$/i.test(k.replace(/\0/g,''))){try{const t=await zip.files[k].async('string');if(t&&t.length>0){kmlText=t;break;}}catch(e){}}}
    if(!kmlText){alert('KMZ м•Ҳм—җ .kml нҢҢмқјмқҙ м—ҶмҠөлӢҲлӢӨ.');return;}
    const xml=new DOMParser().parseFromString(kmlText,'application/xml');const pts=[];
    for(const pm of Array.from(xml.getElementsByTagName('Placemark'))){
      const name=pm.getElementsByTagName('name')[0]?.textContent?.trim()||'м„ӨлӘ… м—ҶмқҢ';
      const ls=pm.getElementsByTagName('LineString')[0];const pt=pm.getElementsByTagName('Point')[0];
      let pf='';
      for(const d of Array.from(pm.getElementsByTagName('Data'))){if(d.getAttribute('name')==='photoFile'){pf=d.getElementsByTagName('value')[0]?.textContent||'';break;}}
      if(!pf){const desc=pm.getElementsByTagName('description')[0]?.textContent||'';const mImg=desc.match(/src=["']([^"']+\.(jpe?g|png))["']/i);if(mImg){const thumbPath=mImg[1].trim();const rollPath=thumbPath.replace('_thumb.','_roll.');const rollEntry=keys.find(z=>{const c=z.replace(/\0/g,'');return c===rollPath||c.endsWith('/'+rollPath.split('/').pop());});pf=rollEntry?rollPath:thumbPath;}}
      if(ls){const raw=ls.getElementsByTagName('coordinates')[0]?.textContent||'';const cs=raw.trim().split(/\s+/).map(c=>{const p=c.split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);return(!isNaN(lo)&&!isNaN(la)&&Math.abs(lo)<=180&&Math.abs(la)<=90)?toMerc(lo,la):null;}).filter(Boolean);if(cs.length>=2){const lyr=mkLineLyr(cs,randColor(),4);addLyr(lyr);polylines.push(lyr);pts.push(...cs);}}
      else if(pt){const raw=pt.getElementsByTagName('coordinates')[0]?.textContent||'';const p=raw.trim().split(',');const lo=parseFloat(p[0]),la=parseFloat(p[1]);if(isNaN(lo)||isNaN(la)||Math.abs(lo)>180||Math.abs(la)>90)continue;const c=toMerc(lo,la);pts.push(c);if(pf){const base=pf.split('/').pop();let zipF=null;for(const k of keys){const ck=k.replace(/\0/g,'');if(ck===pf||ck===`files/${pf}`||ck===`images/${base}`||ck.endsWith('/'+base)||ck===base){zipF=zip.files[k];break;}}if(zipF){const b64=await zipF.async('base64');const mime=base.toLowerCase().endsWith('.png')?'image/png':'image/jpeg';addPhotoMarker(c,`data:${mime};base64,${b64}`,name);}else addMarker(c,name,'');}else addMarker(c,name,'');}
    }
    fitPts(pts);
  }catch(err){console.error(err);alert('KMZ мҳӨлҘҳ: '+err.message);}
}

/* вҳ… мҲҳм •4: doExport + onFmtChange */
function doExport(){
  const fmt=document.getElementById('exportFmt').value;
  const vis=document.getElementById('exportArea').value==='visible';
  if(fmt==='kmz')exportKMZ(vis);
  else if(fmt==='gpx')exportGPX(vis);
  else if(fmt==='csv')exportCSV();
  else if(fmt==='photos')downloadAllPhotos();
}
function onFmtChange(val){
  const q=document.getElementById('photoQuality');
  q.style.display=(val==='photos'||val==='kmz')?'':'none';
}

function getMks(vis){if(!vis)return markers;const ext=vmap.getView().calculateExtent(vmap.getSize());return markers.filter(m=>ol.extent.containsCoordinate(ext,m.feat.getGeometry().getCoordinates()));}
function getLyrs(vis){if(!vis)return polylines;const ext=vmap.getView().calculateExtent(vmap.getSize());return polylines.filter(l=>getCoords(l).some(c=>ol.extent.containsCoordinate(ext,c)));}

async function getAddrPrefix(){
  try{const center=vmap.getView().getCenter();const ll=fromMerc(center);const url=`https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${ll[0]},${ll[1]}&type=parcel&format=json&key=${VWORLD_KEY}`;const d=await jsonp(url);if(d?.response?.status!=='OK')return'';const text=d.response.result?.[0]?.text||'';const parts=text.split(' ').filter(p=>!/^\d/.test(p));const eupMyeon=parts.find(p=>/[мқҚл©ҙ]$/.test(p))||'';const ri=parts.find(p=>/лҰ¬$/.test(p))||'';const gu=parts.find(p=>/кө¬$/.test(p))||'';const dong=[...parts].reverse().find(p=>/лҸҷ(\d+к°Җ)?$/.test(p))||'';if(eupMyeon&&ri)return`${eupMyeon.replace(/[мқҚл©ҙ]$/,'')}${ri}_`;if(eupMyeon)return`${eupMyeon}_`;if(gu&&dong)return`${gu.replace(/кө¬$/,'')}${dong}_`;if(gu)return`${gu.replace(/кө¬$/,'')}_`;if(dong)return`${dong}_`;return'';}catch(e){return'';}
}
async function defName(ms){const now=new Date();const d=`${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;const last=([...ms].reverse().find(m=>!m.isPhoto)||ms.at(-1))?.name||'';const cleanLast=last.replace(/_\d{8}.*$/,'').replace(/[\\/:*?"<>|]/g,'').trim();const prefix=await getAddrPrefix();return cleanLast?`${prefix}${d}_${cleanLast}`:`${prefix}${d}_`;}

async function exportGPX(vis=false){const ms=getMks(vis),ls=getLyrs(vis);const fname=prompt('GPX нҢҢмқјлӘ…',await defName(ms));if(!fname)return;let gpx='<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="VWorldMap">\n';ls.forEach((l,i)=>{const pts=getCoords(l).map(c=>{const ll=fromMerc(c);return`<trkpt lat="${ll[1]}" lon="${ll[0]}"></trkpt>\n`;}).join('');gpx+=`<trk><name>path${i+1}</name><trkseg>\n${pts}</trkseg></trk>\n`;});ms.forEach(m=>{const ll=fromMerc(m.feat.getGeometry().getCoordinates());gpx+=`<wpt lat="${ll[1]}" lon="${ll[0]}"><name>${m.name}</name></wpt>\n`;});gpx+='</gpx>';dlBlob(new Blob([gpx],{type:'application/gpx+xml'}),fname+'.gpx');}
async function exportCSV(){const ms=getMks(false);if(!ms.length){alert('лӮҙліҙлӮј л§Ҳм»Өк°Җ м—ҶмҠөлӢҲлӢӨ.');return;}const fname=prompt('CSV нҢҢмқјлӘ…',await defName(ms));if(!fname)return;let csv='\uFEFFмқҙлҰ„,мң„лҸ„,кІҪлҸ„,мЈјмҶҢ\n';for(const m of ms){const ll=fromMerc(m.feat.getGeometry().getCoordinates());const addr=m.addr||await new Promise(r=>reverseGeocode(ll[0],ll[1],r));csv+=`"${m.name}",${ll[1]},${ll[0]},"${addr}"\n`;}dlBlob(new Blob([csv],{type:'text/csv;charset=utf-8;'}),fname+'.csv');}
async function exportKMZ(vis=false){
  const ms=getMks(vis),ls=getLyrs(vis);const fname=prompt('KMZ нҢҢмқјлӘ…',await defName(ms));if(!fname)return;
  const zip=new JSZip();const pFiles=new Array(ms.length).fill(null);let pc=0;
  for(let i=0;i<ms.length;i++){const m=ms[i];if(m.isPhoto&&m.imgSrc){pc++;const safe=(m.name||'photo').replace(/[^\wк°Җ-нһЈ\-_.]/g,'_');const fn=`${pc}_${safe}.jpg`;pFiles[i]=fn;zip.file(`files/${fn}`,(await compressImage(m.imgSrc)).split(',')[1],{base64:true});}}
  let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(fname)}</name>\n`;
  ls.forEach((l,i)=>{const coords=getCoords(l).map(c=>{const ll=fromMerc(c);return`${ll[0]},${ll[1]},0`;}).join(' ');kml+=`<Placemark><name>path${i+1}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;});
  ms.forEach((m,i)=>{const ll=fromMerc(m.feat.getGeometry().getCoordinates());if(m.isPhoto&&pFiles[i]){kml+=`<Placemark><name>${esc(m.name)}</name><description><![CDATA[<img src="files/${pFiles[i]}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${pFiles[i]}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;}else{kml+=`<Placemark><name>${esc(m.name)}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;}});
  kml+='</Document></kml>';zip.file('doc.kml',kml);
  const blob=await zip.generateAsync({type:'blob'});dlBlob(new File([blob],fname+'.kmz',{type:'application/vnd.google-earth.kmz'}),fname+'.kmz');
}

function compressImage(src){return new Promise(res=>{const qv=parseInt(document.getElementById('photoQuality')?.value||'500');if(qv===0){res(src);return;}const img=new Image();img.onload=()=>{const T=qv*1024,M=1920;let w=img.width,h=img.height;if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);let q=0.85,r=cv.toDataURL('image/jpeg',q);while(r.length*.75>T&&q>0.1){q=Math.round((q-.05)*100)/100;r=cv.toDataURL('image/jpeg',q);}res(r);};img.src=src;});}

function downloadPhotoWithGPS(imgSrc,name,lat,lng){return new Promise(res=>{const qv=parseInt(document.getElementById('photoQuality')?.value||'500');const toDMS=v=>{const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600;return[[d,1],[m,1],[Math.round(s*100),100]];};const addGPS=dataUrl=>{try{let ex={};try{ex=piexif.load(dataUrl);}catch(e){}if(!ex.GPS)ex.GPS={};ex.GPS[piexif.GPSIFD.GPSLatitudeRef]=lat>=0?'N':'S';ex.GPS[piexif.GPSIFD.GPSLatitude]=toDMS(lat);ex.GPS[piexif.GPSIFD.GPSLongitudeRef]=lng>=0?'E':'W';ex.GPS[piexif.GPSIFD.GPSLongitude]=toDMS(lng);return piexif.insert(piexif.dump(ex),dataUrl);}catch(e){return dataUrl;}};const go=dataUrl=>{const a=document.createElement('a');a.href=addGPS(dataUrl);a.download=(name||'image')+'.jpg';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(res,300);};if(qv===0){go(imgSrc);return;}const img=new Image();img.onload=()=>{const T=qv*1024,M=1920;let w=img.width,h=img.height;if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);let q=0.92,r=cv.toDataURL('image/jpeg',q);while(r.length*.75>T&&q>0.1){q=Math.round((q-.05)*100)/100;r=cv.toDataURL('image/jpeg',q);}go(r);};img.src=imgSrc;});}

async function downloadAllPhotos(){for(const m of markers.filter(m=>m.isPhoto&&m.imgSrc)){const ll=fromMerc(m.feat.getGeometry().getCoordinates());await downloadPhotoWithGPS(m.imgSrc,m.name,ll[1],ll[0]);}}

function toMerc(lng,lat){return ol.proj.transform([lng,lat],'EPSG:4326','EPSG:3857');}
function fromMerc(c){return ol.proj.transform(c,'EPSG:3857','EPSG:4326');}
function pad(n){return String(n).padStart(2,'0');}
function randColor(){return'#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function extractGPS(imgSrc){try{const exif=piexif.load(imgSrc),gps=exif['GPS'];if(!gps?.[piexif.GPSIFD.GPSLatitude])return null;const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};const la=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');const lo=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');return(isNaN(la)||isNaN(lo)||(!la&&!lo))?null:[lo,la];}catch(e){return null;}}

function fitPts(pts){if(!pts||!pts.length)return;let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;pts.forEach(c=>{if(c[0]<minX)minX=c[0];if(c[0]>maxX)maxX=c[0];if(c[1]<minY)minY=c[1];if(c[1]>maxY)maxY=c[1];});const cx=(minX+maxX)/2,cy=(minY+maxY)/2;vmap.getView().setCenter([cx,cy]);const w=maxX-minX,h=maxY-minY;if(w<100&&h<100){vmap.getView().setZoom(16);return;}const mapSize=vmap.getSize()||[window.innerWidth,window.innerHeight];const viewW=Math.max(mapSize[0]-160,100),viewH=Math.max(mapSize[1]-160,100);const res=Math.max(w/viewW,h/viewH);const zoom=Math.floor(Math.log2(156543.03392/res));vmap.getView().setZoom(Math.min(Math.max(zoom,1),16));}

function dlBlob(blob,filename){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);}
function parseCSV(line){const r=[];let cur='',inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(cur.trim());cur='';}else cur+=ch;}r.push(cur.trim());return r;}
