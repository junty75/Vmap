<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>KMZ & 사진 지도 (VWorld)</title>
<script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=55FD7275-A6F5-3B69-9966-CD4BFA2FD35F"></script>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
html,body{height:100%;margin:0;overflow:hidden;font-family:'맑은 고딕',sans-serif;}
#vmap{width:100%;height:100%;position:absolute;top:0;left:0;}

/* ── UI 패널 ── */
#search-form{
  position:absolute;top:10px;left:10px;z-index:2000;
  background:#fff;padding:5px;border-radius:5px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);display:flex;gap:5px;
}
#address-display{
  position:absolute;top:10px;left:260px;z-index:2000;
  background:rgba(0,0,0,.6);color:#fff;font-size:12px;
  padding:6px 10px;border-radius:5px;cursor:pointer;
  white-space:nowrap;max-width:440px;overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
#address-display:hover{background:rgba(0,0,0,.82);}
.controls{
  position:absolute;top:10px;right:10px;z-index:2000;
  display:flex;gap:5px;flex-wrap:wrap;max-width:700px;
  background:#fff;padding:6px 8px;border-radius:5px;
  box-shadow:0 2px 6px rgba(0,0,0,.3);
}
.controls button,.controls select,.controls input{
  padding:4px 7px;font-size:12px;font-family:inherit;
  border:1px solid #ccc;border-radius:4px;cursor:pointer;
}

/* ── 선 메뉴 ── */
#polyMenu{
  display:none;position:fixed;z-index:9999;
  background:#fff;border-radius:10px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);min-width:140px;overflow:hidden;
}
#polyMenu.show{display:block;}
#polyMenu button{
  display:block;width:100%;padding:12px 18px;
  border:none;background:none;text-align:left;
  font-size:14px;cursor:pointer;font-family:inherit;
}
#polyMenu button:hover{background:#f1f3f4;}
#polyMenu .danger{color:#e53935;}

/* ── 팝업 ── */
.mpopup{
  background:#fff;padding:8px 10px;border-radius:7px;
  box-shadow:0 3px 12px rgba(0,0,0,.35);min-width:170px;
  font-size:13px;font-family:'맑은 고딕',sans-serif;
}
.mpopup .head{
  display:flex;justify-content:space-between;align-items:center;
  font-weight:bold;margin-bottom:5px;
}
.mpopup .head button{border:none;background:none;cursor:pointer;font-size:14px;padding:0 3px;}
/* 사진: 기본 → zoomed 1.5배 */
.mpopup .pimg{
  max-height:300px;max-width:290px;display:block;
  margin-top:4px;object-fit:contain;cursor:zoom-in;
}
.mpopup .pimg.big{max-height:450px;max-width:435px;cursor:zoom-out;}
.mpopup .brow{display:flex;gap:5px;margin-top:6px;}
.mpopup .brow button{
  flex:1;padding:4px 0;font-size:12px;cursor:pointer;
  border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-family:inherit;
}
.mpopup .brow button:hover{background:#e0e0e0;}
.mpopup .inp{
  width:100%;box-sizing:border-box;padding:4px;font-size:13px;
  border:1px solid #ccc;border-radius:4px;font-family:inherit;
}

/* ── 거리 표시 ── */
.dist-tip{
  background:#fff;border:1px solid #db4040;border-radius:3px;
  padding:3px 7px;font-size:12px;white-space:nowrap;pointer-events:none;
}
/* ── 선 그리기 커서 ── */
.draw-mode,.draw-mode *{cursor:crosshair !important;}
</style>
</head>
<body>

<form id="search-form">
  <input id="addr-input" type="text" placeholder="주소 검색" style="width:175px;padding:4px;">
  <button type="submit">검색</button>
</form>

<div id="address-display" onclick="copyAndMark()">주소 없음</div>

<div id="polyMenu">
  <button id="polyEditBtn">✏️ 수정</button>
  <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
  <button id="polyMenuCancelBtn">✕ 취소</button>
</div>

<div class="controls">
  <input id="latlng-box" readonly style="width:220px;" title="클릭하여 복사" onclick="copyLL(this)">
  <select id="photoQuality">
    <option value="300">사진 300KB↓</option>
    <option value="500" selected>사진 500KB↓</option>
    <option value="800">사진 800KB↓</option>
    <option value="1024">사진 1MB↓</option>
    <option value="0">사진 원본</option>
  </select>
  <button onclick="downloadAllPhotos()">📸 사진 다운</button>
  <button id="drawBtn" onclick="toggleDraw()">선 그리기(Alt)</button>
  <button onclick="resetLines()">선 초기화</button>
  <button onclick="resetAll()">화면 초기화</button>
  <select id="exportFmt">
    <option value="kmz">KMZ 내보내기</option>
    <option value="gpx">GPX 내보내기</option>
    <option value="csv">CSV 내보내기</option>
  </select>
  <select id="exportArea">
    <option value="all">전체 영역</option>
    <option value="visible">현재 영역</option>
  </select>
  <button onclick="doExport()">💾 저장</button>
  <select id="mapType" onchange="chgMapType(this.value)">
    <option value="GRAPHIC">일반지도</option>
    <option value="GRAPHIC_WHITE">백지도</option>
    <option value="GRAPHIC_NIGHT">야간지도</option>
    <option value="PHOTO">항공사진</option>
    <option value="PHOTO_HYBRID" selected>하이브리드</option>
  </select>
</div>

<div id="vmap"></div>

<script>
'use strict';
/* ═══════════════════════════════════════════════
   전역 상태
═══════════════════════════════════════════════ */
let vmap = null;
let olMap = null;          // vmap 내부의 실제 ol.Map 인스턴스
let markers   = [];        // {feat, lyr, ov, name, addr, isPhoto, imgSrc}
let polylines = [];        // ol.layer.Vector[]
let drawing   = false, drawCoords = [], drawLayer = null;
let guideLine = null, distOv = null, distEl = null;
let movingMk  = null, inputOv = null, locCount = 0;
let lastCX = 0, lastCY = 0, polyTarget = null;
let lastAddr = '주소 없음', lastLL = null;

/* ═══════════════════════════════════════════════
   지도 초기화
   핵심: vmap.getMap() 으로 내부 ol.Map 얻기
         → 레이어를 ol.Map에 직접 추가해야 보임
═══════════════════════════════════════════════ */
function initMap(lat, lng) {
  vw.ol3.CameraPosition.center = ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857');
  vw.ol3.CameraPosition.zoom   = 14;
  vw.ol3.MapOptions = {
    basemapType        : vw.ol3.BasemapType.PHOTO_HYBRID,
    controlDensity     : vw.ol3.DensityType.EMPTY,
    interactionDensity : vw.ol3.DensityType.FULL,
    controlsAutoArrange: true,
    homePosition       : vw.ol3.CameraPosition,
    initPosition       : vw.ol3.CameraPosition
  };
  vmap = new vw.ol3.Map('vmap', vw.ol3.MapOptions);

  // VWorld Map 내부의 ol.Map 인스턴스 획득
  // vw.ol3.Map은 ol.Map을 상속/래핑하므로 자기 자신이 ol.Map
  olMap = vmap;

  olMap.on('click',       mapClick);
  olMap.on('pointermove', mapMove);
  olMap.getViewport().addEventListener('contextmenu', mapRightClick);
}

window.onload = () => {
  if (!navigator.geolocation) { initMap(35.8242, 127.1480); return; }
  navigator.geolocation.getCurrentPosition(
    p  => initMap(p.coords.latitude, p.coords.longitude),
    () => initMap(35.8242, 127.1480),
    { timeout: 5000, maximumAge: 60000 }
  );
};

function chgMapType(t) {
  if (vmap) vmap.setBasemapType(vw.ol3.BasemapType[t]);
}

/* ═══════════════════════════════════════════════
   레이어 추가 핵심 함수
   ── VWorld의 vmap.addLayer()를 쓰면 내부 레이어
      컬렉션 순서 문제로 타일 아래 깔릴 수 있음
   ── ol.Map.getLayers().push() 로 맨 뒤(맨 위)에 추가
   ── renderOrder 없이 zIndex만으로 제어
═══════════════════════════════════════════════ */
function addLayerToMap(lyr) {
  // 방법: vmap.addLayer → 그 뒤 레이어를 맨 뒤로 이동
  vmap.addLayer(lyr);
  // getLayers()는 Collection. 마지막 위치가 렌더링 맨 위
  const layers = olMap.getLayers();
  layers.remove(lyr);
  layers.push(lyr);
}

function removeLayerFromMap(lyr) {
  try { vmap.removeLayer(lyr); } catch(e) {}
  try { olMap.getLayers().remove(lyr); } catch(e) {}
}

/* ═══════════════════════════════════════════════
   역지오코딩 — Nominatim (OSM) 기본 사용
   원본 카카오 형식 재현:
     법정동 전체주소 / 도로명(시도 제거)
═══════════════════════════════════════════════ */
function reverseGeocode(lng, lat, cb) {
  // Nominatim 사용 (VWorld API는 브라우저 CORS 차단)
  fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko&addressdetails=1`)
    .then(r => r.json())
    .then(d => {
      if (!d || !d.address) { cb('주소 없음'); return; }
      const a = d.address;
      // 지번 스타일 조합
      const sido   = a.province || a.state || '';
      const sigun  = a.city || a.county || a.town || '';
      const dong   = a.suburb || a.neighbourhood || a.village || a.hamlet || '';
      const ri     = a.quarter || '';
      // 도로명
      const road   = a.road || '';
      const hno    = a.house_number || '';

      let parcel = [sido, sigun, dong, ri].filter(Boolean).join(' ');
      let roadAddr = road ? [sigun, road, hno].filter(Boolean).join(' ') : '';

      // 원본과 동일: 지번 / 도로명(시도 제외)
      const result = roadAddr ? `${parcel} / ${roadAddr}` : (parcel || d.display_name || '주소 없음');
      cb(result);
    })
    .catch(() => cb('주소 없음'));
}

/* ═══════════════════════════════════════════════
   주소 검색 — Nominatim geocoding
   (VWorld Search API는 CORS 문제로 브라우저에서 직접 호출 불가)
═══════════════════════════════════════════════ */
document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  const q = document.getElementById('addr-input').value.trim();
  if (!q || !olMap) return;

  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&accept-language=ko&limit=1&countrycodes=kr`)
    .then(r => r.json())
    .then(d => {
      if (!d || !d.length) { alert('주소를 찾을 수 없습니다.'); return; }
      const lat = parseFloat(d[0].lat), lng = parseFloat(d[0].lon);
      if (isNaN(lat) || isNaN(lng)) return;
      olMap.getView().animate({ center: toMerc(lng, lat), zoom: 16, duration: 600 });
    })
    .catch(() => alert('검색 중 오류가 발생했습니다.'));
});

/* ═══════════════════════════════════════════════
   지도 클릭
═══════════════════════════════════════════════ */
function mapClick(evt) {
  if (inputOv) { closeInputOv(); }

  if (movingMk) {
    movingMk.feat.getGeometry().setCoordinates(evt.coordinate);
    if (movingMk.ov) movingMk.ov.setPosition(evt.coordinate);
    movingMk = null; return;
  }
  if (drawing) { drawCoords.push(evt.coordinate); refreshDraw(); return; }

  // 마커 클릭 감지
  let hit = false;
  olMap.forEachFeatureAtPixel(evt.pixel, feat => {
    if (hit) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) { hit = true; openPopup(m); }
  }, { hitTolerance: 16 });
  if (hit) return;

  // 빈 곳 → 좌표·주소
  const ll = fromMerc(evt.coordinate);
  lastLL = ll;
  document.getElementById('latlng-box').value = `${ll[1].toFixed(6)}, ${ll[0].toFixed(6)}`;
  document.getElementById('address-display').innerText = '주소 조회 중…';
  reverseGeocode(ll[0], ll[1], addr => {
    lastAddr = addr;
    document.getElementById('address-display').innerText = addr;
  });
}

/* ═══════════════════════════════════════════════
   마우스 이동 (선 그리기 가이드)
═══════════════════════════════════════════════ */
function mapMove(evt) {
  if (!drawing || !drawCoords.length) { clearGuide(); return; }
  updateGuide(drawCoords[drawCoords.length - 1], evt.coordinate);
}
document.addEventListener('mousemove', e => { lastCX = e.clientX; lastCY = e.clientY; }, { passive: true });

/* ═══════════════════════════════════════════════
   우클릭
═══════════════════════════════════════════════ */
function mapRightClick(e) {
  e.preventDefault();
  if (!olMap) return;
  const px    = olMap.getEventPixel(e);
  const coord = olMap.getCoordinateFromPixel(px);
  if (drawing) { endDraw(); return; }

  let hitMk = false;
  olMap.forEachFeatureAtPixel(px, feat => {
    if (hitMk) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) { hitMk = true; showEditInput(m); }
  }, { hitTolerance: 16 });
  if (hitMk) return;

  const nearPoly = findNearPoly(px, 10);
  if (nearPoly) { showPolyMenu(lastCX || e.clientX, lastCY || e.clientY, nearPoly); return; }
  showMarkerInput(coord);
}

/* ═══════════════════════════════════════════════
   선 그리기
═══════════════════════════════════════════════ */
function toggleDraw() { drawing ? endDraw() : startDraw(); }

function startDraw() {
  if (drawing) return;
  drawing = true; drawCoords = [];
  drawLayer = mkLineLayer([], '#FF0000', 3);
  addLayerToMap(drawLayer);
  document.getElementById('vmap').classList.add('draw-mode');
  document.getElementById('drawBtn').textContent = '선 그리기 중지';
}

function endDraw() {
  if (!drawing) return;
  drawing = false; clearGuide();
  document.getElementById('vmap').classList.remove('draw-mode');
  document.getElementById('drawBtn').textContent = '선 그리기(Alt)';
  if (drawCoords.length >= 2 && drawLayer) polylines.push(drawLayer);
  else if (drawLayer) removeLayerFromMap(drawLayer);
  drawLayer = null; drawCoords = [];
}

function refreshDraw() {
  if (!drawLayer || drawCoords.length < 2) return;
  const src = drawLayer.getSource(); src.clear();
  const f = new ol.Feature(new ol.geom.LineString(drawCoords));
  f.setStyle(lineStyle('#FF0000', 3));
  src.addFeature(f);
  drawLayer._coords = drawCoords.slice();
}

/* ── 레이어/스타일 헬퍼 ── */
function lineStyle(color, width) {
  return new ol.style.Style({ stroke: new ol.style.Stroke({ color, width }) });
}

function mkLineLayer(coords, color, width) {
  const src = new ol.source.Vector();
  if (coords.length >= 2) {
    const f = new ol.Feature(new ol.geom.LineString(coords));
    f.setStyle(lineStyle(color, width));
    src.addFeature(f);
  }
  const lyr = new ol.layer.Vector({ source: src });
  lyr._color = color; lyr._coords = coords.slice();
  return lyr;
}

function getCoords(lyr) {
  const fs = lyr.getSource().getFeatures();
  return fs.length ? fs[0].getGeometry().getCoordinates() : (lyr._coords || []);
}

/* ── 가이드선 & 거리 ── */
function updateGuide(from, to) {
  if (guideLine) { removeLayerFromMap(guideLine); guideLine = null; }
  guideLine = mkLineLayer([from, to], '#FF6666', 1.5);
  addLayerToMap(guideLine);

  const all = [...drawCoords, to];
  let dist = 0;
  for (let i = 1; i < all.length; i++) dist += haversine(all[i-1], all[i]);
  const fmt = d => d < 1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;

  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = `총거리 ${fmt(dist)}`;
  if (!distOv) {
    distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' });
    olMap.addOverlay(distOv);
  }
  distOv.setPosition(to);
}

function clearGuide() {
  if (guideLine) { removeLayerFromMap(guideLine); guideLine = null; }
  if (distOv)    { olMap.removeOverlay(distOv);   distOv = null; }
  distEl = null;
}

function haversine(c1, c2) {
  const [lo1,la1] = fromMerc(c1), [lo2,la2] = fromMerc(c2);
  const R = 6371000, dLa = (la2-la1)*Math.PI/180, dLo = (lo2-lo1)*Math.PI/180;
  const a = Math.sin(dLa/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

/* ── 선 근처 탐색 ── */
function findNearPoly(pixel, thr) {
  let near = null, minD = Infinity;
  polylines.forEach(lyr => {
    const coords = getCoords(lyr);
    for (let i = 0; i < coords.length - 1; i++) {
      const a = olMap.getPixelFromCoordinate(coords[i]);
      const b = olMap.getPixelFromCoordinate(coords[i+1]);
      if (!a || !b) continue;
      const d = ptSegDist(pixel, a, b);
      if (d < minD) { minD = d; near = lyr; }
    }
  });
  return minD <= thr ? near : null;
}
function ptSegDist(p, a, b) {
  const dx = b[0]-a[0], dy = b[1]-a[1];
  if (!dx && !dy) return Math.hypot(p[0]-a[0], p[1]-a[1]);
  const t = Math.max(0, Math.min(1, ((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));
  return Math.hypot(p[0]-(a[0]+t*dx), p[1]-(a[1]+t*dy));
}

/* ── 선 메뉴 ── */
function showPolyMenu(x, y, lyr) {
  polyTarget = lyr;
  const m = document.getElementById('polyMenu');
  m.style.left = Math.min(x, innerWidth-160) + 'px';
  m.style.top  = Math.min(y, innerHeight-120) + 'px';
  m.classList.add('show');
}
function hidePolyMenu() { document.getElementById('polyMenu').classList.remove('show'); polyTarget = null; }
document.addEventListener('click', e => { if (!document.getElementById('polyMenu').contains(e.target)) hidePolyMenu(); });
document.getElementById('polyMenuCancelBtn').onclick = hidePolyMenu;
document.getElementById('polyDeleteBtn').onclick = () => {
  if (!polyTarget) return;
  removeLayerFromMap(polyTarget); polylines = polylines.filter(p => p !== polyTarget); hidePolyMenu();
};
document.getElementById('polyEditBtn').onclick = () => {
  if (!polyTarget) return;
  const lyr = polyTarget; hidePolyMenu();
  if (drawing) endDraw();
  const coords = getCoords(lyr);
  removeLayerFromMap(lyr); polylines = polylines.filter(p => p !== lyr);
  drawing = true; drawCoords = coords.slice();
  drawLayer = mkLineLayer(drawCoords, '#FF0000', 3);
  addLayerToMap(drawLayer);
  document.getElementById('vmap').classList.add('draw-mode');
  document.getElementById('drawBtn').textContent = '선 그리기 중지';
};

/* ── 단축키 ── */
document.addEventListener('keydown', e => {
  if (e.altKey) { e.preventDefault(); toggleDraw(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 's') { e.preventDefault(); doExport(); return; }
  if (e.ctrlKey && e.key.toLowerCase() === 'c' && !getSelection().toString()) { e.preventDefault(); copyAndMark(); return; }
  if (drawing && (e.key === 'Backspace' || e.key === 'Escape' || (e.ctrlKey && e.key === 'z'))) {
    e.preventDefault(); drawCoords.pop(); refreshDraw(); if (!drawCoords.length) clearGuide();
  }
});

/* ═══════════════════════════════════════════════
   마커 스타일 — SVG 인라인 (CORS 없음)
   일반: 빨간 핀, 사진: 파란 카메라 원형
═══════════════════════════════════════════════ */
const SVG_PIN = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">
  <path d="M14 0C6.27 0 0 6.27 0 14c0 9.5 14 26 14 26s14-16.5 14-26C28 6.27 21.73 0 14 0z" fill="#e53935"/>
  <circle cx="14" cy="14" r="6" fill="white"/>
</svg>`;

const SVG_CAM = `<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40">
  <circle cx="20" cy="20" r="19" fill="#1a73e8" stroke="white" stroke-width="2"/>
  <path d="M10 16h3l2-3h10l2 3h3a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H10a1 1 0 0 1-1-1V17a1 1 0 0 1 1-1z" fill="white"/>
  <circle cx="20" cy="22" r="4" fill="#1a73e8"/>
</svg>`;

function mkIconStyle(svg, anchorY) {
  return new ol.style.Style({
    image: new ol.style.Icon({
      src: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
      anchor: [0.5, anchorY],
      anchorXUnits: 'fraction',
      anchorYUnits: 'fraction'
    })
  });
}

/* ═══════════════════════════════════════════════
   마커 추가
   핵심 수정: addLayerToMap() 으로 ol.Map 레이어
              컬렉션 맨 뒤(맨 위)에 추가
═══════════════════════════════════════════════ */
function addMarker(coord, name, addr) {
  const feat = new ol.Feature({ geometry: new ol.geom.Point(coord) });
  feat.setStyle(mkIconStyle(SVG_PIN, 1.0));
  const lyr = new ol.layer.Vector({ source: new ol.source.Vector({ features: [feat] }) });
  addLayerToMap(lyr);
  const obj = { feat, lyr, ov: null, name, addr: addr || '', isPhoto: false, imgSrc: null };
  markers.push(obj); return obj;
}

function addPhotoMarker(coord, imgSrc, name) {
  const feat = new ol.Feature({ geometry: new ol.geom.Point(coord) });
  feat.setStyle(mkIconStyle(SVG_CAM, 0.5));
  const lyr = new ol.layer.Vector({ source: new ol.source.Vector({ features: [feat] }) });
  addLayerToMap(lyr);
  const obj = { feat, lyr, ov: null, name, addr: '', isPhoto: true, imgSrc };
  markers.push(obj); return obj;
}

/* ═══════════════════════════════════════════════
   팝업
   핵심 수정: stopEvent:false → 내부 DOM 이벤트(사진클릭) 작동
             mousedown stopPropagation으로 지도 드래그 방지
═══════════════════════════════════════════════ */
function openPopup(m) {
  closeAllPopups();
  const el = m.isPhoto ? makePhotoEl(m) : makeTextEl(m);
  const ov = new ol.Overlay({
    element: el,
    positioning: 'bottom-center',
    offset: [0, -48],
    stopEvent: false,   // ← 핵심: false로 해야 내부 클릭 이벤트 동작
    autoPan: false
  });
  olMap.addOverlay(ov);
  ov.setPosition(m.feat.getGeometry().getCoordinates());
  m.ov = ov;
}

function makeTextEl(m) {
  const d = document.createElement('div'); d.className = 'mpopup';
  d.innerHTML = `<div class="head"><span>${esc(m.name)}</span>
    <button onclick="closePop(this)">✖</button></div>`;
  d.addEventListener('mousedown', e => e.stopPropagation());
  return d;
}

function makePhotoEl(m) {
  const d = document.createElement('div'); d.className = 'mpopup';
  d.innerHTML = `<div class="head"><span>${esc(m.name)}</span>
    <span>
      <button onclick="dlPhoto(this)" title="다운로드">💾</button>
      <button onclick="closePop(this)">✖</button>
    </span></div>
    <img class="pimg" src="${m.imgSrc}" draggable="false" title="클릭하면 1.5배 확대">`;
  d.addEventListener('mousedown', e => e.stopPropagation());

  // 사진 클릭 → 1.5배 토글 (stopEvent:false이므로 이벤트 정상 동작)
  const img = d.querySelector('.pimg');
  img.addEventListener('click', e => {
    e.stopPropagation();
    img.classList.toggle('big');
    // 오버레이 위치 재설정 (크기 변화 후 repaint)
    const mk = markers.find(x => x.ov && x.ov.getElement() === d);
    if (mk && mk.ov) {
      const pos = mk.feat.getGeometry().getCoordinates();
      setTimeout(() => { mk.ov.setPosition(undefined); mk.ov.setPosition(pos); }, 50);
    }
  });
  return d;
}

function closePop(btn) {
  const el = btn.closest('.mpopup');
  const m  = markers.find(x => x.ov && x.ov.getElement() === el);
  if (m) { olMap.removeOverlay(m.ov); m.ov = null; }
}

function dlPhoto(btn) {
  const el = btn.closest('.mpopup');
  const m  = markers.find(x => x.ov && x.ov.getElement() === el);
  if (!m) return;
  const ll = fromMerc(m.feat.getGeometry().getCoordinates());
  downloadPhotoWithGPS(m.imgSrc, m.name, ll[1], ll[0]);
}

function closeAllPopups() {
  markers.forEach(m => { if (m.ov) { olMap.removeOverlay(m.ov); m.ov = null; } });
}

/* ═══════════════════════════════════════════════
   드래그앤드롭 / 붙여넣기
═══════════════════════════════════════════════ */
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); if (!olMap) return;
  let photoNoGPS = null;
  Array.from(e.dataTransfer.files).forEach(file => {
    const n = file.name.toLowerCase();
    if      (n.endsWith('.kmz') || n.endsWith('.zip'))      loadKMZ(file);
    else if (n.endsWith('.gpx'))                            loadGPX(file);
    else if (n.endsWith('.csv'))                            loadCSV(file);
    else if (n.endsWith('.htm') || n.endsWith('.html'))     loadHTM(file);
    else if (file.type.startsWith('image/') || /\.(jpe?g|png)$/i.test(n)) {
      loadImage(file, () => photoNoGPS, v => photoNoGPS = v);
    }
  });
});

document.addEventListener('paste', e => {
  if (!olMap) return;
  const item = Array.from(e.clipboardData?.items||[]).find(i => i.type.startsWith('image/'));
  if (!item) return; e.preventDefault();
  const reader = new FileReader();
  reader.onload = ev => {
    const src = ev.target.result, ll = extractGPS(src);
    const now = new Date();
    const name = `붙여넣기_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}_${pad(now.getHours())}${pad(now.getMinutes())}`;
    if (ll) { const c = toMerc(ll[0],ll[1]); addPhotoMarker(c,src,name); olMap.getView().animate({center:c,duration:500}); }
    else    { movingMk = addPhotoMarker(olMap.getView().getCenter(), src, name); }
  };
  reader.readAsDataURL(item.getAsFile());
});

/* ═══════════════════════════════════════════════
   파일 로더
═══════════════════════════════════════════════ */
function loadImage(file, getNoGPS, setNoGPS) {
  const r = new FileReader();
  r.onload = ev => {
    const src = ev.target.result;
    const name = file.name.replace(/\.[^/.]+$/, '');
    const ll = extractGPS(src);
    if (ll) {
      const c = toMerc(ll[0], ll[1]);
      addPhotoMarker(c, src, name);
      fitPts([c]);
    } else {
      if (getNoGPS() === null) setNoGPS(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));
      if (getNoGPS()) movingMk = addPhotoMarker(olMap.getView().getCenter(), src, name);
    }
  };
  r.readAsDataURL(file);
}

function loadGPX(file) {
  const r = new FileReader();
  r.onload = ev => {
    const xml = new DOMParser().parseFromString(ev.target.result, 'application/xml');
    const pts = [];
    Array.from(xml.getElementsByTagName('trk')).forEach(trk => {
      Array.from(trk.getElementsByTagName('trkseg')).forEach(seg => {
        const cs = Array.from(seg.getElementsByTagName('trkpt')).map(pt => {
          const lo = parseFloat(pt.getAttribute('lon')), la = parseFloat(pt.getAttribute('lat'));
          return (!isNaN(lo) && !isNaN(la)) ? toMerc(lo, la) : null;
        }).filter(Boolean);
        if (cs.length >= 2) {
          const lyr = mkLineLayer(cs, randColor(), 4);
          // 선 레이어도 addLayerToMap으로 맨 위에
          addLayerToMap(lyr); polylines.push(lyr); pts.push(...cs);
        }
      });
    });
    Array.from(xml.getElementsByTagName('wpt')).forEach(wpt => {
      const lo = parseFloat(wpt.getAttribute('lon')), la = parseFloat(wpt.getAttribute('lat'));
      if (isNaN(lo) || isNaN(la)) return;
      const c = toMerc(lo, la);
      addMarker(c, wpt.getElementsByTagName('name')[0]?.textContent || '설명 없음', '');
      pts.push(c);
    });
    fitPts(pts);
  };
  r.readAsText(file);
}

function loadCSV(file) {
  const r = new FileReader();
  r.onload = ev => {
    const text = ev.target.result.replace(/^\uFEFF/, '');
    const lines = text.trim().split(/\r?\n/);
    if (lines.length < 2) return;
    const hdrs = parseCSV(lines[0]).map(h => h.replace(/^"|"$/g,'').toLowerCase());
    const iN   = hdrs.findIndex(h => h.includes('이름') || h === 'name');
    const iLat = hdrs.findIndex(h => h.includes('위도') || h === 'lat' || h === 'latitude');
    const iLng = hdrs.findIndex(h => h.includes('경도') || h === 'lng' || h === 'lon' || h === 'longitude');
    const iAdr = hdrs.findIndex(h => h.includes('주소') || h === 'address');
    const has  = iLat !== -1 && iLng !== -1;
    const ci   = { n: has?iN:1, lat: has?iLat:2, lng: has?iLng:3, adr: has?iAdr:4 };
    const pts  = [];
    lines.slice(has?1:0).forEach(line => {
      if (!line.trim()) return;
      const cols = parseCSV(line);
      const la = parseFloat(cols[ci.lat]), lo = parseFloat(cols[ci.lng]);
      if (isNaN(la)||isNaN(lo)) return;
      const c = toMerc(lo, la);
      addMarker(c, (cols[ci.n]||'마커').replace(/^"|"$/g,''), ci.adr>=0?cols[ci.adr]||'':'');
      pts.push(c);
    });
    fitPts(pts);
  };
  r.readAsText(file, 'utf-8');
}

/* ── HTM 불러오기 (카카오맵 HTM 파싱)
   원본과 완전히 동일한 정규식 사용
═══════════════════════════════════════════════ */
function loadHTM(file) {
  const r = new FileReader();
  r.onload = ev => {
    const html = ev.target.result;
    const pts  = [];

    // ① 폴리라인: var linePath1 = [...] / var polygonPath1 = [...]
    const lineBlocks = [...html.matchAll(/var\s+(linePath\d+|polygonPath\d+)\s*=\s*\[([\s\S]*?)\];/g)];
    lineBlocks.forEach(m => {
      const cs = [...m[2].matchAll(/new\s+kakao\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)]
        .map(c => {
          const la = parseFloat(c[1]), lo = parseFloat(c[2]);
          return (!isNaN(la)&&!isNaN(lo)) ? toMerc(lo,la) : null;
        }).filter(Boolean);
      if (cs.length >= 2) {
        const lyr = mkLineLayer(cs, '#FF00FF', 3);
        addLayerToMap(lyr); polylines.push(lyr); pts.push(...cs);
      }
    });

    // ② 마커: { content:'...', latlng: new kakao.maps.LatLng(lat,lng) }
    const posMatches = [...html.matchAll(/content:\s*'([^']*)'[\s\S]*?latlng:\s*new\s+kakao\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
    posMatches.forEach(m => {
      const rawName = m[1].replace(/<a\b[^>]*>[\s\S]*?<\/a>/gi,'').replace(/<[^>]+>/g,'').trim() || '마커';
      const la = parseFloat(m[2]), lo = parseFloat(m[3]);
      if (isNaN(la)||isNaN(lo)) return;
      const c = toMerc(lo, la);
      addMarker(c, rawName, ''); pts.push(c);
    });

    // ③ 방식2: new kakao.maps.Marker({ position: new kakao.maps.LatLng(lat,lng) })
    if (posMatches.length === 0) {
      const mkM = [...html.matchAll(/new\s+kakao\.maps\.Marker\s*\(\s*\{[^}]*position:\s*new\s+kakao\.maps\.LatLng\(([\d.]+),([\d.]+)\)/g)];
      mkM.forEach((m,i) => {
        const la = parseFloat(m[1]), lo = parseFloat(m[2]);
        if (isNaN(la)||isNaN(lo)) return;
        const c = toMerc(lo, la);
        addMarker(c, `마커_${i+1}`, ''); pts.push(c);
      });
    }

    fitPts(pts);
  };
  r.readAsText(file, 'utf-8');
}

/* ── KMZ 불러오기
   KML 좌표: 경도,위도,고도 순서 (lng,lat,alt)
   비동기 완료 후 fitPts 호출
═══════════════════════════════════════════════ */
async function loadKMZ(file) {
  try {
    const zip  = await JSZip.loadAsync(file);
    const keys = Object.keys(zip.files);
    let kmlText = null;
    for (const k of keys) {
      if (/\.kml$/i.test(k.replace(/\0/g,''))) {
        try { const t = await zip.files[k].async('string'); if(t&&t.length>0){kmlText=t;break;} } catch(e){}
      }
    }
    if (!kmlText) { alert('KMZ 안에 .kml 파일이 없습니다.'); return; }

    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const pts = [];

    for (const pm of Array.from(xml.getElementsByTagName('Placemark'))) {
      const name = pm.getElementsByTagName('name')[0]?.textContent?.trim() || '설명 없음';
      const ls   = pm.getElementsByTagName('LineString')[0];
      const pt   = pm.getElementsByTagName('Point')[0];

      // photoFile 추출
      let pf = '';
      for (const d of Array.from(pm.getElementsByTagName('Data'))) {
        if (d.getAttribute('name') === 'photoFile') { pf = d.getElementsByTagName('value')[0]?.textContent||''; break; }
      }
      if (!pf) {
        const desc = pm.getElementsByTagName('description')[0]?.textContent || '';
        const mImg = desc.match(/src=["']([^"']+\.(jpe?g|png))["']/i);
        if (mImg) {
          // thumb 이미지면 roll 버전 시도 (원본 로직 동일)
          const thumbPath = mImg[1].trim();
          const rollPath  = thumbPath.replace('_thumb.', '_roll.');
          const rollEntry = keys.find(z => { const c = z.replace(/\0/g,''); return c===rollPath||c.endsWith('/'+rollPath.split('/').pop()); });
          pf = rollEntry ? rollPath : thumbPath;
        }
      }

      if (ls) {
        const raw = ls.getElementsByTagName('coordinates')[0]?.textContent || '';
        // KML: 경도,위도,고도
        const cs = raw.trim().split(/\s+/).map(c => {
          const p = c.split(',');
          const lo = parseFloat(p[0]), la = parseFloat(p[1]);
          return (!isNaN(lo)&&!isNaN(la)) ? toMerc(lo,la) : null;
        }).filter(Boolean);
        if (cs.length >= 2) {
          const lyr = mkLineLayer(cs, randColor(), 4);
          addLayerToMap(lyr); polylines.push(lyr); pts.push(...cs);
        }
      } else if (pt) {
        const raw = pt.getElementsByTagName('coordinates')[0]?.textContent || '';
        const p = raw.trim().split(',');
        // KML: 경도,위도,고도
        const lo = parseFloat(p[0]), la = parseFloat(p[1]);
        if (isNaN(lo)||isNaN(la)) continue;
        const c = toMerc(lo, la);   // toMerc(경도, 위도)
        pts.push(c);

        if (pf) {
          const base = pf.split('/').pop(); let zipF = null;
          for (const k of keys) {
            const ck = k.replace(/\0/g,'');
            if (ck===pf||ck===`files/${pf}`||ck===`images/${base}`||ck.endsWith('/'+base)||ck===base) { zipF=zip.files[k]; break; }
          }
          if (zipF) {
            const b64  = await zipF.async('base64');
            const mime = base.toLowerCase().endsWith('.png') ? 'image/png' : 'image/jpeg';
            addPhotoMarker(c, `data:${mime};base64,${b64}`, name);
          } else addMarker(c, name, '');
        } else addMarker(c, name, '');
      }
    }
    // 비동기 완료 후 fitPts
    fitPts(pts);
  } catch(err) { console.error(err); alert('KMZ 오류: ' + err.message); }
}

/* ═══════════════════════════════════════════════
   내보내기
═══════════════════════════════════════════════ */
function doExport() {
  const fmt = document.getElementById('exportFmt').value;
  const vis = document.getElementById('exportArea').value === 'visible';
  if (fmt==='kmz') exportKMZ(vis); else if (fmt==='gpx') exportGPX(vis); else exportCSV();
}

function getMks(vis) {
  if (!vis) return markers;
  const ext = olMap.getView().calculateExtent(olMap.getSize());
  return markers.filter(m => ol.extent.containsCoordinate(ext, m.feat.getGeometry().getCoordinates()));
}
function getLyrs(vis) {
  if (!vis) return polylines;
  const ext = olMap.getView().calculateExtent(olMap.getSize());
  return polylines.filter(l => getCoords(l).some(c => ol.extent.containsCoordinate(ext, c)));
}
function defName(ms) {
  const now = new Date();
  const d = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const last = ([...ms].reverse().find(m => !m.isPhoto) || ms.at(-1))?.name || '';
  return `${d}_${last.replace(/[\\/:*?"<>|]/g,'').trim()}`;
}

function exportGPX(vis=false) {
  const ms=getMks(vis), ls=getLyrs(vis);
  const fname=prompt('GPX 파일명', defName(ms)); if(!fname)return;
  let gpx='<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="VWorldMap">\n';
  ls.forEach((l,i)=>{
    const pts=getCoords(l).map(c=>{const ll=fromMerc(c);return `<trkpt lat="${ll[1]}" lon="${ll[0]}"></trkpt>\n`;}).join('');
    gpx+=`<trk><name>path${i+1}</name><trkseg>\n${pts}</trkseg></trk>\n`;
  });
  ms.forEach(m=>{const ll=fromMerc(m.feat.getGeometry().getCoordinates());gpx+=`<wpt lat="${ll[1]}" lon="${ll[0]}"><name>${m.name}</name></wpt>\n`;});
  gpx+='</gpx>';
  dlBlob(new Blob([gpx],{type:'application/gpx+xml'}), fname+'.gpx');
}

async function exportCSV() {
  const ms=getMks(false);
  if(!ms.length){alert('내보낼 마커가 없습니다.');return;}
  const fname=prompt('CSV 파일명', defName(ms)); if(!fname)return;
  let csv='\uFEFF이름,위도,경도,주소\n';
  for(const m of ms){
    const ll=fromMerc(m.feat.getGeometry().getCoordinates());
    const addr=m.addr||await new Promise(r=>reverseGeocode(ll[0],ll[1],r));
    csv+=`"${m.name}",${ll[1]},${ll[0]},"${addr}"\n`;
  }
  dlBlob(new Blob([csv],{type:'text/csv;charset=utf-8;'}), fname+'.csv');
}

async function exportKMZ(vis=false) {
  const ms=getMks(vis), ls=getLyrs(vis);
  const fname=prompt('KMZ 파일명', defName(ms)); if(!fname)return;
  const zip=new JSZip();
  const pFiles=new Array(ms.length).fill(null);
  let pc=0;
  for(let i=0;i<ms.length;i++){
    const m=ms[i];
    if(m.isPhoto&&m.imgSrc){
      pc++;
      const safe=(m.name||'photo').replace(/[^\w가-힣\-_.]/g,'_');
      const fn=`${pc}_${safe}.jpg`;
      pFiles[i]=fn;
      zip.file(`files/${fn}`, (await compressImage(m.imgSrc)).split(',')[1], {base64:true});
    }
  }
  // KML: 경도,위도,고도 순서
  let kml=`<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(fname)}</name>\n`;
  ls.forEach((l,i)=>{
    const coords=getCoords(l).map(c=>{const ll=fromMerc(c);return `${ll[0]},${ll[1]},0`;}).join(' ');
    kml+=`<Placemark><name>path${i+1}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;
  });
  ms.forEach((m,i)=>{
    const ll=fromMerc(m.feat.getGeometry().getCoordinates());
    if(m.isPhoto&&pFiles[i]){
      kml+=`<Placemark><name>${esc(m.name)}</name><description><![CDATA[<img src="files/${pFiles[i]}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${pFiles[i]}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
    } else {
      kml+=`<Placemark><name>${esc(m.name)}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
    }
  });
  kml+='</Document></kml>';
  zip.file('doc.kml', kml);
  const blob=await zip.generateAsync({type:'blob'});
  dlBlob(new File([blob], fname+'.kmz', {type:'application/vnd.google-earth.kmz'}), fname+'.kmz');
}

/* ═══════════════════════════════════════════════
   이미지 압축 / GPS 다운로드
═══════════════════════════════════════════════ */
function compressImage(src) {
  return new Promise(res => {
    const qv = parseInt(document.getElementById('photoQuality')?.value||'500');
    if(qv===0){res(src);return;}
    const img = new Image();
    img.onload = () => {
      const T=qv*1024, M=1920;
      let w=img.width, h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.85, r=cv.toDataURL('image/jpeg',q);
      while(r.length*.75>T&&q>0.1){q=Math.round((q-.05)*100)/100;r=cv.toDataURL('image/jpeg',q);}
      res(r);
    };
    img.src=src;
  });
}

function downloadPhotoWithGPS(imgSrc, name, lat, lng) {
  return new Promise(res => {
    const qv = parseInt(document.getElementById('photoQuality')?.value||'500');
    const toDMS = v => { const a=Math.abs(v),d=Math.floor(a),m=Math.floor((a-d)*60),s=(a-d-m/60)*3600; return [[d,1],[m,1],[Math.round(s*100),100]]; };
    const addGPS = dataUrl => {
      try {
        let ex={}; try{ex=piexif.load(dataUrl);}catch(e){}
        if(!ex.GPS)ex.GPS={};
        ex.GPS[piexif.GPSIFD.GPSLatitudeRef]  = lat>=0?'N':'S';
        ex.GPS[piexif.GPSIFD.GPSLatitude]     = toDMS(lat);
        ex.GPS[piexif.GPSIFD.GPSLongitudeRef] = lng>=0?'E':'W';
        ex.GPS[piexif.GPSIFD.GPSLongitude]    = toDMS(lng);
        return piexif.insert(piexif.dump(ex), dataUrl);
      } catch(e){return dataUrl;}
    };
    const go = dataUrl => {
      const a=document.createElement('a');
      a.href=addGPS(dataUrl); a.download=(name||'image')+'.jpg';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(res,300);
    };
    if(qv===0){go(imgSrc);return;}
    const img=new Image();
    img.onload=()=>{
      const T=qv*1024,M=1920;
      let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      let q=0.92,r=cv.toDataURL('image/jpeg',q);
      while(r.length*.75>T&&q>0.1){q=Math.round((q-.05)*100)/100;r=cv.toDataURL('image/jpeg',q);}
      go(r);
    };
    img.src=imgSrc;
  });
}

async function downloadAllPhotos() {
  for(const m of markers.filter(m=>m.isPhoto&&m.imgSrc)){
    const ll=fromMerc(m.feat.getGeometry().getCoordinates());
    await downloadPhotoWithGPS(m.imgSrc, m.name, ll[1], ll[0]);
  }
}

/* ═══════════════════════════════════════════════
   공통 유틸
═══════════════════════════════════════════════ */
// toMerc(경도, 위도) — x=경도, y=위도
function toMerc(lng,lat){ return ol.proj.transform([lng,lat],'EPSG:4326','EPSG:3857'); }
function fromMerc(c)    { return ol.proj.transform(c,'EPSG:3857','EPSG:4326'); }
function pad(n)         { return String(n).padStart(2,'0'); }
function randColor()    { return '#'+Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'); }
function esc(s)         { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function extractGPS(imgSrc) {
  try {
    const exif=piexif.load(imgSrc), gps=exif['GPS'];
    if(!gps?.[piexif.GPSIFD.GPSLatitude])return null;
    const toDec=(dms,ref)=>{const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1];return(d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1);};
    const la=toDec(gps[piexif.GPSIFD.GPSLatitude],gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
    const lo=toDec(gps[piexif.GPSIFD.GPSLongitude],gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
    return(isNaN(la)||isNaN(lo)||(!la&&!lo))?null:[lo,la];
  }catch(e){return null;}
}

function fitPts(pts) {
  if(!pts||!pts.length)return;
  const ext=ol.extent.boundingExtent(pts);
  if(!ol.extent.isEmpty(ext))
    olMap.getView().fit(ext,{padding:[60,60,60,60],maxZoom:17,duration:500});
}

function dlBlob(blob, filename) {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=filename;
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
}

function parseCSV(line) {
  const r=[]; let cur='', inQ=false;
  for(const ch of line){
    if(ch==='"')inQ=!inQ;
    else if(ch===','&&!inQ){r.push(cur.trim());cur='';}
    else cur+=ch;
  }
  r.push(cur.trim()); return r;
}
