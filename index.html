// ─── 묶음선 뷰포트 컬링 + 줌별 점 단순화 (map.html cullBundlePolys 이식) ──
// Kakao 는 오버레이의 '전체' 좌표를 줌/이동 때마다 SVG 로 다시 그린다(뷰포트 클리핑 없음)
// → 좌표 수만 점짜리 묶음선(KMZ MultiGeometry)은 줌인이 매우 느림.
// 해결: 화면(+여유 30%)과 교차하는 구간만, 화면에서 ~1.3px 이상 간격인 점만 setPath 로 반영.
// 원본 좌표는 poly._parts 에 그대로 → 내보내기/자동저장은 영향 없음.
// 화면 밖으로 완전히 나가 지도에서 뗀 선은 _viewCulled=true (내보내기에선 표시 중으로 취급).
let _cullTimer = null;
function scheduleBundleCull() { clearTimeout(_cullTimer); _cullTimer = setTimeout(cullBundlePolys, 60); }
function cullBundlePolys() {
  if (typeof map === 'undefined' || !map) return;
  const b = map.getBounds(); if (!b) return;
  const swp = b.getSouthWest(), nep = b.getNorthEast();
  const latSpan = nep.getLat() - swp.getLat(), lngSpan = nep.getLng() - swp.getLng();
  const s = swp.getLat() - latSpan * 0.3, n = nep.getLat() + latSpan * 0.3;
  const w = swp.getLng() - lngSpan * 0.3, e = nep.getLng() + lngSpan * 0.3;
  const mapH = (document.getElementById('map') || {}).clientHeight || 800;
  const eps = latSpan / mapH * 1.3;   // 화면 ~1.3px 미만 간격 점은 생략 (줌아웃일수록 크게 줄어듦)
  for (const en of polylines) {
    const pl = en.poly;
    if (!pl || !pl._parts) continue;
    // 좌표 숫자 캐시 (getLat/getLng 반복 호출 절약)
    if (!pl._pnum) pl._pnum = pl._parts.map(part => part.map(p => [p.getLat(), p.getLng()]));
    const parts = [];
    for (let pi = 0; pi < pl._parts.length; pi++) {
      const part = pl._parts[pi], num = pl._pnum[pi];
      if (num.length < 2) continue;
      let run = null;
      let pla = num[0][0], plo = num[0][1];
      let prevIn = (pla >= s && pla <= n && plo >= w && plo <= e);
      if (prevIn) { run = [part[0]]; run._la = pla; run._lo = plo; parts.push(run); }
      for (let i = 1; i < num.length; i++) {
        const la = num[i][0], lo = num[i][1];
        const pin = (la >= s && la <= n && lo >= w && lo <= e);
        let segIn = pin || prevIn;
        if (!segIn) {
          // 양 끝점이 밖이어도 화면을 '가로지르는' 선분은 포함 (선분 bbox 교차 판정)
          const l1 = Math.min(pla, la), l2 = Math.max(pla, la);
          const g1 = Math.min(plo, lo), g2 = Math.max(plo, lo);
          segIn = !(l2 < s || l1 > n || g2 < w || g1 > e);
        }
        if (segIn) {
          if (!run) { run = [part[i - 1]]; run._la = pla; run._lo = plo; parts.push(run); }
          // 단순화: 마지막 채택점과 eps 이상 떨어졌거나 / 구간 끝 / 화면 이탈점이면 채택
          if (Math.abs(la - run._la) > eps || Math.abs(lo - run._lo) > eps ||
              i === num.length - 1 || !pin) {
            run.push(part[i]); run._la = la; run._lo = lo;
          }
          if (!pin) run = null;   // 화면 밖으로 나감 → 다음 교차 구간은 새 run
        } else run = null;
        pla = la; plo = lo; prevIn = pin;
      }
    }
    const vis = parts.filter(r => r.length >= 2);
    if (vis.length) {
      pl.setPath(vis.length === 1 ? vis[0] : vis);
      pl._viewCulled = false;
      if (!pl.getMap()) pl.setMap(map);
    } else {
      pl._viewCulled = true;   // 화면 밖 컬링일 뿐 — 내보내기에선 표시 중으로 취급
      if (pl.getMap()) pl.setMap(null);
    }
  }
}

// ─── 트랙 → KML Placemark 직렬화 (내보내기/자동저장 공용) ──
// 묶음선(entry.parts)은 MultiGeometry 한 개로, 색·굵기는 공유 <Style id="ln_RRGGBB_W">로.
// map.html _lineKmlPlacemarks 대응 — 다시 열어도 색·굵기 유지.
function _lineKmlPlacemark(en, styles) {
  const parts = (en.parts && en.parts.length) ? en.parts : [en.path];
  const segs = [];
  for (const cs of parts) {
    if (!cs || cs.length < 2) continue;
    const coords = cs.map(p => `${p.getLng()},${p.getLat()},0`).join(' ');
    segs.push(`<LineString><coordinates>${coords}</coordinates></LineString>`);
  }
  if (!segs.length) return '';
  const safeName = (en.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let su = '';
  if (styles) {
    const hex = ((en.color || '#FF5733') + '').replace('#','');
    const w = en.width || 4;
    const key = hex + '_' + w;
    if (!styles.has(key)) styles.set(key, 'ln_' + key);
    su = `<styleUrl>#${styles.get(key)}</styleUrl>`;
  }
  const geom = segs.length === 1 ? segs[0] : `<MultiGeometry>${segs.join('')}</MultiGeometry>`;
  return `\n  <Placemark>\n    <name>${safeName}</name>${su}\n    ${geom}\n  </Placemark>`;
}
// styles(Map: 'RRGGBB_w' -> id) -> KML <Style> 정의 (KML 색은 aabbggrr)
function _lineKmlStyleDefs(styles) {
  let out = '';
  for (const [key, id] of styles) {
    const [hex, w] = key.split('_');
    out += `\n  <Style id="${id}"><LineStyle><color>ff${hex.slice(4,6)}${hex.slice(2,4)}${hex.slice(0,2)}</color><width>${w}</width></LineStyle></Style>`;
  }
  return out;
}
// 사진 메타(설명/촬영일시) → ExtendedData 조각 (자동저장/내보내기 → 재로드 복원용)
function _photoMetaXml(m) {
  let s = '';
  if (m.desc) s += `<Data name="desc"><value>${_escXml(m.desc)}</value></Data>`;
  if (m.taken) s += `<Data name="taken"><value>${_escXml(m.taken)}</value></Data>`;
  if (m.origKey) s += `<Data name="orig"><value>${_escXml(m.origKey)}</value></Data>`;   // 원본 보관소 키
  return s;
}
// 텍스트 라벨 → KML Placemark (kind=text — 자동저장/내보내기 복원용)
function _textKmlPlacemark(t) {
  const safeName = (t.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `\n  <Placemark>\n    <name>${safeName}</name>\n    <ExtendedData><Data name="kind"><value>text</value></Data><Data name="rot"><value>${t.rot}</value></Data><Data name="color"><value>${t.color}</value></Data></ExtendedData>\n    <Point><coordinates>${t.pos.getLng()},${t.pos.getLat()},0</coordinates></Point>\n  </Placemark>`;
}

// ─── KMZ 불러오기 ─────────────────────────────────────
async function loadKMZ(file, silent = false) {
  if (!silent) showLoading('KMZ 압축 해제 중...');
  else showLoading('이전 데이터 복원 중...');

  // DB 자동 복원(silent)일 때만 기존 데이터 초기화
  // 사용자가 직접 불러올 때는 기존 마커/선 유지하고 추가
  if (silent) {
    markers.forEach(m => { m.iw.close(); m.marker.setMap(null); });
    markers = [];
    polylines.forEach(p => p.poly.setMap(null));
    polylines = [];
    clearTextLabels();
    hasData = false;
    document.getElementById('saveBtn').disabled = true;
  }

  // 선은 파싱 중엔 지도에 안 붙이고 모아뒀다가 setBounds 후 한 번에 붙인다.
  // (파싱 중 map 에 붙이면 현재 줌에서 그리고, setBounds 로 화면이 바뀌며 전부
  //  다시 그려 이중 렌더 → 대형 KMZ 로딩이 느렸음. map.html 과 동일 방식)
  const _deferPolys = [];
  try {
    // KMZ(zip)는 'PK'(0x50 0x4B)로 시작. 평문 .kml 은 zip 이 아니므로 헤더로 판별.
    let zip = null, zipFiles = [], kmlText = null;
    const head = new Uint8Array(await file.slice(0, 2).arrayBuffer());
    const isZip = head[0] === 0x50 && head[1] === 0x4B;
    if (!isZip) {
      if (!/\.kml$/i.test(file.name)) { alert('KMZ / ZIP / KML 파일만 불러올 수 있습니다.'); hideLoading(); return; }
      kmlText = await file.text();   // 평문 KML (내부 임베드 사진 없음 — 마커/트랙만)
    } else {
    zip = await JSZip.loadAsync(file);
    zipFiles = Object.keys(zip.files);

    // 파일명에 널문자(\u0000)가 포함된 경우 제거 후 탐색
    for (const name of zipFiles) {
      const cleanName = name.replace(/\0/g, '');
      if (/\.kml$/i.test(cleanName)) {
        try {
          const text = await zip.files[name].async('string');
          if (text && text.length > 0) { kmlText = text; break; }
        } catch(e) {}
      }
    }
    if (!kmlText) { alert('.kml 파일을 읽을 수 없습니다.\n포함된 파일:\n' + zipFiles.map(n=>n.replace(/\0/g,'')).join('\n')); hideLoading(); return; }
    }

    showLoading('데이터 읽는 중...');
    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    // Folder 안에 있는 Placemark도 모두 포함
    const placemarks = Array.from(xml.getElementsByTagName('Placemark'));
    const bounds = new kakao.maps.LatLngBounds();

    // KML 스타일 맵 (styleUrl -> 색·굵기). KML 색은 aabbggrr 순서. (map.html 이식)
    const styleColors = {}, styleWidths = {};
    const kmlC2Hex = c => { c = (c||'').trim(); if (c.length < 8) return null; return '#' + c.slice(6,8) + c.slice(4,6) + c.slice(2,4); };
    for (const st of Array.from(xml.getElementsByTagName('Style'))) {
      const id = st.getAttribute('id'); if (!id) continue;
      const cs = (st.getElementsByTagName('LineStyle')[0] || st.getElementsByTagName('PolyStyle')[0]);
      const h = kmlC2Hex(cs?.getElementsByTagName('color')[0]?.textContent);
      if (h) styleColors['#'+id] = h;
      const w = parseFloat(cs?.getElementsByTagName('width')[0]?.textContent);
      if (!isNaN(w)) styleWidths['#'+id] = w;
    }

    for (let i = 0; i < placemarks.length; i++) {
      const pm = placemarks[i];
      const pmName = pm.getElementsByTagName('name')[0]?.textContent?.trim()
                  || pm.getElementsByTagName('n')[0]?.textContent?.trim()
                  || '설명 없음';

      // 이미지 경로 방법 1: Data 태그 (기존 방식)
      let photoFilename = '';
      for (const d of Array.from(pm.getElementsByTagName('Data'))) {
        if (d.getAttribute('name') === 'photoFile') {
          photoFilename = d.getElementsByTagName('value')[0]?.textContent || '';
          break;
        }
      }

      // 이미지 경로 방법 2: description 안 <img src="..."> 추출 (CDATA 포함)
      if (!photoFilename) {
        const descEl = pm.getElementsByTagName('description')[0];
        if (descEl) {
          const descText = descEl.textContent || '';
          const imgMatch = descText.match(/src=["']([^"']+\.(jpe?g|png))["']/i)
                        || descText.match(/src=([^\s>]+\.(jpe?g|png))/i);
          if (imgMatch) {
            const thumbPath = imgMatch[1].trim();
            const rollPath = thumbPath.replace('_thumb.', '_roll.');
            const rollEntry = zipFiles.find(z => z === rollPath || z.endsWith('/' + rollPath.split('/').pop()));
            photoFilename = rollEntry ? rollPath : thumbPath;
          }
        }
      }

      // ── 선/폴리곤 도형 전부 수집 (MultiGeometry 안의 모든 LineString + Polygon 링) ──
      const coordEls = [];
      for (const ls of Array.from(pm.getElementsByTagName('LineString')))
        coordEls.push(ls.getElementsByTagName('coordinates')[0]);
      for (const pg of Array.from(pm.getElementsByTagName('Polygon')))
        for (const lr of Array.from(pg.getElementsByTagName('LinearRing')))
          coordEls.push(lr.getElementsByTagName('coordinates')[0]);

      const point = pm.getElementsByTagName('Point')[0];

      if (coordEls.length) {
        const su = pm.getElementsByTagName('styleUrl')[0]?.textContent?.trim();
        const color = (su && styleColors[su]) || randColor();
        // Kakao는 선 굵기를 정수 px로 렌더 → 소수 굵기(0.6 등)는 올림(ceil)으로 구분
        const sw = (su && styleWidths[su] != null) ? Math.max(1, Math.ceil(styleWidths[su])) : 4;
        // Placemark 하나(MultiGeometry 포함)의 모든 선을 멀티파트 Polyline 1개로 —
        // 선별 개별 Polyline 은 수천 개 KMZ 에서 pan/zoom 버벅임 (map.html 과 동일 경량화).
        // 원본 경로는 _parts/entry.parts 에 보관(getPath()가 멀티파트를 유실하므로 저장용).
        const parts = [];
        for (const ce of coordEls) {
          const coordsText = ce?.textContent || '';
          const pts = coordsText.trim().split(/\s+/).map(c => {
            const [lng, lat] = c.split(',').map(Number);
            return new kakao.maps.LatLng(lat, lng);
          }).filter(ll => !isNaN(ll.getLat()) && !isNaN(ll.getLng()));
          if (pts.length < 2) continue;
          pts.forEach(p => bounds.extend(p));
          parts.push(pts);
        }
        if (parts.length) {
          const poly = new kakao.maps.Polyline({ path: parts.length === 1 ? parts[0] : parts, strokeWeight: sw, strokeColor: color, strokeOpacity: 1 });
          if (parts.length > 1) poly._parts = parts;   // 단일 경로는 점 편집 가능 — getPath()로 최신 경로 사용
          _deferPolys.push(poly);   // setBounds 후 한 번에 setMap
          const entry = { poly, name: pmName, path: parts.length === 1 ? parts[0] : parts.flat(), parts: parts.length > 1 ? parts : null, color, width: sw };
          attachPolylineDelete(poly, entry);
          polylines.push(entry);
        }
      } else if (point && (() => {
        // ── CAD 문자(kind=text): 마커 대신 회전 텍스트 라벨만 그림 ──
        for (const d of Array.from(pm.getElementsByTagName('Data'))) {
          if (d.getAttribute('name') === 'kind')
            return (d.getElementsByTagName('value')[0]?.textContent || '').trim() === 'text';
        }
        return false;
      })()) {
        const ct = point.getElementsByTagName('coordinates')[0]?.textContent || '';
        const [lng, lat] = ct.trim().split(',').map(Number);
        if (!isNaN(lat) && !isNaN(lng)) {
          let _rot = 0, _col = '';
          for (const d of Array.from(pm.getElementsByTagName('Data'))) {
            const nm = d.getAttribute('name'); const v = d.getElementsByTagName('value')[0]?.textContent || '';
            if (nm === 'rot') _rot = parseFloat(v) || 0; else if (nm === 'color') _col = v.trim();
          }
          const ll = new kakao.maps.LatLng(lat, lng); bounds.extend(ll);
          addTextLabel(ll, pmName, _rot, _col);
        }
      } else if (point) {
        const coordsText = point.getElementsByTagName('coordinates')[0]?.textContent || '';
        const [lng, lat] = coordsText.trim().split(',').map(Number);
        if (isNaN(lat) || isNaN(lng)) continue;
        const ll = new kakao.maps.LatLng(lat, lng);
        bounds.extend(ll);

        if (photoFilename) {
          // files/, images/, photo/ 등 다양한 경로 후보 탐색 (널문자 제거 후 비교)
          const baseName = photoFilename.split('/').pop();
          let photoZipFile = null;
          for (const name of zipFiles) {
            const cleanName = name.replace(/\0/g, '');
            if (cleanName === photoFilename ||
                cleanName === `files/${photoFilename}` ||
                cleanName === `images/${baseName}` ||
                cleanName === `photo/${baseName}` ||
                cleanName.endsWith('/' + baseName) ||
                cleanName === baseName) {
              photoZipFile = zip.files[name];
              break;
            }
          }
          if (photoZipFile) {
            const base64 = await photoZipFile.async('base64');
            const ext = baseName.split('.').pop().toLowerCase();
            const mime = ext === 'png' ? 'image/png' : 'image/jpeg';
            addPhotoMarker(ll, `data:${mime};base64,${base64}`, pmName);
            // 저장된 사진 메타(설명/촬영일시) 복원
            const _en = markers[markers.length - 1];
            if (_en) {
              for (const d of Array.from(pm.getElementsByTagName('Data'))) {
                const nm = d.getAttribute('name'); const v = d.getElementsByTagName('value')[0]?.textContent || '';
                if (nm === 'desc') _en.desc = v; else if (nm === 'taken') _en.taken = v;
                else if (nm === 'orig') _en.origKey = v;   // 원본 보관소 키 (이 기기 DB에 있을 때만 유효)
              }
            }
          } else {
            addMarker(ll, pmName);
          }
        } else {
          addMarker(ll, pmName);
        }
      }

      if (i % 10 === 0) {
        showLoading(`마커 생성 중... (${i + 1} / ${placemarks.length})`);
        await new Promise(r => setTimeout(r, 0));
      }
    }

    if (!bounds.isEmpty()) map.setBounds(bounds);
    // 화면(줌) 확정 후 한 번만 그림. 묶음선(_parts)은 컬링이 화면 교차 구간만 붙임.
    _deferPolys.forEach(p => { if (!p._parts) p.setMap(map); });
    cullBundlePolys();
    hasData = true;
    document.getElementById('saveBtn').disabled = false;
    hideLoading();
  } catch (err) {
    hideLoading();
    // 오류 전까지 파싱된 선은 그대로 표시 (숨은 채 남지 않게)
    try { _deferPolys.forEach(p => { if (!p._parts && !p.getMap()) p.setMap(map); }); cullBundlePolys(); } catch(e) {}
    alert('오류: ' + err.message);
  }
}
</script>
</body>
</html>
