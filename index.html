<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="KMZ뷰어">
  <meta name="theme-color" content="#1a73e8">
  <title>KMZ 뷰어</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
  <!-- 뒤로가기로 앱이 종료되지 않도록 Kakao 로딩보다 먼저 버퍼 설치 -->
  <!-- addEventListener 사용: window.onpopstate=null 로 덮어쓰는 외부 라이브러리에 영향 안 받음 -->
  <script>
  history.replaceState({k:0},'','');
  history.pushState({k:1},'','');
  history.pushState({k:2},'','');
  function _earlyBackHandler(){ history.forward(); }
  window.addEventListener('popstate', _earlyBackHandler);
  </script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=94bf4516825c146467eb2318cd55b782&autoload=false&libraries=services"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── 상단 주소표시 ── */
    #address-display {
      position: absolute; top: 10px; left: 10px; z-index: 2000;
      background: rgba(0,0,0,0.62); color: white; font-size: 13px;
      padding: 5px 10px; border-radius: 6px; pointer-events: auto; cursor: pointer;
      white-space: nowrap; max-width: calc(100vw - 24px);
      overflow: hidden; text-overflow: ellipsis;
    }

    .btn {
      position: absolute; z-index: 1000;
      background: white; border: none; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; width: 48px; height: 48px;
      touch-action: manipulation;   /* 더블탭 확대 대기 제거 → 탭 즉시 click 발생 */
    }
    #saveBtn { top: 16px; right: 72px; }
    #saveBtn:disabled { opacity: 0.4; cursor: not-allowed; }
    #loadBtn { top: 16px; right: 16px; }
    #myLocationBtn { top: 72px; right: 16px; padding: 0; transition: background 0.2s; }
    /* 1단계: 내위치만 표시 (하늘색) */
    #myLocationBtn.loc-show { background: #e3f2fd; box-shadow: 0 2px 8px rgba(79,195,247,0.5); }
    #myLocationBtn.loc-show svg path, #myLocationBtn.loc-show svg circle { stroke: #039be5; }
    /* 2단계: 위치 따라가기 (파란색) */
    #myLocationBtn.loc-follow { background: #1a73e8; box-shadow: 0 2px 8px rgba(26,115,232,0.6); }
    #myLocationBtn.loc-follow svg path, #myLocationBtn.loc-follow svg circle { stroke: white; }
    #drawBtn { top: 128px; right: 16px; padding: 0; transition: background 0.2s; font-size: 18px; }
    #drawBtn.active { background: #e53935; box-shadow: 0 2px 8px rgba(219,68,55,0.6); }
    /* 선그리기 색/굵기 버튼 (그리기 중에만 표시) */
    #drawStyleBtn { top: 128px; right: 72px; display: none; font-size: 18px; }
    #drawStyleBtn.show { display: flex; }
    #drawStyleBtn .dsb-line { width: 26px; border-radius: 3px; background: #FF5733; height: 4px; }
    #markerBtn { top: 184px; right: 16px; padding: 0; transition: background 0.2s; font-size: 20px; }
    #markerBtn.active { background: #43a047; box-shadow: 0 2px 8px rgba(67,160,71,0.6); }
    #clearBtn { top: 240px; right: 16px; padding: 0; transition: background 0.2s; }

    /* ── 사진 정보/메타 수정 모달 ── */
    #photoInfoModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 7800;
      align-items: center; justify-content: center; padding: 16px;
    }
    #photoInfoModal.show { display: flex; }
    #photoInfoBox {
      background: white; width: 100%; max-width: 420px;
      border-radius: 14px; padding: 18px 18px 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
      max-height: 90vh; overflow-y: auto;
    }
    #photoInfoBox h3 { margin: 0 0 12px; font-size: 16px; color: #333; }
    #photoInfoBox label { display: block; font-size: 12px; color: #888; margin: 8px 0 3px; }
    #photoInfoBox input, #photoInfoBox textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 14px; outline: none; font-family: inherit; resize: vertical;
    }
    #photoInfoBox input:focus, #photoInfoBox textarea:focus { border-color: #1a73e8; }
    .pi-row { font-size: 13px; color: #555; margin-top: 8px; word-break: break-all; }
    .pi-btns { display: flex; gap: 8px; margin-top: 14px; }
    .pi-btns button {
      flex: 1; padding: 11px 4px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #piSaveBtn { background: #1a73e8; color: white; }
    #piDownloadBtn { background: #00897b; color: white; }
    #piCloseBtn { background: #f1f3f4; color: #555; }

    /* 마커 조준원 */
    #crosshair {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      border: 3px solid #e53935; border-radius: 50%;
      pointer-events: none; z-index: 2000;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.15);
    }
    #crosshair::after {
      content: ''; position: absolute;
      top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 7px; height: 7px;
      background: #e53935; border-radius: 50%;
    }
    #crosshair.show { display: block; }

    /* 마커 수정/삭제 모달 */
    #markerEditModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 7500;
      align-items: flex-start; justify-content: center;
    }
    #markerEditModal.show { display: flex; }
    #markerEditModalBox {
      background: white; width: 100%; max-width: 480px;
      border-radius: 0 0 16px 16px;
      padding: 20px 20px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      animation: slideDown 0.22s ease;
    }
    #markerEditModal h3 { margin: 0 0 14px; font-size: 16px; color: #333; }
    #markerEditNameInput {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 15px; outline: none;
      transition: border-color 0.15s; margin-bottom: 14px;
    }
    #markerEditNameInput:focus { border-color: #1a73e8; }
    .edit-modal-btns { display: flex; gap: 10px; }
    .edit-modal-btns button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    #editSaveBtn  { background: #1a73e8; color: white; }
    #editDeleteBtn{ background: #e53935; color: white; }
    #editCancelBtn{ background: #f1f3f4; color: #555; }
    #editMoveBtn  { background: #00897b; color: white; }
    #markerEditModalBox .edit-modal-btns button { font-size: 13px; padding: 10px 4px; }

    /* ── 이동 힌트 ── */
    #moveHint {
      display: none; position: fixed; bottom: 100px;
      left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.84); color: white; font-size: 13px;
      padding: 10px 18px; border-radius: 12px; z-index: 5100;
      pointer-events: auto; text-align: center; white-space: nowrap;
    }
    #moveHint.show { display: block; }
    #moveHint .mh-row { margin-top: 8px; display: flex; gap: 8px; justify-content: center; }
    #moveHint .mh-row button { padding: 6px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    #moveHint .mh-ok  { background: #1a73e8; color: white; }
    #moveHint .mh-cancel { background: #555; color: white; }

    /* ── 지도종류 선택 ── */
    #mapTypeBox { position: absolute; z-index: 1000; top: 296px; right: 16px; }
    #mapTypeBox select {
      width: 48px; padding: 5px 1px; border: none; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); font-size: 11px;
      background: white; cursor: pointer; text-align: center;
    }

    /* ── 선 스타일 피커 (색상/굵기) ── */
    #stylePicker {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 9500;
      align-items: center; justify-content: center;
    }
    #stylePicker.show { display: flex; }
    #stylePickerBox {
      background: white; border-radius: 14px;
      padding: 18px 18px 16px; width: 300px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    #stylePickerBox h3 { margin: 0 0 12px; font-size: 15px; color: #333; }
    .sp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 9px; margin-bottom: 14px; }
    .sp-swatch {
      width: 100%; aspect-ratio: 1; border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.18); cursor: pointer; padding: 0;
    }
    .sp-swatch.sel { outline: 3px solid #1a73e8; outline-offset: 2px; }
    .sp-widths { display: flex; gap: 6px; margin-bottom: 14px; }
    .sp-w {
      flex: 1; height: 38px; border: 1.5px solid #ddd; border-radius: 8px;
      background: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }
    .sp-w.sel { border-color: #1a73e8; background: #e8f0fe; }
    .sp-w span { display: block; width: 100%; border-radius: 2px; background: #444; }
    #spCloseBtn {
      width: 100%; padding: 11px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: #f1f3f4; color: #555;
    }

    /* 선 컨텍스트 메뉴 */
    #polyMenu {
      display: none; position: fixed; z-index: 9000;
      background: white; border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      overflow: hidden; min-width: 140px;
    }
    #polyMenu.show { display: block; }
    #polyMenu button {
      display: block; width: 100%; padding: 13px 18px;
      border: none; background: none; text-align: left;
      font-size: 15px; cursor: pointer;
    }
    #polyMenu button:hover { background: #f1f3f4; }
    #polyMenu button.danger { color: #e53935; }

    /* CSS scale 줌 버튼 */
    #zoomBtns {
      position: absolute; z-index: 1000;
      right: 16px; bottom: 32px;
      display: flex; flex-direction: column; gap: 4px;
    }
    #zoomBtns button {
      width: 48px; height: 48px;
      background: white; border: none; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      font-size: 26px; font-weight: 300; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #333;
      touch-action: manipulation;
    }
    #zoomBtns button:active { background: #f1f3f4; }
    .distance-overlay {
      background: white; border: 1.5px solid #db4040;
      padding: 4px 8px; border-radius: 6px;
      font-size: 12px; font-weight: 600; color: #db4040;
      white-space: nowrap; pointer-events: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    #myLocationBtn svg { width: 26px; height: 26px; }
    #fileInput { display: none; }

    /* 로딩 */
    #loading {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 9999;
      flex-direction: column; gap: 12px;
      align-items: center; justify-content: center;
      color: white; font-size: 15px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 삭제 힌트 토스트 */
    #deleteHint {
      display: none; position: fixed;
      bottom: 32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.75); color: white;
      font-size: 13px; padding: 8px 16px;
      border-radius: 20px; z-index: 5000;
      pointer-events: none; white-space: nowrap;
    }
    #deleteHint.show { display: block; }

    /* 사진 InfoWindow */
    .photo-iw { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.35); max-width: 300px; }
    .photo-iw-header { display: flex; justify-content: space-between; align-items: center; padding: 7px 10px; font-size: 13px; font-weight: bold; border-bottom: 1px solid #eee; gap: 6px; }
    .photo-iw-header .iw-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .photo-iw-header .iw-map-btn { font-size: 15px; cursor: pointer; line-height: 1; }
    .photo-iw-header .iw-close { cursor: pointer; color: #999; font-size: 14px; line-height: 1; }
    .photo-iw img { width: 100%; max-height: 260px; object-fit: cover; display: block; cursor: zoom-in; }

    /* 전체화면 사진 뷰어 */
    #photoViewer {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.9); z-index: 8000;
      align-items: center; justify-content: center;
      flex-direction: column; padding: 16px;
    }
    #photoViewer.show { display: flex; }
    #photoViewer img { max-width: 100%; max-height: 85vh; border-radius: 8px; object-fit: contain; }
    #photoViewer .pv-name { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 10px; }

    /* 마커 추가 모달 */
    #markerModal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 7000;
      align-items: flex-start; justify-content: center;
    }
    #markerModal.show { display: flex; }
    #markerModalBox {
      background: white; width: 100%; max-width: 480px;
      border-radius: 0 0 16px 16px;
      padding: 20px 20px 24px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
      animation: slideDown 0.22s ease;
    }
    @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    #markerModal h3 { margin: 0 0 14px; font-size: 16px; color: #333; }
    #markerNameInput {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #ddd; border-radius: 10px;
      font-size: 15px; outline: none;
      transition: border-color 0.15s;
    }
    #markerNameInput:focus { border-color: #1a73e8; }
    .modal-btns { display: flex; gap: 10px; margin-top: 14px; }
    .modal-btns button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    #modalCancelBtn { background: #f1f3f4; color: #555; }
    #modalConfirmBtn { background: #1a73e8; color: white; }
    #modalConfirmBtn:active { background: #1558b0; }

    /* iOS 설치 안내 배너 */
    #installBanner {
      display: none; position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white; padding: 14px 16px;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
      z-index: 6000; flex-direction: column; gap: 8px;
    }
    #installBanner.show { display: flex; }
    #installBanner .banner-row { display: flex; align-items: center; justify-content: space-between; }
    #installBanner .banner-text { font-size: 14px; color: #333; line-height: 1.5; }
    #installBanner .banner-close { background: none; border: none; font-size: 20px; color: #999; cursor: pointer; padding: 4px; }
    #installBanner .banner-step { font-size: 12px; color: #666; }
  </style>
</head>
<body>

<div id="map"></div>

<!-- 주소 표시 -->
<div id="address-display" onclick="copyAddr()" title="탭하면 주소 복사">위치 확인 중...</div>

<button class="btn" id="saveBtn" title="KMZ로 저장" disabled>💾</button>
<button class="btn" id="loadBtn" title="KMZ / 사진 불러오기">📂</button>
<button class="btn" id="myLocationBtn" title="현재 위치">
  <svg viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="4" stroke="#1a73e8" stroke-width="2"/>
    <circle cx="12" cy="12" r="8" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="2 2"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<button class="btn" id="drawBtn" title="선 그리기">✏️</button>
<button class="btn" id="drawStyleBtn" title="선 색상/굵기"><span class="dsb-line"></span></button>
<button class="btn" id="markerBtn" title="마커 추가">📍</button>
<button class="btn" id="clearBtn" title="화면 초기화">🧹</button>
<!-- 지도종류 선택 -->
<div id="mapTypeBox">
  <select id="mapTypeSelect" onchange="changeMapType(this.value)" title="지도 종류">
    <option value="HYBRID" selected>위성+지도</option>
    <option value="SKYVIEW">위성사진</option>
    <option value="ROADMAP">일반지도</option>
    <option value="TERRAIN">🏔️ 지형도</option>
    <option value="USE_DISTRICT">🗺️ 지적도</option>
  </select>
</div>
<input type="file" id="fileInput" accept=".kmz,.zip,.kml,image/jpeg,image/png,.jpg,.jpeg,.png" multiple>

<!-- 마커 조준원 -->
<div id="crosshair"></div>

<!-- 선 컨텍스트 메뉴 -->
<div id="polyMenu">
  <button id="polyEditBtn">✏️ 수정</button>
  <button id="polyStyleBtn">🎨 색상/굵기</button>
  <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
  <button id="polyMenuCancelBtn">✕ 취소</button>
</div>

<!-- 선 스타일 피커 (색상/굵기) -->
<div id="stylePicker">
  <div id="stylePickerBox">
    <h3>🎨 선 색상 / 굵기</h3>
    <div class="sp-grid" id="spGrid"></div>
    <div class="sp-widths" id="spWidths"></div>
    <button id="spCloseBtn">닫기</button>
  </div>
</div>

<!-- CSS scale 줌 버튼 -->
<div id="zoomBtns">
  <button id="cssZoomIn">+</button>
  <button id="cssZoomOut">−</button>
</div>

<!-- 마커 수정/삭제 모달 -->
<div id="markerEditModal">
  <div id="markerEditModalBox">
    <h3>📍 마커 수정</h3>
    <input type="text" id="markerEditNameInput" placeholder="마커 이름" maxlength="50">
    <div class="edit-modal-btns">
      <button id="editSaveBtn">수정</button>
      <button id="editMoveBtn">이동</button>
      <button id="editDeleteBtn">삭제</button>
      <button id="editCancelBtn">취소</button>
    </div>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div id="loadingMsg">불러오는 중...</div>
</div>

<div id="deleteHint">길게 눌러서 마커 / 선을 삭제할 수 있어요</div>

<!-- 이동 힌트 -->
<div id="moveHint">
  지도를 이동하여 마커 위치를 선택하세요
  <div class="mh-row">
    <button class="mh-ok" id="moveOkBtn">확인</button>
    <button class="mh-cancel" id="moveCancelBtn">취소</button>
  </div>
</div>

<div id="photoViewer">
  <img id="viewerImg" src="" alt="">
  <div class="pv-name" id="viewerName"></div>
</div>

<!-- 사진 정보/메타 수정 모달 -->
<div id="photoInfoModal">
  <div id="photoInfoBox">
    <h3>📷 사진 정보 <span style="font-size:11px;color:#bbb;font-weight:400">v7</span></h3>
    <label>제목</label>
    <input type="text" id="piTitle" maxlength="80">
    <label>설명</label>
    <textarea id="piDesc" rows="3"></textarea>
    <div class="pi-row" id="piTaken"></div>
    <div class="pi-row" id="piCoord"></div>
    <div class="pi-row" id="piAddr"></div>
    <div class="pi-btns">
      <button id="piSaveBtn">저장</button>
      <button id="piDownloadBtn">📥 사진저장</button>
      <button id="piCloseBtn">닫기</button>
    </div>
  </div>
</div>

<!-- iOS 홈화면 추가 안내 -->
<div id="installBanner">
  <div class="banner-row">

<script>
// ─── 주소 표시 (클릭 지점) ────────────────────────────
let addrTimer = null;
function scheduleAddrUpdate(lat, lng) {
  clearTimeout(addrTimer);
  addrTimer = setTimeout(() => {
    if (!geocoder) return;
    geocoder.coord2Address(lng, lat, (result, status) => {
      if (status !== kakao.maps.services.Status.OK || !result[0]) {
        document.getElementById('address-display').textContent = '';
        return;
      }
      const addr = result[0].address;
      const parts = (addr?.address_name || '').split(' ').filter(p => !/^\d/.test(p));
      const eupMyeon = parts.find(p => /[읍면]$/.test(p)) || '';
      const ri = parts.find(p => /리$/.test(p)) || '';
      const gu = parts.find(p => /구$/.test(p)) || '';
      const dong = [...parts].reverse().find(p => /동(\d+가)?$/.test(p)) || '';
      let text = '';
      if (eupMyeon && ri) text = `${eupMyeon} ${ri}`;
      else if (eupMyeon) text = eupMyeon;
      else if (gu && dong) text = `${gu} ${dong}`;
      else if (dong) text = dong;
      else text = addr?.address_name || '';
      // 번지(지번) 추가
      const mainNo = addr?.main_address_no || '';
      const subNo  = addr?.sub_address_no  || '';
      if (mainNo) text += ' ' + (subNo && subNo !== '0' ? `${mainNo}-${subNo}` : mainNo);
      document.getElementById('address-display').textContent = text;
    });
  }, 600);
}

function copyAddr() {
  const el = document.getElementById('address-display');
  const val = el.textContent;
  if (!val || val === '위치 확인 중...') return;
  navigator.clipboard.writeText(val).catch(() => {});
  const prev = el.textContent;
  el.textContent = '✅ 복사됨';
  setTimeout(() => el.textContent = prev, 1300);
}

// ─── 마커 추가 모달 ───────────────────────────────────
let pendingMarkerLatLng = null;

function openMarkerModal(latLng) {
  pendingMarkerLatLng = latLng;
  const input = document.getElementById('markerNameInput');
  input.value = '';
  document.getElementById('markerModal').classList.add('show');
  setTimeout(() => input.focus(), 100);
}

function closeMarkerModal() {
  document.getElementById('markerModal').classList.remove('show');
  pendingMarkerLatLng = null;
}

document.getElementById('markerModal').addEventListener('click', e => {
  if (e.target === document.getElementById('markerModal')) closeMarkerModal();
});
document.getElementById('modalCancelBtn').onclick = closeMarkerModal;
document.getElementById('modalConfirmBtn').onclick = () => {
  const name = document.getElementById('markerNameInput').value.trim();
  if (!name) { document.getElementById('markerNameInput').focus(); return; }
  if (pendingMarkerLatLng) {
    addMarker(pendingMarkerLatLng, name);
// [추가]
    document.getElementById('saveBtn').disabled = false;
    autoSaveToDB();
  }
  closeMarkerModal();
};
document.getElementById('markerNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modalConfirmBtn').click();
  if (e.key === 'Escape') closeMarkerModal();
});

// ─── 마커 수정/삭제 모달 ──────────────────────────────
let editTarget = null; // { marker, iw, name, ... }

function openMarkerEditModal(markerObj) {
  editTarget = markerObj;
  document.getElementById('markerEditNameInput').value = markerObj.name || '';
  document.getElementById('markerEditModal').classList.add('show');
  setTimeout(() => document.getElementById('markerEditNameInput').focus(), 100);
}
function closeMarkerEditModal() {
  document.getElementById('markerEditModal').classList.remove('show');
  editTarget = null;
}
document.getElementById('markerEditModal').addEventListener('click', e => {
  if (e.target === document.getElementById('markerEditModal')) closeMarkerEditModal();
});
document.getElementById('editCancelBtn').onclick = closeMarkerEditModal;
document.getElementById('editSaveBtn').onclick = () => {
  if (!editTarget) return;
  const newName = document.getElementById('markerEditNameInput').value.trim();
  if (!newName) { document.getElementById('markerEditNameInput').focus(); return; }
  // 이름 업데이트
  const entry = markers.find(m => m.marker === editTarget.marker);
  if (entry) entry.name = newName;
  // InfoWindow 내 이름 텍스트 갱신
  const nameSpan = editTarget.iw.getContent().querySelector('span');
  if (nameSpan) nameSpan.textContent = newName;
  editTarget.iw.close();
  closeMarkerEditModal();
  autoSaveToDB();
};
document.getElementById('editDeleteBtn').onclick = () => {
  if (!editTarget) return;
  const t = editTarget;
  t.iw.close();
  t.marker.setMap(null);
  if (t.origKey) delOrig(t.origKey);   // 보관 원본도 정리
  markers = markers.filter(m => m.marker !== t.marker);
  if (markers.length === 0 && polylines.length === 0) document.getElementById('saveBtn').disabled = true;
  closeMarkerEditModal();
  autoSaveToDB();
};
document.getElementById('markerEditNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('editSaveBtn').click();
  if (e.key === 'Escape') closeMarkerEditModal();
});

// ─── 마커 이동 모드 ───────────────────────────────────
let moveTarget = null;
let moveOriginalPos = null;

function onMapCenterChanged() {
  if (moveTarget) moveTarget.marker.setPosition(map.getCenter());
}

document.getElementById('editMoveBtn').onclick = () => {
  if (!editTarget) return;
  moveTarget = editTarget;
  moveOriginalPos = moveTarget.marker.getPosition();
  moveTarget.iw.close();
  closeMarkerEditModal();
  // 마커를 지도 중심으로 이동 후 추적
  moveTarget.marker.setPosition(map.getCenter());
  kakao.maps.event.addListener(map, 'center_changed', onMapCenterChanged);
  document.getElementById('moveHint').classList.add('show');
};

document.getElementById('moveOkBtn').onclick = () => {
  kakao.maps.event.removeListener(map, 'center_changed', onMapCenterChanged);
  moveTarget = null; moveOriginalPos = null;
  document.getElementById('moveHint').classList.remove('show');
  autoSaveToDB();
};

document.getElementById('moveCancelBtn').onclick = () => {
  if (moveTarget && moveOriginalPos) moveTarget.marker.setPosition(moveOriginalPos);
  kakao.maps.event.removeListener(map, 'center_changed', onMapCenterChanged);
  moveTarget = null; moveOriginalPos = null;
  document.getElementById('moveHint').classList.remove('show');
};

// ─── 마커 추가 버튼 (조준원 모드) ────────────────────
let markerPlacingMode = false;

document.getElementById('markerBtn').onclick = () => {
  if (markerPlacingMode) {
    // 2차 클릭: 지도 중심 좌표로 마커 이름 입력 모달 열기

// PC 키보드 이벤트
document.addEventListener('keydown', e => {
  if (drawingMode && currentPath.length > 0) {
    if (e.key === 'Backspace' || e.key === 'Escape') {
      e.preventDefault();

});

// 뒤로가기 = 절대 앱 종료 안 함. 선그리기 중: 점 삭제 또는 모드 종료
// addEventListener 사용: window.onpopstate 방식은 카카오SDK가 덮어써서 동작 안 함
let _ignoreNextPop = false;
window.removeEventListener('popstate', _earlyBackHandler);
window.addEventListener('popstate', function() {
  if (_ignoreNextPop) { _ignoreNextPop = false; return; }
  if (drawingMode) {
    if (currentPath.length > 0) { undoLastPoint(); }
    else { stopDrawing(); }
  }
  _ignoreNextPop = true;
  window.history.forward();
});

function undoLastPoint() {
  if (currentPath.length === 0) return;
  currentPath.pop();
  currentPolyline.setPath(currentPath);
  if (moveLine) { moveLine.setMap(null); moveLine = null; }
  if (currentPath.length > 0) {
    const last = currentPath[currentPath.length - 1];
    const fmt = d => d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(2) + 'km';
    const total = currentPolyline.getLength();
    const html = '<div class="distance-overlay">📍 총 ' + fmt(total) + '</div>';
    if (distanceOverlay) {
      distanceOverlay.setPosition(last);
      distanceOverlay.setContent(html);
    } else {
      distanceOverlay = new kakao.maps.CustomOverlay({
        map, content: html, position: last, xAnchor: 0, yAnchor: 1.8, zIndex: 3
      });
    }
  } else {
    if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay = null; }
  }
}
// ─── IndexedDB: KMZ 파일 저장/복원 + 사진 원본 보관 ──
// 'orig' 스토어: 불러온/촬영한 사진의 원본(dataURL, 전체 EXIF 포함)을 보관.
// 지도 표시·KMZ 는 압축본을 쓰지만, 메타 수정·사진저장은 항상 원본 기준 → EXIF 유실 방지.
const DB_NAME = 'kmz-viewer', DB_VER = 2, STORE = 'kmz', ORIG_STORE = 'orig';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      if (!db.objectStoreNames.contains(ORIG_STORE)) db.createObjectStore(ORIG_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}

async function saveOrig(key, dataUrl) {
  try { const db = await openDB(); db.transaction(ORIG_STORE, 'readwrite').objectStore(ORIG_STORE).put(dataUrl, key); } catch(e) {}
}
async function getOrig(key) {
  if (!key) return null;
  try {
    const db = await openDB();
    return await new Promise(res => {
      const r = db.transaction(ORIG_STORE).objectStore(ORIG_STORE).get(key);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => res(null);
    });
  } catch(e) { return null; }
}
async function delOrig(key) {
  if (!key) return;
  try { const db = await openDB(); db.transaction(ORIG_STORE, 'readwrite').objectStore(ORIG_STORE).delete(key); } catch(e) {}
}
async function clearOrigs() {
  try { const db = await openDB(); db.transaction(ORIG_STORE, 'readwrite').objectStore(ORIG_STORE).clear(); } catch(e) {}
}

async function saveKMZtoDB(fileOrBlob, fileName = 'last_state.kmz') {
  try {
    const db = await openDB();
    const buf = await fileOrBlob.arrayBuffer();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({ buf, name: fileName }, 'last');
    console.log('데이터가 DB에 저장되었습니다.');
  } catch (e) { console.warn('DB 저장 실패', e); }
}

async function loadKMZfromDB() {
  try {
    const db = await openDB();
    return new Promise(resolve => {
      const req = db.transaction(STORE).objectStore(STORE).get('last');
      req.onsuccess = () => {
        if (req.result) {
          resolve(new File([req.result.buf], req.result.name, { type: 'application/vnd.google-earth.kmz' }));
        } else resolve(null);
      };
      req.onerror = () => resolve(null);
    });
  } catch (e) { return null; }
}

// ─── 변수 ─────────────────────────────────────────────
let map, markers = [], polylines = [];
let locationMode = 0, watchId = null, locationMarker = null; // 0=끄기 1=내위치표시 2=따라가기
let deviceHeading = null;   // 기기 나침반 방향
let headingInterval = null; // 정지 중 방향 갱신 타이머
let hasData = false, suppressMapClick = false, suppressLongPress = false;
let drawingMode = false, currentPolyline = null, currentPath = [];
let moveLine = null, distanceOverlay = null;
let geocoder = null;
let cssScale = 1; // CSS scale 전역 (레벨1 이후 확대용)
let lastClientX = 0, lastClientY = 0; // 마지막 터치/클릭 화면 좌표

// 네이티브 이벤트로 마지막 좌표 저장 (카카오 이벤트에는 clientX 없음)
document.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    lastClientX = e.touches[0].clientX;
    lastClientY = e.touches[0].clientY;
  }
}, { passive: true });
document.addEventListener('mousemove', e => {
  lastClientX = e.clientX;
  lastClientY = e.clientY;
}, { passive: true });

// CSS scale 확대 시 클릭 좌표 보정 → 위경도 변환
// transformOrigin이 중심(50% 50%)이므로 화면 중심 기준 오프셋을 cssScale로 나눠 역산
function getScaledLatLng(clientX, clientY) {
  const mapEl = document.getElementById('map');
  const mapW = mapEl.offsetWidth;
  const mapH = mapEl.offsetHeight;
  const screenCenterX = mapW / 2;
  const screenCenterY = mapH / 2;
  // scale 전 실제 지도 내 픽셀 좌표로 역산
  const px = screenCenterX + (clientX - screenCenterX) / cssScale;
  const py = screenCenterY + (clientY - screenCenterY) / cssScale;
  const proj = map.getProjection();
  const centerPx = proj.pointFromCoords(map.getCenter());
  return proj.coordsFromPoint(new kakao.maps.Point(
    centerPx.x - mapW / 2 + px,
    centerPx.y - mapH / 2 + py
  ));
}

// ─── 지도 초기화 ──────────────────────────────────────
function initMap(center) {
  map = new kakao.maps.Map(document.getElementById('map'), {
    center, level: 5, mapTypeId: kakao.maps.MapTypeId.HYBRID,
    disableDoubleClick: true
  });
  geocoder = new kakao.maps.services.Geocoder();

  // 더블탭/더블클릭으로 선 삭제 (줌 대신)
  let lastTapTime = 0, lastTapPolyline = null;

  kakao.maps.event.addListener(map, 'click', (e) => {
    if (suppressMapClick) { suppressMapClick = false; return; }
    if (drawingMode) {
      // scale 1이면 그대로, scale 확대 중이면 저장된 네이티브 좌표로 보정
      const latLng = cssScale > 1 ? getScaledLatLng(lastClientX, lastClientY) : e.latLng;
      currentPath.push(latLng);
      currentPolyline.setPath(currentPath);
      updateDistanceOverlay(latLng);
      return;
    }
    markers.forEach(m => m.iw.close());
    // 클릭 지점 주소 업데이트
    scheduleAddrUpdate(e.latLng.getLat(), e.latLng.getLng());
  });

  // 거리 오버레이 업데이트 함수 (PC mousemove + 모바일 공용)
  function updateDistanceOverlay(latLng, isPreview) {
    if (!drawingMode || currentPath.length === 0) return;
    const last = currentPath[currentPath.length - 1];
    const fmt = d => d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(2) + 'km';

    if (isPreview) {
      // 미리보기: 점선 + 현재 마우스 위치까지 거리
      if (!moveLine) {
        moveLine = new kakao.maps.Polyline({
          strokeWeight: 2, strokeColor: '#db4040',
          strokeOpacity: 0.6, strokeStyle: 'shortdash'
        });
      }
      moveLine.setPath([last, latLng]);
      moveLine.setMap(map);
      const total = currentPolyline.getLength() + moveLine.getLength();
      const html = '<div class="distance-overlay">✏️ 총 ' + fmt(total) + '</div>';
      if (distanceOverlay) {
        distanceOverlay.setPosition(latLng);
        distanceOverlay.setContent(html);
      } else {
        distanceOverlay = new kakao.maps.CustomOverlay({
          map, content: html, position: latLng, xAnchor: 0, yAnchor: 1.8, zIndex: 3
        });
      }
    } else {
      // 점 찍은 후: 확정된 총 거리 표시
      if (moveLine) { moveLine.setMap(null); moveLine = null; }
      const total = currentPolyline.getLength();
      const html = '<div class="distance-overlay">📍 총 ' + fmt(total) + '</div>';
      if (distanceOverlay) {
        distanceOverlay.setPosition(latLng);
        distanceOverlay.setContent(html);
      } else {
        distanceOverlay = new kakao.maps.CustomOverlay({
          map, content: html, position: latLng, xAnchor: 0, yAnchor: 1.8, zIndex: 3
        });
      }
    }
  }

  
  kakao.maps.event.addListener(map, 'mousemove', (e) => {
    if (!drawingMode || currentPath.length === 0) return;
    const latLng = cssScale > 1 ? getScaledLatLng(lastClientX, lastClientY) : e.latLng;
    updateDistanceOverlay(latLng, true);
  });
  // 지도 빈 곳 길게 누르기 제거 (마커는 📍 버튼으로만 추가)
  let mapLongPressTimer = null;
  let startX = 0, startY = 0;

  kakao.maps.event.addListener(map, 'touchstart', (e) => {
    if (suppressLongPress) return;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    startX = t.clientX; startY = t.clientY;
  });
  kakao.maps.event.addListener(map, 'touchend', () => clearTimeout(mapLongPressTimer));
  kakao.maps.event.addListener(map, 'touchmove', (e) => {
    const t = e.changedTouches ? e.changedTouches[0] : e;
    if (Math.abs(t.clientX - startX) > 8 || Math.abs(t.clientY - startY) > 8) {
      clearTimeout(mapLongPressTimer);
      if (drawingMode && currentPath.length > 0) {
        const latLng = cssScale > 1 ? getScaledLatLng(t.clientX, t.clientY) : e.latLng;
        updateDistanceOverlay(latLng, true);
      }
    }
  });

  // PC 마우스 (롱프레스 마커추가 제거)
  kakao.maps.event.addListener(map, 'mouseup', () => clearTimeout(mapLongPressTimer));

  // ─── 레벨 1 이후 CSS scale 확대 ──────────────────────
  const mapEl = document.getElementById('map');
  const MAX_CSS_SCALE = 8;

  function applyScale(newScale) {
    cssScale = Math.max(1, Math.min(MAX_CSS_SCALE, newScale));
    mapEl.style.transformOrigin = '50% 50%';
    mapEl.style.transform = cssScale === 1 ? '' : `scale(${cssScale})`;
  }

  // 핀치/휠로 인한 CSS scale 확대는 중심점이 흔들려 조작이 어려우므로 제거.
  // 최대 확대(레벨1) 이후 추가 확대/축소는 우측 하단 +,- 버튼으로만 가능.

  // 줌 레벨 올라가면 (축소) CSS scale도 함께 1로 리셋
  kakao.maps.event.addListener(map, 'zoom_changed', () => {
    if (map.getLevel() > 1) applyScale(1);
  });

  // 묶음선(KMZ MultiGeometry) 뷰포트 컬링 — 이동/줌 멈출 때마다 화면 교차 구간만 다시 그림
  kakao.maps.event.addListener(map, 'idle', scheduleBundleCull);

  // CSS scale +/- 버튼
  document.getElementById('cssZoomIn').onclick = () => {
    if (map.getLevel() > 1) {
      map.setLevel(map.getLevel() - 1); // 카카오맵 확대
    } else {
      applyScale(cssScale * 2); // CSS scale 2배
    }
  };
  document.getElementById('cssZoomOut').onclick = () => {
    if (cssScale > 1) {
      applyScale(cssScale / 2); // CSS scale 축소
    } else {
      map.setLevel(map.getLevel() + 1); // 카카오맵 축소
    }
  };
}

// ─── Web Share Target: '공유 → KMZ 뷰어'로 받은 파일 소비 ─────
// sw.js 가 공유 POST 를 받아 'shared-files' 캐시에 넣고 './?shared=1' 로 리다이렉트한다.
async function consumeSharedFiles() {
  if (!/[?&]shared=1/.test(location.search)) return;
  history.replaceState(history.state, '', location.pathname);   // URL 정리 (새로고침 시 재소비 방지)
  try {
    const cache = await caches.open('shared-files');
    const mRes = await cache.match('./shared-manifest');
    if (!mRes) return;
    const names = await mRes.json();
    for (let i = 0; i < names.length; i++) {
      const r = await cache.match('./shared-file-' + i);
      if (!r) continue;
      const blob = await r.blob();
      const file = new File([blob], names[i]);
      if (/\.(jpe?g|png)$/i.test(names[i])) await loadImageAsMarker(file);
      else { await loadKMZ(file); autoSaveToDB(); }   // kmz/kml/zip (확장자 불명이어도 PK 헤더로 판별)
    }
    await caches.delete('shared-files');
  } catch (e) { console.warn('공유 파일 처리 실패', e); }
}

kakao.maps.load(() => {
  initMap(new kakao.maps.LatLng(35.6478, 127.5213));

  // 이전 데이터 복원 후 공유파일 소비 (동시에 돌면 silent 복원의 초기화가 공유 로드를 지움)
  loadKMZfromDB().then(async file => {
    if (file) await loadKMZ(file, true);
    consumeSharedFiles();
  });

  // ─── File Handling API: KMZ 파일로 앱 실행됐을 때 (데스크톱 Chrome/Edge) ─────
  if ('launchQueue' in window) {
    window.launchQueue.setConsumer(async (launchParams) => {
      if (!launchParams.files || launchParams.files.length === 0) return;
      const fileHandle = launchParams.files[0];
      const file = await fileHandle.getFile();
      if (/\.(kmz|zip|kml)$/i.test(file.name)) {
        await saveKMZtoDB(file);
        loadKMZ(file);
      }
    });
  }
});

const PALETTE_COLORS = [
  '#000000','#404040','#808080','#BFBFBF','#FFFFFF','#C00000','#FF0000','#FFC000','#FFFF00','#92D050',
  '#00B050','#00B0F0','#0070C0','#002060','#7030A0','#FF6600','#00B0A0','#E91E63','#795548','#2E86C1'
];
const LINE_WIDTHS = [2, 3, 4, 6, 8, 10];
let currentDrawColor = '#FF5733', currentDrawWidth = 4;
let _styleTarget = null;   // null=그리기 기본값(그리는 중이면 현재 선), 아니면 polylines entry

function _updateDrawStyleBtn() {
  const el = document.querySelector('#drawStyleBtn .dsb-line');
  if (el) { el.style.background = currentDrawColor; el.style.height = Math.min(10, Math.max(3, currentDrawWidth)) + 'px'; }
}

(function buildStylePicker(){
  const grid = document.getElementById('spGrid');
  PALETTE_COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'sp-swatch'; b.style.background = c; b.dataset.color = c;
    b.onclick = () => applyPickedStyle(c, null);
    grid.appendChild(b);
  });
  const ws = document.getElementById('spWidths');
  LINE_WIDTHS.forEach(w => {
    const b = document.createElement('button');
    b.className = 'sp-w'; b.dataset.width = w; b.title = w + 'px';
    b.innerHTML = `<span style="height:${Math.min(w, 12)}px"></span>`;
    b.onclick = () => applyPickedStyle(null, w);
    ws.appendChild(b);
  });
  document.getElementById('spCloseBtn').onclick = closeStylePicker;
  document.getElementById('stylePicker').addEventListener('click', e => {
    if (e.target === document.getElementById('stylePicker')) closeStylePicker();
  });
})();

function _spMarkSelected(color, width) {
  document.querySelectorAll('#spGrid .sp-swatch').forEach(b =>
    b.classList.toggle('sel', b.dataset.color.toUpperCase() === String(color || '').toUpperCase()));
  document.querySelectorAll('#spWidths .sp-w').forEach(b =>
    b.classList.toggle('sel', +b.dataset.width === +width));
}
function openStylePicker(target) {
  _styleTarget = target || null;
  const c = _styleTarget ? (_styleTarget.color || '#FF5733') : currentDrawColor;
  const w = _styleTarget ? (_styleTarget.width || 4) : currentDrawWidth;
  _spMarkSelected(c, w);
  document.getElementById('stylePicker').classList.add('show');
}
function closeStylePicker() {
  document.getElementById('stylePicker').classList.remove('show');
  _styleTarget = null;
}
// 색 또는 굵기 하나를 고르면 즉시 반영 (모달은 닫기 전까지 유지 — 색·굵기 연속 선택 가능)
function applyPickedStyle(color, width) {
  if (_styleTarget) {
    const en = _styleTarget;
    restylePolyline(en, color || en.color || '#FF5733', width || en.width || 4);
    _spMarkSelected(en.color, en.width);
    autoSaveToDB();
  } else {
    if (color) currentDrawColor = color;
    if (width) currentDrawWidth = width;
    _updateDrawStyleBtn();
    _spMarkSelected(currentDrawColor, currentDrawWidth);
    // 그리는 중이면 현재 그리는 선에도 즉시 반영
    if (drawingMode && currentPolyline) {
      const en = polylines.find(p => p.poly === currentPolyline);
      if (en) currentPolyline = restylePolyline(en, currentDrawColor, currentDrawWidth);
    }
  }
}
// Kakao Polyline 은 색/굵기 변경 API가 없어 같은 경로로 재생성 후 참조 교체 (map.html _recreatePoly 방식)
function restylePolyline(entry, color, width) {
  const old = entry.poly;
  const parts = old._parts;
  const poly = new kakao.maps.Polyline({
    path: parts ? (parts.length === 1 ? parts[0] : parts) : old.getPath(),
    strokeWeight: width, strokeColor: color, strokeOpacity: 1
  });
  if (parts) { poly._parts = parts; poly._pnum = old._pnum; poly._viewCulled = old._viewCulled; }
  if (old.getMap()) poly.setMap(map);
  old.setMap(null);
  entry.poly = poly; entry.color = color; entry.width = width;
  attachPolylineDelete(poly, entry);
  if (parts) scheduleBundleCull();   // 묶음선은 화면 교차 구간만 다시 반영
  return poly;
}

document.getElementById('polyEditBtn').onclick = () => {
  if (!polyMenuTarget) return;
  const { poly, entry } = polyMenuTarget;
  // 묶음선(KMZ MultiGeometry 멀티파트)은 점 편집 불가 (map.html 과 동일 정책)
  if (poly._parts || (entry && entry.parts && entry.parts.length > 1)) {
    alert('여러 선이 묶인 객체는 수정할 수 없습니다.');
    hidePolyMenu();
    return;
  }
  hidePolyMenu();

  // 기존 선 제거 후 그리기 모드로 복원
  if (drawingMode) stopDrawing();
  poly.setMap(null);
  polylines = polylines.filter(p => p.poly !== poly);

  // 기존 path로 새 폴리라인 생성 후 그리기 모드 진입 (원래 색·굵기 유지)
  drawingMode = true;
  setMarkersClickThrough(true);
  currentPath = [...(entry.path || poly.getPath())];
  currentDrawColor = (entry && entry.color) || currentDrawColor;
  currentDrawWidth = (entry && entry.width) || currentDrawWidth;
  currentPolyline = new kakao.maps.Polyline({
    map, path: currentPath,
    strokeWeight: currentDrawWidth, strokeColor: currentDrawColor, strokeOpacity: 1
  });
  attachPolylineDelete(currentPolyline);
  polylines.push({ poly: currentPolyline, name: entry.name || '선', path: currentPath, color: currentDrawColor, width: currentDrawWidth });
  document.getElementById('drawBtn').classList.add('active');
  document.getElementById('drawBtn').title = '선 그리기 종료';
  document.getElementById('drawStyleBtn').classList.add('show');
  _updateDrawStyleBtn();

  // 거리 오버레이 표시
  if (currentPath.length > 0) {
    const last = currentPath[currentPath.length - 1];
    updateDistanceOverlay(last);
  }
};

function attachPolylineDelete(poly, entry) {
  // 우클릭 (PC)
  kakao.maps.event.addListener(poly, 'rightclick', e => {
    suppressMapClick = true;
    showPolyMenu(e.clientX || lastClientX, e.clientY || lastClientY, poly, entry || polylines.find(p => p.poly === poly));
  });
  // 길게 누르기 (모바일)
  attachLongPress(poly, () => {
    if (drawingMode && poly === currentPolyline) return;
    showPolyMenu(lastClientX, lastClientY, poly, polylines.find(p => p.poly === poly));
  });
}

// ── 선그리기 중 마커 클릭 통과 + 반투명 (마커 위에도 선을 찍을 수 있게) ──
function setMarkersClickThrough(drawing) {
  const on = !drawing;
  const op = drawing ? 0.35 : 1;
  markers.forEach(m => {
    try {
      if (drawing) m.iw.close();
      m.marker.setClickable(on);
      m.marker.setOpacity(op);
    } catch (e) {}
  });
}

function startDrawing() {
  drawingMode = true;
  setMarkersClickThrough(true);
  currentPath = [];
  currentPolyline = new kakao.maps.Polyline({
    map, path: currentPath,
    strokeWeight: currentDrawWidth, strokeColor: currentDrawColor, strokeOpacity: 1
  });
  attachPolylineDelete(currentPolyline);
  polylines.push({ poly: currentPolyline, name: '선', path: currentPath, color: currentDrawColor, width: currentDrawWidth });
  document.getElementById('drawBtn').classList.add('active');
  document.getElementById('drawBtn').title = '선 그리기 종료';
  document.getElementById('drawStyleBtn').classList.add('show');
  _updateDrawStyleBtn();
}

function stopDrawing() {
  document.getElementById('crosshair').classList.remove('show');
  drawingMode = false;
  setMarkersClickThrough(false);
  if (moveLine) { moveLine.setMap(null); moveLine = null; }
  if (distanceOverlay) { distanceOverlay.setMap(null); distanceOverlay = null; }
  // 점이 1개 이하면 의미없는 선 → 제거
  if (currentPolyline && currentPath.length <= 1) {
    currentPolyline.setMap(null);
    polylines = polylines.filter(p => p.poly !== currentPolyline);
} else if (currentPolyline) {
    // path 스냅샷 저장
    const lastPoly = polylines.find(p => p.poly === currentPolyline);
    if (lastPoly) lastPoly.path = [...currentPath];
    document.getElementById('saveBtn').disabled = false;
    autoSaveToDB();
  }  currentPolyline = null;
  currentPath = [];
  document.getElementById('drawBtn').classList.remove('active');
  document.getElementById('drawBtn').title = '선 그리기';
  document.getElementById('drawStyleBtn').classList.remove('show');
}

document.getElementById('drawBtn').onclick = () => {
  if (drawingMode) stopDrawing();
  else startDrawing();
};

// ─── 자동 저장 기능 ───────────────────────────────────
// 사진 재압축+ZIP 생성이 무거워 UI를 막으므로, 호출을 모아서(debounce) 화면이
// 먼저 그려진 뒤 백그라운드로 실행한다.
let _autoSaveTimer = null;
function autoSaveToDB() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(_autoSaveNow, 400);
}

async function _autoSaveNow() {
  try {
    const zip = new JSZip();
    const filesFolder = zip.folder('files');
    let placemarkXml = '';
    let photoIndex = 0;

    for (const m of markers) {
      if (!m.marker.getMap()) continue;
      const pos = m.marker.getPosition();
      const lat = pos.getLat(), lng = pos.getLng();
      const safeName = (m.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (m.imgSrc) {
        const compressed = await compressImage(m.imgSrc);
        const base64Data = compressed.split(',')[1];
        const filename = `photo_${String(photoIndex++).padStart(4,'0')}.jpg`;
        filesFolder.file(filename, base64Data, { base64: true });
        placemarkXml += `\n  <Placemark>\n    <name>${safeName}</name>\n    <ExtendedData><Data name="photoFile"><value>${filename}</value></Data>${_photoMetaXml(m)}</ExtendedData>\n    <Point><coordinates>${lng},${lat},0</coordinates></Point>\n  </Placemark>`;
      } else {
        placemarkXml += `\n  <Placemark>\n    <name>${safeName}</name>\n    <Point><coordinates>${lng},${lat},0</coordinates></Point>\n  </Placemark>`;
      }
    }
    const styles = new Map();
    for (const pl of polylines) {
      // 뷰포트 컬링으로 지도에서 뗀 선(_viewCulled)도 데이터는 살아있음 — 저장 포함
      if (!pl.poly.getMap() && !pl.poly._viewCulled) continue;
      placemarkXml += _lineKmlPlacemark(pl, styles);
    }
    for (const t of textLabels) placemarkXml += _textKmlPlacemark(t);

    zip.file('doc.kml', `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>${_lineKmlStyleDefs(styles)}${placemarkXml}\n</Document>\n</kml>`);

    const blob = await zip.generateAsync({
          type: 'blob',
          compression: 'DEFLATE',
          mimeType: 'application/vnd.google-earth.kmz'
        });

    await saveKMZtoDB(blob);
  } catch (err) {
    console.error('자동 저장 오류:', err);
  }
}

// ─── 위치 마커 HTML (방향 화살표) ─────────────────────
function makeLocationContent(heading) {
  const hasH = heading != null && !isNaN(heading) && heading >= 0;
  if (hasH) {
    const rot = Math.round(heading);
    return `<div style="width:30px;height:50px;pointer-events:none;">` +
      `<svg xmlns="http://www.w3.org/2000/svg" width="30" height="50" ` +
      `style="transform:rotate(${rot}deg);transform-origin:15px 25px;overflow:visible;">` +
      `<polygon points="15,2 6,20 24,20" fill="rgba(229,57,53,0.82)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>` +
      `<circle cx="15" cy="25" r="9" fill="#e53935" stroke="white" stroke-width="2.5"/>` +
      `</svg></div>`;
  }
  return `<div style="width:30px;height:30px;display:flex;align-items:center;justify-content:center;pointer-events:none;">` +
    `<div style="width:18px;height:18px;background:#e53935;border-radius:50%;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>` +
    `</div>`;
}

// ─── 기기 나침반 리스너 설정 ──────────────────────────
function setupDeviceOrientation() {
  const addListeners = () => {
    window.addEventListener('deviceorientationabsolute', e => {
      if (e.alpha != null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
    window.addEventListener('deviceorientation', e => {
      if (e.webkitCompassHeading != null) deviceHeading = e.webkitCompassHeading;
      else if (e.absolute && e.alpha != null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
  };
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(s => { if (s === 'granted') addListeners(); })
      .catch(() => addListeners());
  } else {
    addListeners();
  }
}

// ─── 내 위치 버튼 (3단계) ─────────────────────────────
// 0=끄기(흰색) → 2=위치따라가기(파란색) → 1=내위치만표시(하늘색) → 0=끄기
document.getElementById('myLocationBtn').onclick = () => {
  const nextMode = [2, 0, 1]; // 0→2→1→0 순환
  locationMode = nextMode[locationMode];
  applyLocationMode();
};

function applyLocationMode() {
  const btn = document.getElementById('myLocationBtn');
  btn.classList.remove('loc-show', 'loc-follow');

  if (locationMode === 0) {
    // 끄기: GPS 중단, 마커 제거
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationMarker) { locationMarker.setMap(null); locationMarker = null; }
    if (headingInterval) { clearInterval(headingInterval); headingInterval = null; }
  } else if (locationMode === 1) {
    // 내위치만 표시
    btn.classList.add('loc-show');
    startLocationWatchIfNeeded();
  } else if (locationMode === 2) {
    // 위치 따라가기
    btn.classList.add('loc-follow');
    startLocationWatchIfNeeded();
    if (locationMarker) map.setCenter(locationMarker.getPosition());
  }
}

function startLocationWatchIfNeeded() {
  if (watchId !== null) return;
  setupDeviceOrientation();
  headingInterval = setInterval(() => {
    if (locationMarker && deviceHeading !== null) {
      locationMarker.setContent(makeLocationContent(deviceHeading));
    }
  }, 500);
  watchId = navigator.geolocation.watchPosition(pos => {
    const ll = new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    if (locationMode === 2) map.setCenter(ll); // 따라가기 모드에서만 중심 이동
    // 나침반(바라보는 방향) 우선. GPS heading은 정지 중 무작위로 튀므로 나침반 없을 때만 폴백.
    const h = (deviceHeading !== null)
      ? deviceHeading
      : ((pos.coords.heading != null && !isNaN(pos.coords.heading) && pos.coords.heading >= 0) ? pos.coords.heading : null);
    if (!locationMarker) {
      locationMarker = new kakao.maps.CustomOverlay({
        map, position: ll,
        content: makeLocationContent(h),
        xAnchor: 0.5, yAnchor: 0.5, zIndex: 10
      });
    } else {
      locationMarker.setPosition(ll);
      locationMarker.setContent(makeLocationContent(h));
    }
  }, () => {
    alert('위치 정보를 가져올 수 없습니다.');
    locationMode = 0;
    applyLocationMode();
  }, { enableHighAccuracy: true, maximumAge: 3000 });
}

// ─── 불러오기 ─────────────────────────────────────────
document.getElementById('loadBtn').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = async e => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  e.target.value = '';

  // 이미지 파일과 지도 파일 분리
  const imageFiles = files.filter(f => /\.(jpe?g|png)$/i.test(f.name) || f.type.startsWith('image/'));
  const mapFiles = files.filter(f => /\.(kmz|zip|kml)$/i.test(f.name));

  // 지도 파일 처리 (여러 개 모두)
  for (const file of mapFiles) {
    await loadKMZ(file);
  }
  if (mapFiles.length > 0) autoSaveToDB();

  // 이미지 파일 처리 - EXIF 위치 우선, 없으면 지도 중심
  let noGpsCnt = 0;
  for (const imgFile of imageFiles) {
    const hadGps = await loadImageAsMarker(imgFile);
    if (hadGps === false) noGpsCnt++;
  }
  // 안드로이드 갤러리(포토) 선택창은 사진의 위치정보를 제거해서 전달할 수 있음 → 안내
  if (noGpsCnt > 0) {
    alert('위치정보를 읽지 못한 사진 ' + noGpsCnt + '장은 지도 중심에 추가했습니다.\n\n' +
      '※ 갤러리(포토) 선택창은 안드로이드가 위치정보를 제거해서 전달할 수 있습니다.\n' +
      '사진의 원래 위치를 쓰려면 선택창에서 \'파일(내 파일)\' 앱으로 선택해 보세요.');
  }
};

// ─── EXIF 메타 유틸 (piexif) ─────────────────────────
// XPTitle/XPComment 는 UTF-16LE 바이트 배열 (한글 안전 — 탐색기/데스크톱 뷰어와 동일 필드)
function _xpBytes(str) { const a = []; for (const ch of String(str)) { const c = ch.charCodeAt(0); a.push(c & 0xFF, (c >> 8) & 0xFF); } a.push(0, 0); return a; }
function _xpStr(bytes) { if (!bytes || !bytes.length) return ''; let s = ''; for (let i = 0; i + 1 < bytes.length; i += 2) { const c = bytes[i] | (bytes[i+1] << 8); if (!c) break; s += String.fromCharCode(c); } return s; }
function _gpsRat(v) { v = Math.abs(v); const d = Math.floor(v), mF = (v - d) * 60, m = Math.floor(mF), s = Math.round((mF - m) * 60 * 10000); return [[d,1],[m,1],[s,10000]]; }
function exifNow(d = new Date()) { const p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}:${p(d.getMonth()+1)}:${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }
function _escXml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// EXIF 를 통째로 재직렬화(dump)하다 실패하면(일부 폰 MakerNote 등)
// 핵심 필드(날짜·GPS·제목·설명)만이라도 옮겨서 기록한다 — 실패 시 메타가 통째로 사라지던 문제 방지.
function _exifSafeCarry(exif, jpegDataUrl) {
  try { return piexif.insert(piexif.dump(exif), jpegDataUrl); }
  catch(e) {
    try {
      const fresh = { '0th':{}, 'Exif':{}, 'GPS':{}, '1st':{}, 'thumbnail':null };
      const o = exif['0th'] || {}, x = exif['Exif'] || {}, g = exif['GPS'] || {};
      const dt = x[piexif.ExifIFD.DateTimeOriginal] || o[piexif.ImageIFD.DateTime];
      if (dt) { fresh['Exif'][piexif.ExifIFD.DateTimeOriginal] = dt; fresh['0th'][piexif.ImageIFD.DateTime] = dt; }
      if (g[piexif.GPSIFD.GPSLatitude]) {
        fresh['GPS'][piexif.GPSIFD.GPSVersionID]    = g[piexif.GPSIFD.GPSVersionID]    || [2, 3, 0, 0];
        fresh['GPS'][piexif.GPSIFD.GPSLatitudeRef]  = g[piexif.GPSIFD.GPSLatitudeRef]  || 'N';
        fresh['GPS'][piexif.GPSIFD.GPSLatitude]     = g[piexif.GPSIFD.GPSLatitude];
        fresh['GPS'][piexif.GPSIFD.GPSLongitudeRef] = g[piexif.GPSIFD.GPSLongitudeRef] || 'E';
        fresh['GPS'][piexif.GPSIFD.GPSLongitude]    = g[piexif.GPSIFD.GPSLongitude];
      }
      if (o[piexif.ImageIFD.XPTitle])   fresh['0th'][piexif.ImageIFD.XPTitle]   = o[piexif.ImageIFD.XPTitle];
      if (o[piexif.ImageIFD.XPComment]) fresh['0th'][piexif.ImageIFD.XPComment] = o[piexif.ImageIFD.XPComment];
      if (o[piexif.ImageIFD.ImageDescription]) fresh['0th'][piexif.ImageIFD.ImageDescription] = o[piexif.ImageIFD.ImageDescription];
      return piexif.insert(piexif.dump(fresh), jpegDataUrl);
    } catch(e2) { console.warn('EXIF 기록 실패', e2); return jpegDataUrl; }
  }
}

// 사진 dataURL 에서 제목/설명/촬영일시/GPS 읽기
function readPhotoMeta(imgSrc) {
  const out = { title:'', desc:'', taken:'', lat:null, lng:null };
  try {
    const ex = piexif.load(imgSrc);
    out.title = _xpStr(ex['0th'][piexif.ImageIFD.XPTitle]);
    out.desc  = _xpStr(ex['0th'][piexif.ImageIFD.XPComment]);
    out.taken = (ex['Exif'] && ex['Exif'][piexif.ExifIFD.DateTimeOriginal]) || ex['0th'][piexif.ImageIFD.DateTime] || '';
    const gps = ex['GPS'];
    if (gps && gps[piexif.GPSIFD.GPSLatitude] && gps[piexif.GPSIFD.GPSLongitude]) {
      const toDec = (dms, ref) => { const d = dms[0][0]/dms[0][1], m = dms[1][0]/dms[1][1], s = dms[2][0]/dms[2][1]; return (d + m/60 + s/3600) * ((ref === 'S' || ref === 'W') ? -1 : 1); };
      const lat = toDec(gps[piexif.GPSIFD.GPSLatitude],  gps[piexif.GPSIFD.GPSLatitudeRef]  || 'N');
      const lng = toDec(gps[piexif.GPSIFD.GPSLongitude], gps[piexif.GPSIFD.GPSLongitudeRef] || 'E');
      if (!isNaN(lat) && !isNaN(lng) && (lat !== 0 || lng !== 0)) { out.lat = lat; out.lng = lng; }
    }
  } catch(e) {}
  return out;
}
// 제목/설명/GPS/촬영일시를 JPEG dataURL 의 EXIF 에 기록 (전달 안 한 항목은 유지)
function writePhotoMeta(imgSrc, { title, desc, lat, lng, taken } = {}) {
  try {
    let ex; try { ex = piexif.load(imgSrc); } catch(e) { ex = { '0th':{}, 'Exif':{}, 'GPS':{}, '1st':{}, 'thumbnail':null }; }
    ex['0th'] = ex['0th'] || {}; ex['Exif'] = ex['Exif'] || {}; ex['GPS'] = ex['GPS'] || {};
    if (title != null) {
      ex['0th'][piexif.ImageIFD.XPTitle] = _xpBytes(title);
      // ImageDescription 은 ASCII 필드 — 한글이면 기록 안 함 (외부 뷰어 인코딩 깨짐 방지, map.html 과 동일 정책)
      if (/^[\x00-\x7F]*$/.test(title)) ex['0th'][piexif.ImageIFD.ImageDescription] = title;
      else delete ex['0th'][piexif.ImageIFD.ImageDescription];
    }
    if (desc != null) ex['0th'][piexif.ImageIFD.XPComment] = _xpBytes(desc);
    if (taken) { ex['Exif'][piexif.ExifIFD.DateTimeOriginal] = taken; ex['0th'][piexif.ImageIFD.DateTime] = taken; }
    // 카메라 파일과 유사하게 기본 태그 보강 (없을 때만)
    ex['0th'][piexif.ImageIFD.Orientation] = ex['0th'][piexif.ImageIFD.Orientation] || 1;
    ex['Exif'][piexif.ExifIFD.ExifVersion] = ex['Exif'][piexif.ExifIFD.ExifVersion] || '0231';
    if (lat != null && lng != null) {
      // 카메라 앱과 동일한 GPS 블록 구성 — VersionID·고도·날짜/시간스탬프까지 있어야
      // 삼성 갤러리 등 일부 뷰어가 위치를 표시함
      ex['GPS'][piexif.GPSIFD.GPSVersionID]    = ex['GPS'][piexif.GPSIFD.GPSVersionID] || [2, 3, 0, 0];
      ex['GPS'][piexif.GPSIFD.GPSLatitudeRef]  = lat >= 0 ? 'N' : 'S';
      ex['GPS'][piexif.GPSIFD.GPSLatitude]     = _gpsRat(lat);
      ex['GPS'][piexif.GPSIFD.GPSLongitudeRef] = lng >= 0 ? 'E' : 'W';
      ex['GPS'][piexif.GPSIFD.GPSLongitude]    = _gpsRat(lng);
      ex['GPS'][piexif.GPSIFD.GPSAltitudeRef]  = ex['GPS'][piexif.GPSIFD.GPSAltitudeRef] || 0;
      ex['GPS'][piexif.GPSIFD.GPSAltitude]     = ex['GPS'][piexif.GPSIFD.GPSAltitude] || [0, 1];
      const _ts = taken || ex['Exif'][piexif.ExifIFD.DateTimeOriginal] || exifNow();
      const _md = String(_ts).match(/^(\d{4}:\d{2}:\d{2}) (\d{2}):(\d{2}):(\d{2})/);
      if (_md && !ex['GPS'][piexif.GPSIFD.GPSDateStamp]) {
        ex['GPS'][piexif.GPSIFD.GPSDateStamp] = _md[1];
        ex['GPS'][piexif.GPSIFD.GPSTimeStamp] = [[+_md[2], 1], [+_md[3], 1], [+_md[4], 1]];
      }
    }
    return _exifSafeCarry(ex, imgSrc);
  } catch(e) { console.warn('EXIF 기록 실패', e); return imgSrc; }
}
// JFIF(APP0) 세그먼트 제거 — EXIF(APP1)와 공존하는 비표준 구조를
// 카메라 파일과 동일한 'SOI + APP1' 구조로 정리 (삼성 갤러리 등이 공존 구조에서 메타를 무시함)
function _stripApp0(u8) {
  try {
    if (u8[0] !== 0xFF || u8[1] !== 0xD8) return u8;
    let i = 2, app0 = null, hasExif = false;
    while (i + 3 < u8.length && u8[i] === 0xFF) {
      const m = u8[i + 1];
      if (m === 0xDA) break;
      const len = (u8[i + 2] << 8) | u8[i + 3];
      if (m === 0xE0) app0 = [i, i + 2 + len];
      if (m === 0xE1 && u8[i + 4] === 0x45 && u8[i + 5] === 0x78) hasExif = true;   // 'Ex'if
      i += 2 + len;
    }
    if (app0 && hasExif) {
      const o = new Uint8Array(u8.length - (app0[1] - app0[0]));
      o.set(u8.subarray(0, app0[0]), 0);
      o.set(u8.subarray(app0[1]), app0[0]);
      return o;
    }
  } catch(e) {}
  return u8;
}
// 사진을 기기에 저장 (안드로이드: 다운로드 폴더 → 갤러리에 표시됨)
// data: URL 은 용량이 크면 안드로이드 크롬에서 다운로드가 '조용히' 실패 → Blob 으로 변환해 저장.
function downloadPhoto(imgSrc, name) {
  const nm0 = (name || 'photo').replace(/[\\/:*?"<>|]/g, '_');
  const nm = /\.jpe?g$/i.test(nm0) ? nm0 : nm0 + '.jpg';
  let href = imgSrc, revoke = null;
  try {
    const i = imgSrc.indexOf(',');
    const bin = atob(imgSrc.slice(i + 1));
    let u8 = new Uint8Array(bin.length);
    for (let k = 0; k < bin.length; k++) u8[k] = bin.charCodeAt(k);
    const mime = imgSrc.slice(5, i).split(';')[0] || 'image/jpeg';
    if (/jpe?g$/i.test(mime)) u8 = _stripApp0(u8);
    href = URL.createObjectURL(new Blob([u8], { type: mime }));
    revoke = href;
  } catch(e) {}
  const a = document.createElement('a');
  a.href = href; a.download = nm;
  document.body.appendChild(a); a.click(); a.remove();
  if (revoke) setTimeout(() => URL.revokeObjectURL(revoke), 10000);
}

// ─── 사진 정보/메타 수정 모달 ─────────────────────────
let piTarget = null;
function openPhotoInfo(entry) {
  piTarget = entry;
  const meta = readPhotoMeta(entry.imgSrc);
  document.getElementById('piTitle').value = entry.name || meta.title || '';
  document.getElementById('piDesc').value = (entry.desc != null && entry.desc !== '') ? entry.desc : (meta.desc || '');
  const pos = entry.marker.getPosition();
  document.getElementById('piTaken').textContent = '📅 촬영일시: ' + (entry.taken || meta.taken || '정보 없음');
  document.getElementById('piCoord').textContent = '📍 좌표: ' + pos.getLat().toFixed(6) + ', ' + pos.getLng().toFixed(6);
  const addrEl = document.getElementById('piAddr');
  addrEl.textContent = '🏠 주소: 조회 중...';
  if (geocoder) geocoder.coord2Address(pos.getLng(), pos.getLat(), (r, s) => {
    addrEl.textContent = '🏠 주소: ' + ((s === kakao.maps.services.Status.OK && r[0]) ? (r[0].address?.address_name || '-') : '-');
  });
  document.getElementById('photoInfoModal').classList.add('show');
}
function closePhotoInfo() {
  // 촬영 직후 입력창을 그냥 닫아도 파일은 1번 저장 (메타 미입력 상태)
  if (piTarget && piTarget._pendingCapture) {
    piTarget._pendingCapture = false;
    downloadPhoto(piTarget.imgSrc, piTarget.name);
  }
  document.getElementById('photoInfoModal').classList.remove('show');
  piTarget = null;
}
document.getElementById('photoInfoModal').addEventListener('click', e => {
  if (e.target === document.getElementById('photoInfoModal')) closePhotoInfo();
});
document.getElementById('piCloseBtn').onclick = closePhotoInfo;
// 저장: 제목/설명을 마커·EXIF(XPTitle/XPComment)에 기록 → KMZ 저장/사진저장에 그대로 반영
document.getElementById('piSaveBtn').onclick = () => {
  if (!piTarget) return;
  const title = document.getElementById('piTitle').value.trim();
  const desc = document.getElementById('piDesc').value.trim();
  if (title) piTarget.name = title;
  piTarget.desc = desc;
  piTarget.imgSrc = writePhotoMeta(piTarget.imgSrc, { title: piTarget.name, desc });
  // 보관 중인 원본에도 바로 기록 (사진저장 시 전체 EXIF + 최신 메타 유지)
  if (piTarget.origKey) {
    const t = piTarget;
    getOrig(t.origKey).then(o => { if (o) saveOrig(t.origKey, writePhotoMeta(o, { title: t.name, desc: t.desc })); });
  }
  const c = piTarget.iw.getContent();
  const sp = c.querySelector('.photo-iw-header span'); if (sp) sp.textContent = piTarget.name;
  const im = c.querySelector('img'); if (im) im.src = piTarget.imgSrc;
  // 촬영 직후라면 메타가 들어간 파일을 지금 1번만 기기에 저장
  if (piTarget._pendingCapture) {
    piTarget._pendingCapture = false;
    downloadPhoto(piTarget.imgSrc, piTarget.name);
  }
  autoSaveToDB();
  closePhotoInfo();
};
// 사진저장: 보관된 원본(전체 EXIF)에 현재 메타를 넣어 기기에 저장. 원본 없으면 표시본으로.
document.getElementById('piDownloadBtn').onclick = async () => {
  if (!piTarget) return;
  const t = piTarget;
  const pos = t.marker.getPosition();
  const args = { title: t.name, desc: t.desc || '', lat: pos.getLat(), lng: pos.getLng() };
  if (t.taken) args.taken = t.taken;
  const orig = await getOrig(t.origKey);
  downloadPhoto(writePhotoMeta(orig || t.imgSrc, args), t.name);
};

// ─── 이미지 파일을 사진 마커로 추가 (EXIF GPS 우선) ──
async function loadImageAsMarker(imgFile) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = async (ev) => {
      let imgSrc = ev.target.result;
      let name = imgFile.name.replace(/\.[^.]+$/, '');
      const meta = readPhotoMeta(imgSrc);
      let latlng = (meta.lat != null) ? new kakao.maps.LatLng(meta.lat, meta.lng) : null;

      // 방금 촬영한 사진 판별: 파일 시각이 1분 이내 (📂 → 카메라 촬영).
      // 촬영본은 임시파일이라 갤러리에 안 남음 → GPS 유무와 무관하게 기기에 저장한다.
      // (과거엔 'GPS 없음' 조건이 있어서 카메라가 GPS 를 넣어주는 폰은 저장이 통째로 건너뛰어졌음)
      const justCaptured = (Date.now() - imgFile.lastModified < 60000);
      if (justCaptured) {
        let lat = meta.lat, lng = meta.lng;
        if (lat == null) {
          // GPS 없으면 현재 위치(실패 시 지도 중심)를 EXIF 에 기록
          const pos = await new Promise(res => navigator.geolocation
            ? navigator.geolocation.getCurrentPosition(p => res(p), () => res(null), { enableHighAccuracy: true, timeout: 5000 })
            : res(null));
          if (pos) { lat = pos.coords.latitude; lng = pos.coords.longitude; }
          else { const c = map.getCenter(); lat = c.getLat(); lng = c.getLng(); }
        }
        const taken = meta.taken || exifNow(new Date(imgFile.lastModified));
        name = 'IMG_' + taken.replace(/[: ]/g, '').slice(0, 15);
        imgSrc = writePhotoMeta(imgSrc, { lat, lng, taken });
        // 파일 저장은 여기서 하지 않음 — 사진 정보 입력창에서 저장/닫기할 때 1번만
        // (촬영 직후 저장 + 메타 저장으로 파일이 2장 생기던 문제)
        meta.taken = taken;
        latlng = new kakao.maps.LatLng(lat, lng);
      }

      if (latlng) {
        addPhotoMarker(latlng, imgSrc, name);
        map.panTo(latlng);
      } else {
        addPhotoMarker(map.getCenter(), imgSrc, name);
      }
      const en = markers[markers.length - 1];
      if (en) {
        en.taken = meta.taken || ''; en.desc = meta.desc || '';
        // 원본(전체 EXIF) 보관 — 메타 수정·사진저장은 이 원본 기준 (압축본은 EXIF 유실 가능)
        en.origKey = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        saveOrig(en.origKey, imgSrc);
        if (justCaptured) {
          // 촬영본: 정보 입력창을 바로 열고, 저장/닫기 시 메타 포함 파일을 1번만 기기에 저장
          en._pendingCapture = true;
          openPhotoInfo(en);
        }
      }
      document.getElementById('saveBtn').disabled = false;
      autoSaveToDB();
      resolve(!!latlng);   // false = 위치정보 못 읽어 지도 중심에 추가됨
    };
    reader.readAsDataURL(imgFile);
  });
}

// ─── 저장(KMZ 내보내기) ───────────────────────────────
// ─── 저장 범위 선택 (현재영역/전체영역) ───────────────
function askSaveScope() {
  return new Promise(resolve => {
    const bg = document.createElement('div');
    bg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;display:flex;align-items:center;justify-content:center;';
    const btnCss = 'display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px;';
    bg.innerHTML =
      '<div style="background:white;border-radius:14px;padding:20px;width:270px;box-shadow:0 4px 24px rgba(0,0,0,0.25);">' +
      '<h3 style="margin:0 0 14px;font-size:15px;color:#333;text-align:center;">저장 범위 선택</h3>' +
      `<button data-scope="view" style="${btnCss}background:#1a73e8;color:white;">📺 현재영역<br><span style="font-size:11px;font-weight:400;">화면에 보이는 객체만</span></button>` +
      `<button data-scope="all" style="${btnCss}background:#00897b;color:white;">🌍 전체영역<br><span style="font-size:11px;font-weight:400;">모든 객체</span></button>` +
      `<button data-scope="" style="${btnCss}background:#f1f3f4;color:#555;margin-bottom:0;">취소</button>` +
      '</div>';
    bg.addEventListener('click', e => {
      const b = e.target.closest('button');
      if (!b && e.target !== bg) return;   // 박스 안 여백 클릭은 무시
      bg.remove();
      resolve(b ? (b.dataset.scope || null) : null);
    });
    document.body.appendChild(bg);
  });
}

document.getElementById('saveBtn').onclick = async () => {
  const scope = await askSaveScope();
  if (!scope) return;
  exportKMZ(scope);
};

async function exportKMZ(scope = 'all') {
  // 저장 범위: 'view'=현재 화면에 보이는 객체만, 'all'=전체 객체
  const bounds = scope === 'view' ? map.getBounds() : null;
  const expMarkers = markers.filter(m =>
    m.marker.getMap() && (!bounds || bounds.contain(m.marker.getPosition())));
  // 뷰포트 컬링으로 지도에서 뗀 선(_viewCulled)도 데이터는 살아있음 — 저장 포함
  const expPolylines = polylines.filter(pl =>
    (pl.poly.getMap() || pl.poly._viewCulled) && (!bounds || pl.path.some(p => bounds.contain(p))));
  const expLabels = textLabels.filter(t => !bounds || bounds.contain(t.pos));
  if (expMarkers.length === 0 && expPolylines.length === 0 && expLabels.length === 0) {
    alert(scope === 'view' ? '현재 화면에 보이는 객체가 없습니다.' : '저장할 객체가 없습니다.');
    return;
  }

  // 1. 현재 날짜 문자열
  const now = new Date();
  const dateStr = now.getFullYear().toString() +
                  (now.getMonth() + 1).toString().padStart(2, '0') +
                  now.getDate().toString().padStart(2, '0');

  // 2. 지도 중심 좌표로 주소 조회 → 읍면+리 이름 추출
  const getAddrPrefix = () => new Promise(resolve => {
    const center = map.getCenter();
    geocoder.coord2Address(center.getLng(), center.getLat(), (result, status) => {
      if (status !== kakao.maps.services.Status.OK || !result[0]) { resolve(''); return; }
      const parts = (result[0].address?.address_name || '').split(' ').filter(p => !/^\d/.test(p));
      // 읍·면이 있으면: 읍면명(접미사제거) + 리명(접미사포함)
      const eupMyeon = parts.find(p => /[읍면]$/.test(p)) || '';
      const ri       = parts.find(p => /리$/.test(p)) || '';
      // 구가 있으면: 구명(접미사제거) + 동명(접미사포함, 가번지 포함)
      const gu   = parts.find(p => /구$/.test(p)) || '';
      const dong = [...parts].reverse().find(p => /동(\d+가)?$/.test(p)) || '';

      let prefix = '';
      if (eupMyeon && ri) {
        prefix = `${eupMyeon.replace(/[읍면]$/, '')}${ri}_`;
      } else if (eupMyeon) {
        prefix = `${eupMyeon}_`;
      } else if (gu && dong) {
        prefix = `${gu.replace(/구$/, '')}${dong}_`;
      } else if (gu) {
        prefix = `${gu.replace(/구$/, '')}_`;
      } else if (dong) {
        prefix = `${dong}_`;
      }
      resolve(prefix);
    });
  });

  const prefix = await getAddrPrefix();

  const activeM = expMarkers;
  const lastMarkerRaw = ([...activeM].reverse().find(m => !m.imgSrc)?.name
                        || activeM.at(-1)?.name || '');
  const lastMarkerName = lastMarkerRaw.replace(/_\d{8}.*$/, '').replace(/[\\/:*?"<>|]/g, '').trim();

  const defaultName = lastMarkerName
    ? `${prefix}${dateStr}_${lastMarkerName}`
    : `${prefix}${dateStr}_`;

  // 3. 사용자 파일명 입력
  const userInput = prompt("저장할 파일 이름을 입력하세요 (확장자 제외):", defaultName);
  if (userInput === null) return;
  const fileName = (userInput.trim() || defaultName) + ".kmz";

  showLoading('KMZ 저장 중...');
  try {
    const zip = new JSZip();
    const filesFolder = zip.folder('files');
    let placemarkXml = '';
    let photoIndex = 0;

    for (const m of expMarkers) {
      const pos = m.marker.getPosition();
      const lat = pos.getLat(), lng = pos.getLng();
      const safeName = (m.name || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      if (m.imgSrc) {
        const compressed = await compressImage(m.imgSrc);
        const base64Data = compressed.split(',')[1];
        const filename = `photo_${String(photoIndex++).padStart(4,'0')}.jpg`;
        filesFolder.file(filename, base64Data, { base64: true });
        placemarkXml += `\n  <Placemark>\n    <name>${safeName}</name>\n    <ExtendedData><Data name="photoFile"><value>${filename}</value></Data>${_photoMetaXml(m)}</ExtendedData>\n    <Point><coordinates>${lng},${lat},0</coordinates></Point>\n  </Placemark>`;
      } else {
        placemarkXml += `\n  <Placemark>\n    <name>${safeName}</name>\n    <Point><coordinates>${lng},${lat},0</coordinates></Point>\n  </Placemark>`;
      }
    }
    const styles = new Map();
    for (const pl of expPolylines) placemarkXml += _lineKmlPlacemark(pl, styles);
    for (const t of expLabels) placemarkXml += _textKmlPlacemark(t);

    zip.file('doc.kml', `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2">\n<Document>${_lineKmlStyleDefs(styles)}${placemarkXml}\n</Document>\n</kml>`);

// (기존 zip.generateAsync 부분 수정)
    const blob = await zip.generateAsync({ 
      type: 'blob', 
      compression: 'DEFLATE',
      mimeType: 'application/vnd.google-earth.kmz' // MIME 타입 추가
    });

    const url = URL.createObjectURL(blob);

    // 1. 공통 다운로드 태그 생성
    const a = document.createElement('a');
    a.href = url;
    // 확장자 강제 지정
    a.download = fileName.endsWith('.kmz') ? fileName : fileName + '.kmz';
    document.body.appendChild(a);

    // 2. 환경별 다운로드 실행
    if (isIOS) {
      // iOS 환경 대응
      window.open(url, '_blank');
    } else {
      // 안드로이드 및 PC 환경
      a.click();
    }

    // 3. 정리
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000); 
    
    hideLoading();
  } catch (err) {
    hideLoading();
    alert('KMZ 저장 중 오류: ' + err.message);
  }
}
// ─── 이미지 압축 (저장 시 500KB 이하) ────────────────
const _compressCache = new Map();   // 원본 src → 압축 결과 (같은 사진 매번 재압축 방지)
function compressImage(imgSrc) {
  if (_compressCache.has(imgSrc)) return Promise.resolve(_compressCache.get(imgSrc));
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const TARGET = 300 * 1024; // 500KB (base64 환산)
      const canvas = document.createElement('canvas');
      const MAX = 1920;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      let quality = 0.85;
      let result = canvas.toDataURL('image/jpeg', quality);
      // base64 길이 * 0.75 ≈ 실제 바이트
      while (result.length * 0.75 > TARGET && quality > 0.1) {
        quality = Math.round((quality - 0.05) * 100) / 100;
        result = canvas.toDataURL('image/jpeg', quality);
      }
      // 원본 EXIF 복원 — canvas는 GPS·날짜·카메라 정보 등 EXIF를 모두 버리므로
      // 원본(imgSrc)에서 읽어 압축 결과에 다시 삽입
      try {
        const exif = piexif.load(imgSrc);
        if (exif['0th']) {
          delete exif['0th'][piexif.ImageIFD.UserComment];
          delete exif['0th'][piexif.ImageIFD.ImageDescription];
        }
        if (exif['Exif']) delete exif['Exif'][piexif.ExifIFD.UserComment];
        result = _exifSafeCarry(exif, result);
      } catch(e) {}
      _compressCache.set(imgSrc, result);
      resolve(result);
    };
    img.src = imgSrc;
  });
}
// ─── 지도 종류 변경 (Kakao) ──────────────────────────
let _lastBaseType = 'HYBRID';
let _terrainOn = false, _cadastralOn = false;

function changeMapType(value) {
  if (_terrainOn)   { map.removeOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);      _terrainOn  = false; }
  if (_cadastralOn) { map.removeOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT); _cadastralOn = false; }
  if (value === 'TERRAIN') {
    map.setMapTypeId(kakao.maps.MapTypeId[_lastBaseType]);
    map.addOverlayMapTypeId(kakao.maps.MapTypeId.TERRAIN);
    _terrainOn = true;
  } else if (value === 'USE_DISTRICT') {
    map.setMapTypeId(kakao.maps.MapTypeId[_lastBaseType]);
    map.addOverlayMapTypeId(kakao.maps.MapTypeId.USE_DISTRICT);
    _cadastralOn = true;
  } else {
    _lastBaseType = value;
    map.setMapTypeId(kakao.maps.MapTypeId[value]);
  }
}

// ─── 길게 누르기 ──────────────────────────────────────
const LONG_PRESS_MS = 600;
function attachLongPress(target, onLongPress) {
  let timer = null, startX = 0, startY = 0;
  function start(x, y) {
    startX = x; startY = y;
    suppressLongPress = true;  // 마커/선 위에서 누름 → 지도 롱프레스 차단
    timer = setTimeout(() => { suppressLongPress = false; onLongPress(); }, LONG_PRESS_MS);
  }
  function cancel() { clearTimeout(timer); timer = null; suppressLongPress = false; }

  kakao.maps.event.addListener(target, 'touchstart', e => {
    const t = e.changedTouches ? e.changedTouches[0] : e;
    start(t.clientX, t.clientY);
  });
  kakao.maps.event.addListener(target, 'touchend', cancel);
  kakao.maps.event.addListener(target, 'touchmove', e => {
    const t = e.changedTouches ? e.changedTouches[0] : e;
    if (Math.abs(t.clientX - startX) > 8 || Math.abs(t.clientY - startY) > 8) cancel();
  });
  kakao.maps.event.addListener(target, 'mousedown', e => {
    if (e && e.button != null && e.button !== 0) return;
    try {
      const point = map.getProjection().pointFromCoords(
        target.getPosition ? target.getPosition() : target.getPath()[0]
      );
      start(point.x, point.y);
    } catch (_) {}
  });
  kakao.maps.event.addListener(target, 'mouseup', cancel);
}

// ─── CAD 문자(kind=text) 텍스트 라벨 — 마커 없이 글자만(회전 포함) ──

let textLabels = [];
