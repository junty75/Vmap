/* ════════════════════════════════
   이미지 압축 / GPS 다운로드
════════════════════════════════ */
const _compressCache = new Map();   // 원본 src → 압축 결과 (같은 사진 매번 재압축 방지)
function compressImage(src) {
  if (_compressCache.has(src)) return Promise.resolve(_compressCache.get(src));
  return new Promise(res => {
    const TARGET = 300 * 1024;
    const img = new Image();
    img.onload = () => {
      const M = 1920; let w = img.width, h = img.height;
      if (w > M || h > M) { if (w > h) { h = Math.round(h*M/w); w = M; } else { w = Math.round(w*M/h); h = M; } }
      const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      let q = 0.85, r = cv.toDataURL('image/jpeg', q);
      while (r.length * 0.75 > TARGET && q > 0.1) { q = Math.round((q - 0.05)*100)/100; r = cv.toDataURL('image/jpeg', q); }
      // 원본 EXIF 복원 — canvas 는 GPS·촬영일시 등 EXIF 를 모두 버리므로 다시 삽입 (index.html 과 동일)
      try {
        const exif = piexif.load(src);
        if (exif['0th']) { delete exif['0th'][piexif.ImageIFD.UserComment]; delete exif['0th'][piexif.ImageIFD.ImageDescription]; }
        if (exif['Exif']) delete exif['Exif'][piexif.ExifIFD.UserComment];
        r = _exifSafeCarry(exif, r);
      } catch(e) {}
      _compressCache.set(src, r);
      res(r);
    };
    img.src = src;
  });
}


/* ════════════════════════════════
   EXIF 메타 유틸 (piexif) — index.html 과 동일
════════════════════════════════ */
// XPTitle/XPComment 는 UTF-16LE 바이트 배열 (한글 안전 — 탐색기/데스크톱 뷰어와 동일 필드)
function _xpBytes(str) { const a = []; for (const ch of String(str)) { const c = ch.charCodeAt(0); a.push(c & 0xFF, (c >> 8) & 0xFF); } a.push(0, 0); return a; }
function _xpStr(bytes) { if (!bytes || !bytes.length) return ''; let s = ''; for (let i = 0; i + 1 < bytes.length; i += 2) { const c = bytes[i] | (bytes[i+1] << 8); if (!c) break; s += String.fromCharCode(c); } return s; }
function _gpsRat(v) { v = Math.abs(v); const d = Math.floor(v), mF = (v - d) * 60, m = Math.floor(mF), s = Math.round((mF - m) * 60 * 10000); return [[d,1],[m,1],[s,10000]]; }
function exifNow(d = new Date()) { const p = n => String(n).padStart(2,'0'); return `${d.getFullYear()}:${p(d.getMonth()+1)}:${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`; }

// EXIF 를 통째로 재직렬화(dump)하다 실패하면(일부 폰 MakerNote 등)
// 핵심 필드(날짜·GPS·제목·설명)만이라도 옮겨서 기록한다 — 실패 시 메타가 통째로 사라지던 문제 방지.
function _exifSafeCarry(exif, jpegDataUrl) {
  try { return piexif.insert(piexif.dump(exif), jpegDataUrl); }
  catch(e) {
    try {
      const fresh = { '0th':{}, 'Exif':{}, 'GPS':{}, '1st':{}, 'thumbnail':null };
      const o = exif['0th'] || {}, x = exif['Exif'] || {}, g = exif['GPS'] || {};
      const dt = x[piexif.ExifIFD.DateTimeOriginal] || o[piexif.ImageIFD.DateTime];
      if (dt) { fresh['Exif'][piexif.ExifIFD.DateTimeOriginal] = dt; fresh['0th'][piexif.ImageIFD.DateTime] = dt; }
      if (g[piexif.GPSIFD.GPSLatitude]) {
        fresh['GPS'][piexif.GPSIFD.GPSLatitudeRef]  = g[piexif.GPSIFD.GPSLatitudeRef]  || 'N';
        fresh['GPS'][piexif.GPSIFD.GPSLatitude]     = g[piexif.GPSIFD.GPSLatitude];
        fresh['GPS'][piexif.GPSIFD.GPSLongitudeRef] = g[piexif.GPSIFD.GPSLongitudeRef] || 'E';
        fresh['GPS'][piexif.GPSIFD.GPSLongitude]    = g[piexif.GPSIFD.GPSLongitude];
      }
      if (o[piexif.ImageIFD.XPTitle])   fresh['0th'][piexif.ImageIFD.XPTitle]   = o[piexif.ImageIFD.XPTitle];
      if (o[piexif.ImageIFD.XPComment]) fresh['0th'][piexif.ImageIFD.XPComment] = o[piexif.ImageIFD.XPComment];
      if (o[piexif.ImageIFD.ImageDescription]) fresh['0th'][piexif.ImageIFD.ImageDescription] = o[piexif.ImageIFD.ImageDescription];
      return piexif.insert(piexif.dump(fresh), jpegDataUrl);
    } catch(e2) { console.warn('EXIF 기록 실패', e2); return jpegDataUrl; }
  }
}

// 사진 dataURL 에서 제목/설명/촬영일시/GPS 읽기
function readPhotoMeta(imgSrc) {
  const out = { title:'', desc:'', taken:'', lat:null, lng:null };
  try {
    const ex = piexif.load(imgSrc);
    out.title = _xpStr(ex['0th'][piexif.ImageIFD.XPTitle]);
    out.desc  = _xpStr(ex['0th'][piexif.ImageIFD.XPComment]);
    out.taken = (ex['Exif'] && ex['Exif'][piexif.ExifIFD.DateTimeOriginal]) || ex['0th'][piexif.ImageIFD.DateTime] || '';
    const gps = ex['GPS'];
    if (gps && gps[piexif.GPSIFD.GPSLatitude] && gps[piexif.GPSIFD.GPSLongitude]) {
      const toDec = (dms, ref) => { const d = dms[0][0]/dms[0][1], m = dms[1][0]/dms[1][1], s = dms[2][0]/dms[2][1]; return (d + m/60 + s/3600) * ((ref === 'S' || ref === 'W') ? -1 : 1); };
      const la = toDec(gps[piexif.GPSIFD.GPSLatitude],  gps[piexif.GPSIFD.GPSLatitudeRef]  || 'N');
      const lo = toDec(gps[piexif.GPSIFD.GPSLongitude], gps[piexif.GPSIFD.GPSLongitudeRef] || 'E');
      if (!isNaN(la) && !isNaN(lo) && (la !== 0 || lo !== 0)) { out.lat = la; out.lng = lo; }
    }
  } catch(e) {}
  return out;
}
// 제목/설명/GPS/촬영일시를 JPEG dataURL 의 EXIF 에 기록 (전달 안 한 항목은 유지)
function writePhotoMeta(imgSrc, { title, desc, lat, lng, taken } = {}) {
  try {
    let ex; try { ex = piexif.load(imgSrc); } catch(e) { ex = { '0th':{}, 'Exif':{}, 'GPS':{}, '1st':{}, 'thumbnail':null }; }
    ex['0th'] = ex['0th'] || {}; ex['Exif'] = ex['Exif'] || {}; ex['GPS'] = ex['GPS'] || {};
    if (title != null) {
      ex['0th'][piexif.ImageIFD.XPTitle] = _xpBytes(title);
      // ImageDescription 은 ASCII 필드 — 한글이면 기록 안 함 (외부 뷰어 인코딩 깨짐 방지)
      if (/^[\x00-\x7F]*$/.test(title)) ex['0th'][piexif.ImageIFD.ImageDescription] = title;
      else delete ex['0th'][piexif.ImageIFD.ImageDescription];
    }
    if (desc != null) ex['0th'][piexif.ImageIFD.XPComment] = _xpBytes(desc);
    if (taken) { ex['Exif'][piexif.ExifIFD.DateTimeOriginal] = taken; ex['0th'][piexif.ImageIFD.DateTime] = taken; }
    if (lat != null && lng != null) {
      ex['GPS'][piexif.GPSIFD.GPSLatitudeRef]  = lat >= 0 ? 'N' : 'S';
      ex['GPS'][piexif.GPSIFD.GPSLatitude]     = _gpsRat(lat);
      ex['GPS'][piexif.GPSIFD.GPSLongitudeRef] = lng >= 0 ? 'E' : 'W';
      ex['GPS'][piexif.GPSIFD.GPSLongitude]    = _gpsRat(lng);
    }
    return _exifSafeCarry(ex, imgSrc);
  } catch(e) { console.warn('EXIF 기록 실패', e); return imgSrc; }
}
// 사진을 기기에 저장 (안드로이드: 다운로드 폴더 → 갤러리에 표시됨)
// data: URL 은 용량이 크면 안드로이드 크롬에서 다운로드가 '조용히' 실패 → Blob 으로 변환해 저장.
function downloadPhoto(imgSrc, name) {
  const nm0 = (name || 'photo').replace(/[\\/:*?"<>|]/g, '_');
  const nm = /\.jpe?g$/i.test(nm0) ? nm0 : nm0 + '.jpg';
  let href = imgSrc, revoke = null;
  try {
    const i = imgSrc.indexOf(',');
    const bin = atob(imgSrc.slice(i + 1));
    const u8 = new Uint8Array(bin.length);
    for (let k = 0; k < bin.length; k++) u8[k] = bin.charCodeAt(k);
    const mime = imgSrc.slice(5, i).split(';')[0] || 'image/jpeg';
    href = URL.createObjectURL(new Blob([u8], { type: mime }));
    revoke = href;
  } catch(e) {}
  const a = document.createElement('a');
  a.href = href; a.download = nm;
  document.body.appendChild(a); a.click(); a.remove();
  if (revoke) setTimeout(() => URL.revokeObjectURL(revoke), 10000);
}
// 사진 메타(설명/촬영일시) → ExtendedData 조각 (자동저장/내보내기 → 재로드 복원용)
function _photoMetaXmlV(m) {
  let s = '';
  if (m.desc) s += `<Data name="desc"><value>${esc(m.desc)}</value></Data>`;
  if (m.taken) s += `<Data name="taken"><value>${esc(m.taken)}</value></Data>`;
  if (m.origKey) s += `<Data name="orig"><value>${esc(m.origKey)}</value></Data>`;   // 원본 보관소 키
  return s;
}
// VWorld 역지오코딩 (사진 정보 모달 주소 표시용)
function _fetchAddrV(lng, lat, cb) {
  jsonp(`https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0&crs=epsg:4326&point=${lng},${lat}&type=parcel&format=json&key=${VWORLD_KEY}`)
    .then(d => cb((d?.response?.status === 'OK' && d.response.result?.[0]?.text) || '-'))
    .catch(() => cb('-'));
}

/* ════════════════════════════════
   사진 정보/메타 수정 모달
════════════════════════════════ */
let piTarget = null;
function openPhotoInfoV(m) {
  piTarget = m;
  const meta = readPhotoMeta(m.imgSrc);
  document.getElementById('piTitle').value = m.name || meta.title || '';
  document.getElementById('piDesc').value = (m.desc != null && m.desc !== '') ? m.desc : (meta.desc || '');
  const ll = fromMerc(m.feat.getGeometry().getCoordinates());
  document.getElementById('piTaken').textContent = '📅 촬영일시: ' + (m.taken || meta.taken || '정보 없음');
  document.getElementById('piCoord').textContent = '📍 좌표: ' + ll[1].toFixed(6) + ', ' + ll[0].toFixed(6);
  const addrEl = document.getElementById('piAddr');
  addrEl.textContent = '🏠 주소: 조회 중...';
  _fetchAddrV(ll[0], ll[1], t => addrEl.textContent = '🏠 주소: ' + t);
  document.getElementById('photoInfoModal').classList.add('show');
}
function closePhotoInfo() {
  document.getElementById('photoInfoModal').classList.remove('show');
  piTarget = null;
}
document.getElementById('photoInfoModal').addEventListener('click', e => {
  if (e.target === document.getElementById('photoInfoModal')) closePhotoInfo();
});
document.getElementById('piCloseBtn').onclick = closePhotoInfo;
// 저장: 제목/설명을 마커·EXIF(XPTitle/XPComment)에 기록 → KMZ 저장/사진저장에 그대로 반영
document.getElementById('piSaveBtn').onclick = () => {
  if (!piTarget) return;
  const title = document.getElementById('piTitle').value.trim();
  const desc = document.getElementById('piDesc').value.trim();
  if (title) piTarget.name = title;
  piTarget.desc = desc;
  piTarget.imgSrc = writePhotoMeta(piTarget.imgSrc, { title: piTarget.name, desc });
  // 보관 중인 원본에도 바로 기록 (사진저장 시 전체 EXIF + 최신 메타 유지)
  if (piTarget.origKey) {
    const t = piTarget;
    getOrig(t.origKey).then(o => { if (o) saveOrig(t.origKey, writePhotoMeta(o, { title: t.name, desc: t.desc })); });
  }
  if (piTarget.ov) {   // 열려 있는 팝업 갱신
    const el = piTarget.ov.getElement();
    const sp = el.querySelector('.head span'); if (sp) sp.textContent = piTarget.name;
    const im = el.querySelector('.pimg'); if (im) im.src = piTarget.imgSrc;
  }
  autoSaveToDB();
  closePhotoInfo();
};
// 사진저장: 보관된 원본(전체 EXIF)에 현재 메타를 넣어 기기에 저장. 원본 없으면 표시본으로.
document.getElementById('piDownloadBtn').onclick = async () => {
  if (!piTarget) return;
  const t = piTarget;
  const ll = fromMerc(t.feat.getGeometry().getCoordinates());
  const args = { title: t.name, desc: t.desc || '', lat: ll[1], lng: ll[0] };
  if (t.taken) args.taken = t.taken;
  const orig = await getOrig(t.origKey);
  downloadPhoto(writePhotoMeta(orig || t.imgSrc, args), t.name);
};
// 사진 팝업의 ℹ️ 버튼 → 정보 모달
function photoInfoFromPop(btn) {
  const el = btn.closest('.mpopup');
  const m = markers.find(x => x.ov && x.ov.getElement() === el);
  if (m && m.isPhoto) openPhotoInfoV(m);
}

/* ════════════════════════════════
   fitPts / dlBlob
════════════════════════════════ */
function fitPts(pts) {
  if (!pts || !pts.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  pts.forEach(c => { if(c[0]<minX)minX=c[0];if(c[0]>maxX)maxX=c[0];if(c[1]<minY)minY=c[1];if(c[1]>maxY)maxY=c[1]; });
  vmap.getView().setCenter([(minX+maxX)/2,(minY+maxY)/2]);
  const w=maxX-minX,h=maxY-minY;
  if (w<100&&h<100) { vmap.getView().setZoom(16); return; }
  const mapSize=vmap.getSize()||[innerWidth,innerHeight];
  const res=Math.max(w/Math.max(mapSize[0]-160,100),h/Math.max(mapSize[1]-160,100));
  vmap.getView().setZoom(Math.min(Math.max(Math.floor(Math.log2(156543.03392/res)),1),16));
}

/* ════════════════════════════════
   나침반 / 회전 잠금 (2-state)
   1번째 클릭: 북방향으로 고정
   2번째 클릭: 잠금 해제
   ※ change:rotation 리스너(initMap 내)가 rotationLocked 시 rotation을 0으로 강제
════════════════════════════════ */
let rotationLocked = false;

/* 회전 인터랙션 활성/비활성 헬퍼 */
function setRotationInteractions(enabled) {
  if (!vmap) return;
  vmap.getInteractions().forEach(i => {
    // PinchRotate, DragRotate, DragRotateAndZoom 모두 처리
    const name = i.constructor && i.constructor.name ? i.constructor.name : '';
    if (name.indexOf('Rotate') !== -1 ||
        (typeof ol.interaction.PinchRotate !== 'undefined' && i instanceof ol.interaction.PinchRotate) ||
        (typeof ol.interaction.DragRotate  !== 'undefined' && i instanceof ol.interaction.DragRotate)) {
      i.setActive(enabled);
    }
  });
}

document.getElementById('compassBtn').onclick = () => {
  if (!vmap) return;
  const view = vmap.getView();
  if (rotationLocked) {
    // ── 잠금 해제 ──
    rotationLocked = false;
    setRotationInteractions(true);  // 회전 인터랙션 복원
    document.getElementById('compassBtn').classList.remove('locked');
    document.getElementById('compassBtn').title = '북방향 고정';
  } else {
    // ── 잠금: flag 먼저 설정 → 북방향 복귀 → 인터랙션 비활성 ──
    rotationLocked = true;
    view.setRotation(0);            // 즉시 북방향 (animate 불안정)
    setRotationInteractions(false); // 핀치/드래그 회전 차단
    document.getElementById('compassBtn').classList.add('locked');
    document.getElementById('compassBtn').title = '회전 잠금 중 (한 번 더 누르면 해제)';
  }
};

/* ════════════════════════════════
   지도 종류 변경 (VWorld)
════════════════════════════════ */
function changeVWorldMapType(value) {
  if (!vmap) return;
  try { vmap.setBasemapType(vw.ol3.BasemapType[value]); } catch(e) { console.warn('지도 유형 변경 오류', e); }
  if (value === 'PHOTO') prunePhotoBaseLayers();
}

// 항공사진 모드일 때 함께 깔리는 일반지도/하이브리드 베이스 타일을 끈다 (불필요한 타일 요청 제거 → 가벼움).
// VWorld 베이스 타일 URL의 종류명만 보고 판단. 위성(Satellite)만 남기고 Base/Hybrid/gray류는 숨김.
// 마커/선(벡터)·지적도(/req/wms)는 건드리지 않음. 실패해도 지도에 영향 없도록 방어적 처리.
function prunePhotoBaseLayers() {
  if (!vmap) return;
  try {
    vmap.getLayers().getArray().forEach(layer => {
      if (!(layer instanceof ol.layer.Tile)) return;
      const src = layer.getSource && layer.getSource();
      if (!src) return;
      let urls = [];
      try { if (src.getUrls) urls = src.getUrls() || []; else if (src.getUrl) urls = [src.getUrl()].filter(Boolean); } catch(_) {}
      const u = urls.join(' ').toLowerCase();
      if (!u) return;
      if (u.indexOf('/req/wms') !== -1) return;            // 지적도(WMS) 제외
      if (/\/(satellite|photo)\//.test(u)) return;          // 항공사진 레이어는 유지
      if (/\/(base|hybrid|gray|grey|midnight)\//.test(u)) { // 일반/하이브리드/회색 베이스만 숨김
        layer.setVisible(false);
      }
    });
  } catch(e) { console.warn('베이스 레이어 정리 건너뜀', e); }
}

/* ════════════════════════════════
   단축키
════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (markerPlacingMode) { document.getElementById('markerBtn').click(); return; }
  }
  if (e.altKey) { e.preventDefault(); toggleDraw(); return; }
  if (e.ctrlKey && e.key.toLowerCase()==='s') { e.preventDefault(); exportKMZ(); return; }
  if (drawing && (e.key==='Backspace'||(e.ctrlKey&&e.key==='z'))) {
    e.preventDefault();
    if (drawCoords.length > 0) { drawCoords.pop(); refreshDraw(); }
  }
});
