<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;overflow:hidden;font-family:'맑은 고딕',sans-serif;}
#vmap{width:100%;height:100%;position:absolute;top:0;left:0;}

/* ── 상단 주소표시 ── */
#address-display {
  position:absolute;top:10px;left:10px;z-index:2000;
  background:rgba(0,0,0,0.62);color:white;font-size:13px;
  padding:5px 10px;border-radius:6px;pointer-events:auto;cursor:pointer;
  white-space:nowrap;max-width:calc(100vw - 24px);
  overflow:hidden;text-overflow:ellipsis;
}

/* ── 플로팅 버튼 ── */
.btn{
  position:absolute;z-index:1000;
  background:white;border:none;border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;width:48px;height:48px;
}
#saveBtn{top:16px;right:72px;}
#saveBtn:disabled{opacity:0.4;cursor:not-allowed;}
#loadBtn{top:16px;right:16px;}
#myLocationBtn{top:72px;right:16px;padding:0;transition:background 0.2s;}
#myLocationBtn.active{background:#1a73e8;box-shadow:0 2px 8px rgba(26,115,232,0.6);}
#myLocationBtn.active svg path,#myLocationBtn.active svg circle{stroke:white;}
#myLocationBtn svg{width:26px;height:26px;}
#drawBtn{top:128px;right:16px;padding:0;transition:background 0.2s;font-size:18px;}
#drawBtn.active{background:#e53935;box-shadow:0 2px 8px rgba(219,68,55,0.6);}
#markerBtn{top:184px;right:16px;padding:0;transition:background 0.2s;font-size:20px;}
#markerBtn.active{background:#43a047;box-shadow:0 2px 8px rgba(67,160,71,0.6);}
#clearBtn{top:240px;right:16px;padding:0;transition:background 0.2s;}
#cadastralBtn{top:296px;right:16px;padding:0;font-size:11px;font-weight:600;color:#555;}
#cadastralBtn.active{background:#e8f5e9;box-shadow:0 2px 8px rgba(67,160,71,0.5);color:#2e7d32;}

/* ── 줌버튼 ── */
#zoomBtns{position:absolute;z-index:1000;right:16px;bottom:32px;display:flex;flex-direction:column;gap:4px;}
#zoomBtns button{width:48px;height:48px;background:white;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;}
#zoomBtns button:active{background:#f1f3f4;}

/* ── 나침반/회전잠금 버튼 ── */
#compassBtn{position:absolute;z-index:1000;bottom:32px;left:16px;padding:0;transition:background 0.2s;}
#compassBtn.locked{background:#fff3e0;box-shadow:0 2px 8px rgba(255,152,0,0.5);}
#compassNeedle{display:block;transition:transform 0.3s ease;}

/* ── 조준원 ── */
#crosshair{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;border:3px solid #e53935;border-radius:50%;
  pointer-events:none;z-index:2000;box-shadow:0 0 0 1px rgba(0,0,0,0.15);
}
#crosshair::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:#e53935;border-radius:50%;}
#crosshair.show{display:block;}

/* ── 선 메뉴 ── */
#polyMenu{display:none;position:fixed;z-index:9999;background:white;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);overflow:hidden;min-width:140px;}
#polyMenu.show{display:block;}
#polyMenu button{display:block;width:100%;padding:13px 18px;border:none;background:none;text-align:left;font-size:15px;cursor:pointer;font-family:inherit;}
#polyMenu button:hover{background:#f1f3f4;}
#polyMenu .danger{color:#e53935;}

/* ── 팝업 ── */
.mpopup{background:#fff;padding:8px 10px;border-radius:7px;box-shadow:0 3px 12px rgba(0,0,0,.4);min-width:170px;font-size:13px;font-family:'맑은 고딕',sans-serif;position:relative;}
.mpopup .head{display:flex;justify-content:space-between;align-items:center;font-weight:bold;margin-bottom:5px;gap:8px;}
.mpopup .head button{border:none;background:none;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.mpopup .pimg{max-height:300px;max-width:300px;display:block;margin-top:4px;object-fit:contain;cursor:zoom-in;}
.mpopup .brow{display:flex;gap:5px;margin-top:6px;}
.mpopup .brow button{flex:1;padding:4px 0;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-family:inherit;}
.mpopup .inp{width:100%;box-sizing:border-box;padding:4px;font-size:13px;border:1px solid #ccc;border-radius:4px;font-family:inherit;margin-bottom:5px;}

/* ── 거리표시 ── */
.dist-tip{background:#fff;border:1.5px solid #db4040;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;color:#db4040;white-space:nowrap;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.draw-mode,.draw-mode *{cursor:crosshair !important;}

/* ── 마커 추가 모달 ── */
#markerModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:7000;align-items:flex-start;justify-content:center;}
#markerModal.show{display:flex;}
#markerModalBox{background:white;width:100%;max-width:480px;border-radius:0 0 16px 16px;padding:20px 20px 24px;box-shadow:0 4px 24px rgba(0,0,0,.2);animation:slideDown .22s ease;}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}
#markerModal h3{margin:0 0 14px;font-size:16px;color:#333;}
#markerNameInput{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s;}
#markerNameInput:focus{border-color:#1a73e8;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
#modalCancelBtn{background:#f1f3f4;color:#555;}
#modalConfirmBtn{background:#1a73e8;color:white;}

/* ── 마커 수정 모달 ── */
#markerEditModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:7500;align-items:flex-start;justify-content:center;}
#markerEditModal.show{display:flex;}
#markerEditModalBox{background:white;width:100%;max-width:480px;border-radius:0 0 16px 16px;padding:20px 20px 24px;box-shadow:0 4px 24px rgba(0,0,0,.2);animation:slideDown .22s ease;}
#markerEditModal h3{margin:0 0 14px;font-size:16px;color:#333;}
#markerEditNameInput{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:14px;}
#markerEditNameInput:focus{border-color:#1a73e8;}
.edit-modal-btns{display:flex;gap:10px;}
.edit-modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
#editSaveBtn{background:#1a73e8;color:white;}
#editDeleteBtn{background:#e53935;color:white;}
#editCancelBtn{background:#f1f3f4;color:#555;}
#editMoveBtn{background:#00897b;color:white;}
#markerEditModalBox .edit-modal-btns button{font-size:13px;padding:10px 4px;}

/* ── 이동 힌트 ── */
#moveHint{display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.84);color:white;font-size:13px;padding:10px 18px;border-radius:12px;z-index:5100;pointer-events:auto;text-align:center;white-space:nowrap;}
#moveHint.show{display:block;}
#moveHint .mh-row{margin-top:8px;display:flex;gap:8px;justify-content:center;}
#moveHint .mh-row button{padding:6px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
#moveHint .mh-ok{background:#1a73e8;color:white;}
#moveHint .mh-cancel{background:#555;color:white;}

/* ── 지도종류 선택 ── */
#mapTypeBox{position:absolute;z-index:1000;top:352px;right:16px;}
#mapTypeBox select{width:48px;padding:5px 1px;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:11px;background:white;cursor:pointer;text-align:center;}

/* ── 전체화면 사진뷰어 ── */
#photoViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:8000;align-items:center;justify-content:center;flex-direction:column;padding:16px;}
#photoViewer.show{display:flex;}
#photoViewer img{max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain;}
#photoViewer .pv-name{color:rgba(255,255,255,.8);font-size:13px;margin-top:10px;}

/* ── 로딩 ── */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;flex-direction:column;gap:12px;align-items:center;justify-content:center;color:white;font-size:15px;}
#loading.show{display:flex;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 삭제 힌트 토스트 ── */
#deleteHint{display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:white;font-size:13px;padding:8px 16px;border-radius:20px;z-index:5000;pointer-events:none;white-space:nowrap;}
#deleteHint.show{display:block;}

/* ── iOS 설치 배너 ── */
#installBanner{display:none;position:fixed;bottom:0;left:0;right:0;background:white;padding:14px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.15);z-index:6000;flex-direction:column;gap:8px;}
#installBanner.show{display:flex;}
#installBanner .banner-row{display:flex;align-items:center;justify-content:space-between;}
#installBanner .banner-text{font-size:14px;color:#333;line-height:1.5;}
#installBanner .banner-close{background:none;border:none;font-size:20px;color:#999;cursor:pointer;padding:4px;}
#installBanner .banner-step{font-size:12px;color:#666;}

#fileInput{display:none;}
</style>
</head>
<body>


<!-- 지도 -->
<div id="vmap"></div>

<!-- 주소 표시 -->

<script>
'use strict';

/* ════════════════════════════════
   전역 상태
════════════════════════════════ */
let vmap = null;
let markers   = [];  // {feat, lyr, ov, name, isPhoto, imgSrc}
let polylines = [];  // ol.layer.Vector[]
let drawing   = false, drawCoords = [], drawLayer = null;
let guideLine = null, distOv = null, distEl = null;
let suppressNextClick = false;
let polyTarget = null;
let lastCX = 0, lastCY = 0;
let lastAddr = '주소 없음', lastLL = null;
let locCount  = 0;
let trackingOn = false, watchId = null, locationFeat = null, locationLyr = null;
let markerPlacingMode = false;
let hintShown = false;
let deviceHeading = null;   // 기기 나침반 방향 (정지 중 방향 표시용)
let headingInterval = null; // 정지 중 방향 갱신 타이머

const VWORLD_KEY = '55FD7275-A6F5-3B69-9966-CD4BFA2FD35F';

/* ════════════════════════════════
   유틸
════════════════════════════════ */
function toMerc(lng, lat) { return ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857'); }
function fromMerc(c)      { return ol.proj.transform(c, 'EPSG:3857', 'EPSG:4326'); }
function pad(n)           { return String(n).padStart(2, '0'); }
function randColor()      { return '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'); }
function esc(s)           { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showLoading(msg) { document.getElementById('loadingMsg').textContent = msg||'불러오는 중...'; document.getElementById('loading').classList.add('show'); }
function hideLoading()    { document.getElementById('loading').classList.remove('show'); }

function showDeleteHint() {
  if (hintShown) return; hintShown = true;
  const el = document.getElementById('deleteHint');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function openViewer(src, name) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewerName').textContent = name;
  document.getElementById('photoViewer').classList.add('show');
}
document.getElementById('photoViewer').addEventListener('click', e => {
  if (e.target === document.getElementById('photoViewer') || e.target === document.getElementById('viewerName'))
    document.getElementById('photoViewer').classList.remove('show');
});

/* ════════════════════════════════
   IndexedDB 자동저장
════════════════════════════════ */
const DB_NAME = 'kmz-viewer-vw', DB_VER = 1, STORE = 'kmz';
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
async function saveKMZtoDB(blob) {
  try {
    const db = await openDB();
    const buf = await blob.arrayBuffer();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({ buf, name: 'last_state.kmz' }, 'last');
  } catch(e) { console.warn('DB 저장 실패', e); }
}
async function loadKMZfromDB() {
  try {
    const db = await openDB();
    return new Promise(resolve => {
      const req = db.transaction(STORE).objectStore(STORE).get('last');
      req.onsuccess = () => {
        if (req.result) resolve(new File([req.result.buf], req.result.name, { type: 'application/vnd.google-earth.kmz' }));
        else resolve(null);
      };
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}
async function clearDB() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete('last');
  } catch(e) { console.warn('DB 초기화 오류', e); }
}

async function autoSaveToDB() {
  try {
    // 모두 삭제된 경우 DB 항목 자체를 지워 재실행 시 복원되지 않도록 함
    if (markers.length === 0 && polylines.length === 0) {
      await clearDB();
      return;
    }
    const zip = new JSZip();
    const ff = zip.folder('files');
    let xml = '';
    let pi = 0;
    for (const m of markers) {
      const ll = fromMerc(m.feat.getGeometry().getCoordinates());
      const sn = esc(m.name || '');
      if (m.isPhoto && m.imgSrc) {
        const c = await compressImage(m.imgSrc);
        const fn = `photo_${String(pi++).padStart(4,'0')}.jpg`;
        ff.file(fn, c.split(',')[1], { base64: true });
        xml += `\n<Placemark><name>${sn}</name><ExtendedData><Data name="photoFile"><value>${fn}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>`;
      } else {
        xml += `\n<Placemark><name>${sn}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>`;
      }
    }
    for (const lyr of polylines) {
      const sn = esc(lyr._name || '선');
      const cs = getCoords(lyr).map(c => { const ll = fromMerc(c); return `${ll[0]},${ll[1]},0`; }).join(' ');
      xml += `\n<Placemark><name>${sn}</name><LineString><coordinates>${cs}</coordinates></LineString></Placemark>`;
    }
    zip.file('doc.kml', `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document>${xml}\n</Document></kml>`);
    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    await saveKMZtoDB(blob);
  } catch(e) { console.error('자동저장 오류', e); }
}

function makeLocationStyle(heading) {
  const hasHeading = heading !== null && !isNaN(heading) && heading >= 0;
  if (!hasHeading) {
    return new ol.style.Style({
      image: new ol.style.Circle({
        radius: 9, fill: new ol.style.Fill({ color: '#e53935' }),
        stroke: new ol.style.Stroke({ color: 'white', width: 2.5 })
      })
    });
  }
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="50">' +
    '<polygon points="15,2 6,20 24,20" fill="rgba(229,57,53,0.82)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<circle cx="15" cy="25" r="9" fill="#e53935" stroke="white" stroke-width="2.5"/>' +
    '</svg>';
  return new ol.style.Style({
    image: new ol.style.Icon({
      src: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
      anchor: [0.5, 0.5], anchorXUnits: 'fraction', anchorYUnits: 'fraction',
      rotation: heading * Math.PI / 180
    })
  });
}

/* ════════════════════════════════
   역지오코딩 / 주소 표시
════════════════════════════════ */
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    s.onerror = reject;
    document.head.appendChild(s);
    setTimeout(() => { delete window[cb]; try { s.remove(); } catch(_) {} reject(new Error('timeout')); }, 10000);
  });
}

function parseShortAddr(addr) {
  if (!addr) return '';
  const skipRe = /(도|시|군|구)$/;
  const parts = addr.trim().split(/\s+/);
  const idx = parts.findIndex(p => !skipRe.test(p));
  return idx === -1 ? addr : parts.slice(idx).join(' ');
}

let addrTimer = null;
function scheduleAddrUpdate(overrideLng, overrideLat) {
  clearTimeout(addrTimer);
  addrTimer = setTimeout(async () => {
    if (!vmap) return;
    const [lng, lat] = (overrideLng != null && overrideLat != null)
      ? [overrideLng, overrideLat]
      : fromMerc(vmap.getView().getCenter());
    const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0` +
      `&crs=epsg:4326&point=${lng},${lat}&type=parcel&format=json&key=${VWORLD_KEY}`;
    try {
      const d = await jsonp(url);
      const text = (d?.response?.status === 'OK') ? (d.response.result?.[0]?.text || '') : '';
      document.getElementById('address-display').textContent = parseShortAddr(text) || '주소 없음';
    } catch(e) { document.getElementById('address-display').textContent = ''; }
  }, 600);
}

/* ════════════════════════════════
   지도 초기화
════════════════════════════════ */
function initMap(lat, lng) {
  vw.ol3.CameraPosition.center = ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857');
  vw.ol3.CameraPosition.zoom   = 14;
  vw.ol3.MapOptions = {
    basemapType        : vw.ol3.BasemapType.PHOTO,
    controlDensity     : vw.ol3.DensityType.EMPTY,
    interactionDensity : vw.ol3.DensityType.FULL,
    controlsAutoArrange: true,
    homePosition       : vw.ol3.CameraPosition,
    initPosition       : vw.ol3.CameraPosition
  };
  vmap = new vw.ol3.Map('vmap', vw.ol3.MapOptions);

  // 더블클릭 확대 비활성화
  vmap.getInteractions().forEach(i => {
    if (i instanceof ol.interaction.DoubleClickZoom) i.setActive(false);
  });

  vmap.on('click', mapClick);
  vmap.on('pointermove', mapMove);
  vmap.getViewport().addEventListener('contextmenu', mapRightClick);
  vmap.getView().on('change:rotation', () => {
    const rot = vmap.getView().getRotation();
    // 회전 잠금 중이면 즉시 북방향으로 강제
    if (rotationLocked && Math.abs(rot) > 0.001) {
      vmap.getView().setRotation(0);
      return;
    }
    const deg = -(rot * 180 / Math.PI);
    document.getElementById('compassNeedle').style.transform = `rotate(${deg}deg)`;
  });
  scheduleAddrUpdate(); // 초기 로드 시 중심 주소 표시

  const vp = vmap.getViewport();

  let touchDrawStartX = 0, touchDrawStartY = 0;
  vp.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') {
      touchDrawStartX = e.clientX;
      touchDrawStartY = e.clientY;
    }
  }, { passive: true });

  vp.addEventListener('pointerup', e => {
    if (e.pointerType === 'touch') {
      const dx = e.clientX - touchDrawStartX;
      const dy = e.clientY - touchDrawStartY;
      if (Math.hypot(dx, dy) > 10) return; // 드래그(지도 이동)는 무시
      const rect = vp.getBoundingClientRect();
      const pixel = [
        (e.clientX - rect.left) * (vp.offsetWidth / rect.width),
        (e.clientY - rect.top)  * (vp.offsetHeight / rect.height)
      ];
      const coord = vmap.getCoordinateFromPixel(pixel);
      if (drawing) {
        if (coord) {
          drawCoords.push(coord);
          refreshDraw();
          if (drawCoords.length >= 1) updateDistDisplay();
        }
        suppressNextClick = true;
      } else {
        // 마커 조준원 모드
        if (markerPlacingMode) {
          markerPlacingMode = false;
          document.getElementById('markerBtn').classList.remove('active');
          document.getElementById('crosshair').classList.remove('show');
          if (coord) { pendingMarkerCoord = coord; openMarkerModal(); }
          suppressNextClick = true;
          return;
        }
        // 마커 탭 감지
        let hit = false;
        vmap.forEachFeatureAtPixel(pixel, feat => {
          if (hit) return;
          const m = markers.find(mk => mk.feat === feat);
          if (m) { hit = true; openPopup(m); }
        }, { hitTolerance: 20 });
        if (!hit) closeAllPopups();
        // 탭 지점 주소 업데이트
        if (coord) {
          const [lo, la] = fromMerc(coord);
          scheduleAddrUpdate(lo, la);
        }
        suppressNextClick = true;
      }
    }
  });

  // 줌 버튼
  document.getElementById('zoomInBtn').onclick  = () => vmap.getView().setZoom((vmap.getView().getZoom()||14) + 1);
  document.getElementById('zoomOutBtn').onclick = () => vmap.getView().setZoom((vmap.getView().getZoom()||14) - 1);

  // DB 복원
  loadKMZfromDB().then(file => { if (file) loadKMZ(file, true); });
}


window.onload = () => {
  // 뒤로가기 버퍼: 초기 20개
  for (let i = 0; i < 20; i++) {
    window.history.pushState({ page: 'map' }, null, '');
  }

  let exitRequested = false;

  function handlePopstate() {
    if (exitRequested) return;

    // 고속 연속 탭에도 버퍼 절대 소진 안 되도록 한 번에 5개 추가
    // (모바일 브라우저는 popstate 2개를 동시에 큐에 올릴 수 있음)
    for (let i = 0; i < 5; i++) {
      window.history.pushState({ page: 'map' }, null, '');
    }

    if (drawing) {
      // 선그리기 모드: 마지막 점 삭제
      if (drawCoords.length > 0) {
        drawCoords.pop();
        refreshDraw(); // 내부에서 clearAllGuide 또는 updateDistDisplay 호출
      }
      // drawCoords가 0이 되어도 drawing 모드 유지 (앱 종료 안 함)
    } else {
      // 일반 모드: 앱 종료 확인
      if (confirm('앱을 종료하시겠습니까?')) {
        exitRequested = true;
        window.close();
        setTimeout(() => window.history.go(-window.history.length), 150);
      }
    }
  }
  window.addEventListener('popstate', handlePopstate);

  // iOS 배너
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !localStorage.getItem('installBannerDismissed')) {
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 2000);
  }

  if (!navigator.geolocation) { initMap(35.8242, 127.1480); return; }
  navigator.geolocation.getCurrentPosition(
    p  => initMap(p.coords.latitude, p.coords.longitude),
    () => initMap(35.8242, 127.1480),
    { timeout: 5000, maximumAge: 60000 }
  );
};

   지도 이벤트
════════════════════════════════ */
function mapClick(evt) {
  if (evt.originalEvent?.pointerType === 'touch') return; // 터치는 pointerup에서 처리
  if (suppressNextClick) { suppressNextClick = false; return; }
  if (drawing) {
    drawCoords.push(evt.coordinate);
    refreshDraw();
    if (drawCoords.length >= 1) updateDistDisplay();
    return;
  }

  // 마커 조준원 모드: 클릭 시 해당 위치에 마커 추가 모달
  if (markerPlacingMode) {
    markerPlacingMode = false;
    document.getElementById('markerBtn').classList.remove('active');
    document.getElementById('crosshair').classList.remove('show');
    pendingMarkerCoord = evt.coordinate;
    openMarkerModal();
    return;
  }

  // 클릭 지점 주소 업데이트
  const [lo, la] = fromMerc(evt.coordinate);
  scheduleAddrUpdate(lo, la);

  let hit = false;
  vmap.forEachFeatureAtPixel(evt.pixel, feat => {
    if (hit) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) { hit = true; openPopup(m); }
  }, { hitTolerance: 16 });
  if (hit) return;
  closeAllPopups();

}

function mapMove(evt) {
  // 미리보기 점선 없이 확정된 거리만 표시 (가이드 정리만)
  clearGuide();
}
document.addEventListener('mousemove', e => { lastCX = e.clientX; lastCY = e.clientY; }, { passive: true });

function mapRightClick(e) {
  e.preventDefault(); if (!vmap) return;
  if (drawing) return; // 선그리기 중 우클릭 무시 (원본과 동일)
  const px = vmap.getEventPixel(e);

  // 마커 우클릭 → 수정/삭제 모달
  let hitMk = false;
  vmap.forEachFeatureAtPixel(px, feat => {
    if (hitMk) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) { hitMk = true; openMarkerEditModalObj(m); }
  }, { hitTolerance: 16 });
  if (hitMk) return;

  // 선 우클릭 → 수정/삭제 메뉴
  const nearPoly = findNearPoly(px, 10);
  if (nearPoly) { showPolyMenu(lastCX || e.clientX, lastCY || e.clientY, nearPoly); return; }
  // 빈 공간 우클릭 → 아무것도 안 함 (원본과 동일)
}

/* ════════════════════════════════
   선 그리기
════════════════════════════════ */
function toggleDraw() { drawing ? endDraw() : startDraw(); }

function startDraw() {
  if (drawing) return;
  drawing = true; drawCoords = [];
  drawLayer = mkLineLyr([], '#FF0000', 3);
  addLyr(drawLayer);
  document.getElementById('vmap').classList.add('draw-mode');
  document.getElementById('drawBtn').classList.add('active');
  document.getElementById('drawBtn').title = '선 그리기 종료';
  // 거리표시는 첫 클릭 후 시작 (startDraw에서 표시 안 함)
}

function endDraw() {
  if (!drawing) return;
  drawing = false; clearAllGuide();
  document.getElementById('vmap').classList.remove('draw-mode');
  document.getElementById('drawBtn').classList.remove('active');
  document.getElementById('drawBtn').title = '선 그리기';
  if (drawCoords.length >= 2 && drawLayer) {
    polylines.push(drawLayer);
    document.getElementById('saveBtn').disabled = false;
    autoSaveToDB();
  } else if (drawLayer) removeLyr(drawLayer);
  drawLayer = null; drawCoords = [];
}

function refreshDraw() {
  if (!drawLayer) return;
  const src = drawLayer.getSource();
  src.clear(); // 점이 없어도 항상 먼저 지움
  if (drawCoords.length >= 2) {
    const f = new ol.Feature(new ol.geom.LineString(drawCoords));
    f.setStyle(lineSt('#FF0000', 3));
    src.addFeature(f);
  } else if (drawCoords.length === 1) {
    const f = new ol.Feature(new ol.geom.Point(drawCoords[0]));
    f.setStyle(new ol.style.Style({
      image: new ol.style.Circle({
        radius: 5,
        fill: new ol.style.Fill({ color: '#FF0000' }),
        stroke: new ol.style.Stroke({ color: 'white', width: 1.5 })
      })
    }));
    src.addFeature(f);
  }
  drawLayer._coords = drawCoords.slice();
  if (drawCoords.length > 0) updateDistDisplay();
  else clearAllGuide(); // 점이 0개면 거리 표시도 제거
}

// 점 확정 후 거리 표시 (📍 총 거리)
function updateDistDisplay() {
  if (!drawCoords.length) return;
  const fmt = d => d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(2) + 'km';
  let dist = 0;
  for (let i = 1; i < drawCoords.length; i++) dist += haversine(drawCoords[i-1], drawCoords[i]);
  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = '📍 총 ' + fmt(dist);
  if (!distOv) {
    distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' });
    vmap.addOverlay(distOv);
  }
  distOv.setPosition(drawCoords[drawCoords.length - 1]);
}

// 마우스 이동 중 미리보기 거리 표시 (✏️ 총 거리)
function updateGuideDistDisplay(previewCoord) {
  if (!drawCoords.length) return;
  const fmt = d => d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(2) + 'km';
  let dist = 0;
  for (let i = 1; i < drawCoords.length; i++) dist += haversine(drawCoords[i-1], drawCoords[i]);
  dist += haversine(drawCoords[drawCoords.length - 1], previewCoord);
  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = '✏️ 총 ' + fmt(dist);
  if (!distOv) {
    distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' });
    vmap.addOverlay(distOv);
  }
  distOv.setPosition(previewCoord);
}

/* ════════════════════════════════
   레이어/스타일 헬퍼
════════════════════════════════ */
function lineSt(color, width) { return new ol.style.Style({ stroke: new ol.style.Stroke({ color, width }) }); }
function mkLineLyr(coords, color, width) {
  const src = new ol.source.Vector();
  if (coords.length >= 2) {
    const f = new ol.Feature(new ol.geom.LineString(coords));
    f.setStyle(lineSt(color, width)); src.addFeature(f);
  }
  const lyr = new ol.layer.Vector({ source: src, zIndex: 100 });
  lyr._color = color; lyr._coords = coords.slice(); lyr._name = '선';
  return lyr;
}
function getCoords(lyr) {
  const fs = lyr.getSource().getFeatures();
  return fs.length ? fs[0].getGeometry().getCoordinates() : (lyr._coords || []);
}
function addLyr(lyr) { vmap.addLayer(lyr); }
function removeLyr(lyr) { try { vmap.removeLayer(lyr); } catch(e) {} }

/* ════════════════════════════════
   가이드선 & 거리
════════════════════════════════ */
function updateGuide(from, to) {
  if (guideLine) { removeLyr(guideLine); guideLine = null; }
  // 점선 가이드
  const src = new ol.source.Vector();
  const f = new ol.Feature(new ol.geom.LineString([from, to]));
  f.setStyle(new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#db4040', width: 2, lineDash: [6, 6] })
  }));
  src.addFeature(f);
  guideLine = new ol.layer.Vector({ source: src, zIndex: 200 });
  addLyr(guideLine);
  const all = [...drawCoords, to];
  let dist = 0;
  for (let i = 1; i < all.length; i++) dist += haversine(all[i-1], all[i]);
  const fmt = d => d < 1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = `총거리 ${fmt(dist)}`;
  if (!distOv) { distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' }); vmap.addOverlay(distOv); }
  distOv.setPosition(to);
}
// 가이드선(점선)만 제거 - 마우스 이동 중 호출
function clearGuide() {
  if (guideLine) { removeLyr(guideLine); guideLine = null; }
}
// 선그리기 종료 시 거리표시까지 모두 제거
function clearAllGuide() {
  if (guideLine) { removeLyr(guideLine); guideLine = null; }
  if (distOv) { vmap.removeOverlay(distOv); distOv = null; } distEl = null;
}
function haversine(c1, c2) {
  const [lo1,la1] = fromMerc(c1), [lo2,la2] = fromMerc(c2);
  const R=6371000, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ════════════════════════════════
   선 근처 탐색
════════════════════════════════ */
function findNearPoly(pixel, thr) {
  let near = null, minD = Infinity;
  polylines.forEach(lyr => {
    const cs = getCoords(lyr);
    for (let i = 0; i < cs.length - 1; i++) {
      const a = vmap.getPixelFromCoordinate(cs[i]);
      const b = vmap.getPixelFromCoordinate(cs[i+1]);
      if (!a || !b) continue;
      const d = ptSegDist(pixel, a, b);
      if (d < minD) { minD = d; near = lyr; }
    }
  });
  return minD <= thr ? near : null;
}
function ptSegDist(p, a, b) {
  const dx=b[0]-a[0], dy=b[1]-a[1];
  if (!dx&&!dy) return Math.hypot(p[0]-a[0],p[1]-a[1]);
  const t=Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));
  return Math.hypot(p[0]-(a[0]+t*dx),p[1]-(a[1]+t*dy));
}

/* ════════════════════════════════

function mkNormalStyle() {
  return new ol.style.Style({

      anchor: [0.5, 1], anchorXUnits: 'fraction', anchorYUnits: 'fraction', scale: 1
    })
  });
}

}

function addMarker(coord, name) {

  const lyr = new ol.layer.Vector({ source: new ol.source.Vector({ features: [feat] }), zIndex: 100 });

  const obj = { feat, lyr, ov: null, name, isPhoto: true, imgSrc };

}

/* ════════════════════════════════
   역지오코딩
════════════════════════════════ */
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    s.onerror = reject;
    document.head.appendChild(s);
    setTimeout(() => { delete window[cb]; try { s.remove(); } catch(_) {} reject(new Error('JSONP timeout')); }, 10000);
  });
}
async function reverseGeocode(lng, lat, cb) {
  const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0` +
    `&crs=epsg:4326&point=${lng},${lat}&type=both&format=json&key=${VWORLD_KEY}`;
  try {
    const d = await jsonp(url);
    if (d?.response?.status === 'OK' && d.response.result?.length) {
      const res = d.response.result;
      let parcel = '', road = '';
      for (const r of res) {
        if (r.type === 'parcel') parcel = r.text || '';
        else if (r.type === 'road') road = r.text || '';
      }
      if (!parcel && !road) { parcel = res[0]?.text||''; road = res[1]?.text||''; }
      if (road) {
        road = road.replace(/\s*\([^)]*\)/g, '').trim();
        const parts = road.split(' ');
        if (parts.length > 1) road = parts.slice(1).join(' ');
      }
      cb((parcel && road) ? `${parcel} / ${road}` : (parcel || road || '주소 없음'));
      return;
    }
  } catch(e) {}
  cb('주소 없음');
}

/* 기기 나침반 리스너 설정 */
function setupDeviceOrientation() {
  const addListeners = () => {
    // Android: deviceorientationabsolute (절대 방위각)
    window.addEventListener('deviceorientationabsolute', e => {
      if (e.alpha != null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
    // iOS: webkitCompassHeading, Android 폴백: deviceorientation
    window.addEventListener('deviceorientation', e => {
      if (e.webkitCompassHeading != null) deviceHeading = e.webkitCompassHeading;
      else if (e.absolute && e.alpha != null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
  };
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+: 권한 요청
    DeviceOrientationEvent.requestPermission()
      .then(s => { if (s === 'granted') addListeners(); })
      .catch(() => addListeners());
  } else {
    addListeners();
  }
}

document.getElementById('myLocationBtn').onclick = () => {
  const btn = document.getElementById('myLocationBtn');
  if (trackingOn) {
    trackingOn = false;
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationLyr) { removeLyr(locationLyr); locationLyr = null; locationFeat = null; }
    if (headingInterval) { clearInterval(headingInterval); headingInterval = null; }
    btn.classList.remove('active');
  } else {
    trackingOn = true; btn.classList.add('active');
    setupDeviceOrientation();
    // 정지 중에도 방향 갱신 (0.5초마다)
    headingInterval = setInterval(() => {
      if (locationFeat && deviceHeading !== null) {
        locationFeat.setStyle(makeLocationStyle(deviceHeading));
      }
    }, 500);
    watchId = navigator.geolocation.watchPosition(pos => {
      const c = toMerc(pos.coords.longitude, pos.coords.latitude);
      // GPS 이동 중이면 GPS 방향, 정지 중이면 나침반 방향
      const h = (pos.coords.heading != null && !isNaN(pos.coords.heading) && pos.coords.heading >= 0)
        ? pos.coords.heading : deviceHeading;
      if (!locationFeat) {
        locationFeat = new ol.Feature({ geometry: new ol.geom.Point(c) });
        locationFeat.setStyle(makeLocationStyle(h));
        locationLyr = new ol.layer.Vector({ source: new ol.source.Vector({ features: [locationFeat] }), zIndex: 200 });
        addLyr(locationLyr);
      } else {
        locationFeat.getGeometry().setCoordinates(c);
        locationFeat.setStyle(makeLocationStyle(h));
      }
      vmap.getView().setCenter(c);
    }, () => {
      alert('위치 정보를 가져올 수 없습니다.');
      trackingOn = false; btn.classList.remove('active');
      if (headingInterval) { clearInterval(headingInterval); headingInterval = null; }
    }, { enableHighAccuracy: true, maximumAge: 3000 });
  }
};

async function loadImage(file, getNG, setNG) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = ev => {
      const src = ev.target.result, name = file.name.replace(/\.[^/.]+$/, ''), ll = extractGPS(src);
      if (ll) {
        const c = toMerc(ll[0], ll[1]);
        addPhotoMarker(c, src, name);
        document.getElementById('saveBtn').disabled = false;
        resolve(c);
      } else {
        if (getNG() === null) setNG(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));
        if (getNG()) { addPhotoMarker(vmap.getView().getCenter(), src, name); document.getElementById('saveBtn').disabled = false; }
        resolve(null);
      }
    };
    r.readAsDataURL(file);
  });
}

/* ════════════════════════════════
   KMZ 불러오기
════════════════════════════════ */
async function loadKMZ(file, silent = false) {
  if (silent) showLoading('이전 데이터 복원 중...');
  else showLoading('KMZ 불러오는 중...');

  if (silent) {
    closeAllPopups();
    markers.forEach(m => removeLyr(m.lyr)); markers = [];
    polylines.forEach(l => removeLyr(l)); polylines = [];
    document.getElementById('saveBtn').disabled = true;
  }

  try {
    const zip = await JSZip.loadAsync(file);
    const keys = Object.keys(zip.files);
    let kmlText = null;
    for (const k of keys) {
      if (/\.kml$/i.test(k.replace(/\0/g, ''))) {
        try { const t = await zip.files[k].async('string'); if (t && t.length > 0) { kmlText = t; break; } } catch(e) {}
      }
    }
    if (!kmlText) { alert('KMZ 안에 .kml 파일이 없습니다.'); hideLoading(); return; }

    showLoading('데이터 읽는 중...');
    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const pts = [];

    for (const pm of Array.from(xml.getElementsByTagName('Placemark'))) {
      const name = pm.getElementsByTagName('name')[0]?.textContent?.trim() || pm.getElementsByTagName('n')[0]?.textContent?.trim() || '설명 없음';
      const ls = pm.getElementsByTagName('LineString')[0];
      const pt = pm.getElementsByTagName('Point')[0];

      let pf = '';
      for (const d of Array.from(pm.getElementsByTagName('Data'))) {
        if (d.getAttribute('name') === 'photoFile') { pf = d.getElementsByTagName('value')[0]?.textContent||''; break; }
      }
      if (!pf) {
        const desc = pm.getElementsByTagName('description')[0]?.textContent||'';
        const mImg = desc.match(/src=["']([^"']+\.(jpe?g|png))["']/i);
        if (mImg) {
          const thumbPath = mImg[1].trim(), rollPath = thumbPath.replace('_thumb.','_roll.');
          const rollEntry = keys.find(z => { const c = z.replace(/\0/g,''); return c===rollPath||c.endsWith('/'+rollPath.split('/').pop()); });
          pf = rollEntry ? rollPath : thumbPath;
        }
      }

      if (ls) {
        const raw = ls.getElementsByTagName('coordinates')[0]?.textContent||'';
        const cs = raw.trim().split(/\s+/).map(c => {
          const p = c.split(','); const lo = parseFloat(p[0]), la = parseFloat(p[1]);
          return (!isNaN(lo)&&!isNaN(la)&&Math.abs(lo)<=180&&Math.abs(la)<=90) ? toMerc(lo,la) : null;
        }).filter(Boolean);
        if (cs.length >= 2) { const lyr = mkLineLyr(cs, randColor(), 4); lyr._name = name; addLyr(lyr); polylines.push(lyr); pts.push(...cs); }
      } else if (pt) {
        const raw = pt.getElementsByTagName('coordinates')[0]?.textContent||'';
        const p = raw.trim().split(','); const lo = parseFloat(p[0]), la = parseFloat(p[1]);
        if (isNaN(lo)||isNaN(la)||Math.abs(lo)>180||Math.abs(la)>90) continue;
        const c = toMerc(lo, la); pts.push(c);
        if (pf) {
          const base = pf.split('/').pop(); let zipF = null;
          for (const k of keys) {
            const ck = k.replace(/\0/g,'');
            if (ck===pf||ck===`files/${pf}`||ck===`images/${base}`||ck.endsWith('/'+base)||ck===base) { zipF = zip.files[k]; break; }
          }
          if (zipF) {
            const b64 = await zipF.async('base64');
            const mime = base.toLowerCase().endsWith('.png') ? 'image/png' : 'image/jpeg';
            addPhotoMarker(c, `data:${mime};base64,${b64}`, name);
          } else addMarker(c, name);
        } else addMarker(c, name);
      }
    }
    fitPts(pts);
    if (pts.length > 0 || markers.length > 0 || polylines.length > 0)
      document.getElementById('saveBtn').disabled = false;
    hideLoading();
  } catch(err) { hideLoading(); alert('KMZ 오류: ' + err.message); }
}

async function getAddrPrefix() {
  try {
    const center = vmap.getView().getCenter();
    const ll = fromMerc(center);
    const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0` +
      `&crs=epsg:4326&point=${ll[0]},${ll[1]}&type=parcel&format=json&key=${VWORLD_KEY}`;
    const d = await jsonp(url);
    if (d?.response?.status !== 'OK') return '';
    const text = d.response.result?.[0]?.text || '';
    const parts = text.split(' ').filter(p => !/^\d/.test(p));
    const eupMyeon = parts.find(p => /[읍면]$/.test(p))||'';
    const ri = parts.find(p => /리$/.test(p))||'';
    const gu = parts.find(p => /구$/.test(p))||'';
    const dong = [...parts].reverse().find(p => /동(\d+가)?$/.test(p))||'';
    if (eupMyeon && ri) return `${eupMyeon.replace(/[읍면]$/,'')}${ri}_`;
    if (eupMyeon) return `${eupMyeon}_`;
    if (gu && dong) return `${gu.replace(/구$/,'')}${dong}_`;
    if (gu) return `${gu.replace(/구$/,'')}_`;
    if (dong) return `${dong}_`;
    return '';
  } catch(e) { return ''; }
}

async function exportKMZ() {
  const now = new Date();
  const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const prefix = await getAddrPrefix();
  const last = ([...markers].reverse().find(m => !m.isPhoto) || markers.at(-1))?.name || '';
  const cleanLast = last.replace(/_\d{8}.*$/, '').replace(/[\\/:*?"<>|]/g, '').trim();
  const defaultName = cleanLast ? `${prefix}${dateStr}_${cleanLast}` : `${prefix}${dateStr}_`;

  const userInput = prompt('저장할 파일 이름을 입력하세요 (확장자 제외):', defaultName);
  if (userInput === null) return;
  const fileName = (userInput.trim() || defaultName) + '.kmz';

  showLoading('KMZ 저장 중...');
  try {
    const zip = new JSZip();
    const ff = zip.folder('files');
    let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(fileName)}</name>\n`;
    let pc = 0;

    for (const lyr of polylines) {
      const sn = esc(lyr._name || '선');
      const coords = getCoords(lyr).map(c => { const ll = fromMerc(c); return `${ll[0]},${ll[1]},0`; }).join(' ');
      kml += `<Placemark><name>${sn}</name><LineString><coordinates>${coords}</coordinates></LineString></Placemark>\n`;
    }
    for (const m of markers) {
      const ll = fromMerc(m.feat.getGeometry().getCoordinates());
      const sn = esc(m.name);
      if (m.isPhoto && m.imgSrc) {
        const c = await compressImage(m.imgSrc);
        const safe = (m.name||'photo').replace(/[^\w가-힣\-_.]/g,'_');
        const fn = `${++pc}_${safe}.jpg`;
        ff.file(fn, c.split(',')[1], { base64: true });
        kml += `<Placemark><name>${sn}</name><description><![CDATA[<img src="files/${fn}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${fn}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
      } else {
        kml += `<Placemark><name>${sn}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
      }
    }
    kml += '</Document></kml>';
    zip.file('doc.kml', kml);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', mimeType: 'application/vnd.google-earth.kmz' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    hideLoading();
  } catch(err) { hideLoading(); alert('KMZ 저장 중 오류: ' + err.message); }
}

/* ════════════════════════════════

  if (!confirm('모든 마커와 선을 삭제하고 화면을 초기화할까요?')) return;

/* ════════════════════════════════
   이미지 압축 / GPS 다운로드
════════════════════════════════ */
function compressImage(src) {
  return new Promise(res => {
    const TARGET = 300 * 1024;
    const img = new Image();
    img.onload = () => {
      const M = 1920; let w = img.width, h = img.height;
      if (w > M || h > M) { if (w > h) { h = Math.round(h*M/w); w = M; } else { w = Math.round(w*M/h); h = M; } }
      const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
      cv.getContext('2d').drawImage(img, 0, 0, w, h);
      let q = 0.85, r = cv.toDataURL('image/jpeg', q);
      while (r.length * 0.75 > TARGET && q > 0.1) { q = Math.round((q - 0.05)*100)/100; r = cv.toDataURL('image/jpeg', q); }
      res(r);
    };
    img.src = src;
  });
}


/* ════════════════════════════════
   GPS 추출
════════════════════════════════ */
function extractGPS(imgSrc) {
  try {
    const exif = piexif.load(imgSrc), gps = exif['GPS'];
    if (!gps?.[piexif.GPSIFD.GPSLatitude]) return null;
    const toDec = (dms, ref) => { const d=dms[0][0]/dms[0][1],m=dms[1][0]/dms[1][1],s=dms[2][0]/dms[2][1]; return (d+m/60+s/3600)*((ref==='S'||ref==='W')?-1:1); };
    const la = toDec(gps[piexif.GPSIFD.GPSLatitude], gps[piexif.GPSIFD.GPSLatitudeRef]||'N');
    const lo = toDec(gps[piexif.GPSIFD.GPSLongitude], gps[piexif.GPSIFD.GPSLongitudeRef]||'E');
    return (isNaN(la)||isNaN(lo)||(!la&&!lo)) ? null : [lo, la];
  } catch(e) { return null; }
}

/* ════════════════════════════════
   fitPts / dlBlob
════════════════════════════════ */
function fitPts(pts) {
  if (!pts || !pts.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  pts.forEach(c => { if(c[0]<minX)minX=c[0];if(c[0]>maxX)maxX=c[0];if(c[1]<minY)minY=c[1];if(c[1]>maxY)maxY=c[1]; });
  vmap.getView().setCenter([(minX+maxX)/2,(minY+maxY)/2]);
  const w=maxX-minX,h=maxY-minY;
  if (w<100&&h<100) { vmap.getView().setZoom(16); return; }
  const mapSize=vmap.getSize()||[innerWidth,innerHeight];
  const res=Math.max(w/Math.max(mapSize[0]-160,100),h/Math.max(mapSize[1]-160,100));
  vmap.getView().setZoom(Math.min(Math.max(Math.floor(Math.log2(156543.03392/res)),1),16));
}

/* ════════════════════════════════
   나침반 / 회전 잠금 (2-state)
   1번째 클릭: 북방향으로 고정
   2번째 클릭: 잠금 해제
   ※ change:rotation 리스너(initMap 내)가 rotationLocked 시 rotation을 0으로 강제
════════════════════════════════ */
let rotationLocked = false;

/* 회전 인터랙션 활성/비활성 헬퍼 */
function setRotationInteractions(enabled) {
  if (!vmap) return;
  vmap.getInteractions().forEach(i => {
    // PinchRotate, DragRotate, DragRotateAndZoom 모두 처리
    const name = i.constructor && i.constructor.name ? i.constructor.name : '';
    if (name.indexOf('Rotate') !== -1 ||
        (typeof ol.interaction.PinchRotate !== 'undefined' && i instanceof ol.interaction.PinchRotate) ||
        (typeof ol.interaction.DragRotate  !== 'undefined' && i instanceof ol.interaction.DragRotate)) {
      i.setActive(enabled);
    }
  });
}

document.getElementById('compassBtn').onclick = () => {
  if (!vmap) return;
  const view = vmap.getView();
  if (rotationLocked) {
    // ── 잠금 해제 ──
    rotationLocked = false;
    setRotationInteractions(true);  // 회전 인터랙션 복원
    document.getElementById('compassBtn').classList.remove('locked');
    document.getElementById('compassBtn').title = '북방향 고정';
  } else {
    // ── 잠금: flag 먼저 설정 → 북방향 복귀 → 인터랙션 비활성 ──
    rotationLocked = true;
    view.setRotation(0);            // 즉시 북방향 (animate 불안정)
    setRotationInteractions(false); // 핀치/드래그 회전 차단
    document.getElementById('compassBtn').classList.add('locked');
    document.getElementById('compassBtn').title = '회전 잠금 중 (한 번 더 누르면 해제)';
  }
};

/* ════════════════════════════════
   지도 종류 변경 (VWorld)
════════════════════════════════ */
function changeVWorldMapType(value) {
  if (!vmap) return;
  try { vmap.setBasemapType(vw.ol3.BasemapType[value]); } catch(e) { console.warn('지도 유형 변경 오류', e); }
}

/* ════════════════════════════════
   단축키
════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (markerPlacingMode) { document.getElementById('markerBtn').click(); return; }
  }
  if (e.altKey) { e.preventDefault(); toggleDraw(); return; }
  if (e.ctrlKey && e.key.toLowerCase()==='s') { e.preventDefault(); exportKMZ(); return; }
  if (drawing && (e.key==='Backspace'||(e.ctrlKey&&e.key==='z'))) {
    e.preventDefault();
    if (drawCoords.length > 0) { drawCoords.pop(); refreshDraw(); } // refreshDraw가 내부에서 clearAllGuide 처리
  }
});
