<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="V월드KMZ뷰어">
<meta name="theme-color" content="#1a73e8">
<title>V월드 KMZ 뷰어</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<!-- 뒤로가기로 앱이 종료되지 않도록 VWorld 로딩보다 먼저 버퍼 설치 -->
<!-- addEventListener 사용: window.onpopstate=null 로 덮어쓰는 외부 라이브러리에 영향 안 받음 -->
<script>
history.replaceState({k:0},'','');
history.pushState({k:1},'','');
history.pushState({k:2},'','');
function _earlyBackHandler(){ history.forward(); }
window.addEventListener('popstate', _earlyBackHandler);
</script>
<script src="https://map.vworld.kr/js/vworldMapInit.js.do?version=2.0&apiKey=55FD7275-A6F5-3B69-9966-CD4BFA2FD35F"></script>
<script src="https://cdn.jsdelivr.net/npm/piexifjs"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;margin:0;overflow:hidden;font-family:'맑은 고딕',sans-serif;}
#vmap{width:100%;height:100%;position:absolute;top:0;left:0;background:#222;}

/* ── 상단 주소표시 ── */
#address-display {
  position:absolute;top:10px;left:10px;z-index:2000;
  background:rgba(0,0,0,0.62);color:white;font-size:13px;
  padding:5px 10px;border-radius:6px;pointer-events:auto;cursor:pointer;
  white-space:nowrap;max-width:calc(100vw - 24px);
  overflow:hidden;text-overflow:ellipsis;
}

/* ── 플로팅 버튼 ── */
.btn{
  position:absolute;z-index:1000;
  background:white;border:none;border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;width:48px;height:48px;
  touch-action:manipulation;   /* 더블탭 확대 대기 제거 → 탭 즉시 click 발생 */
}
#saveBtn{top:16px;right:72px;}
#saveBtn:disabled{opacity:0.4;cursor:not-allowed;}
#loadBtn{top:16px;right:16px;}
#myLocationBtn{top:72px;right:16px;padding:0;transition:background 0.2s;}
/* 1단계: 내위치만 표시 (하늘색) */
#myLocationBtn.loc-show{background:#e3f2fd;box-shadow:0 2px 8px rgba(79,195,247,0.5);}
#myLocationBtn.loc-show svg path,#myLocationBtn.loc-show svg circle{stroke:#039be5;}
/* 2단계: 위치 따라가기 (파란색) */
#myLocationBtn.loc-follow{background:#1a73e8;box-shadow:0 2px 8px rgba(26,115,232,0.6);}
#myLocationBtn.loc-follow svg path,#myLocationBtn.loc-follow svg circle{stroke:white;}
#myLocationBtn svg{width:26px;height:26px;}
#drawBtn{top:128px;right:16px;padding:0;transition:background 0.2s;font-size:18px;}
#drawBtn.active{background:#e53935;box-shadow:0 2px 8px rgba(219,68,55,0.6);}
/* 선그리기 색/굵기 버튼 (그리기 중에만 표시) */
#drawStyleBtn{top:128px;right:72px;display:none;}
#drawStyleBtn.show{display:flex;}
#drawStyleBtn .dsb-line{width:26px;border-radius:3px;background:#FF0000;height:3px;}
#markerBtn{top:184px;right:16px;padding:0;transition:background 0.2s;font-size:20px;}
#markerBtn.active{background:#43a047;box-shadow:0 2px 8px rgba(67,160,71,0.6);}
#clearBtn{top:240px;right:16px;padding:0;transition:background 0.2s;}
#cadastralBtn{top:296px;right:16px;padding:0;font-size:11px;font-weight:600;color:#555;}
#cadastralBtn.active{background:#e8f5e9;box-shadow:0 2px 8px rgba(67,160,71,0.5);color:#2e7d32;}

/* ── 줌버튼 ── */
#zoomBtns{position:absolute;z-index:1000;right:16px;bottom:32px;display:flex;flex-direction:column;gap:4px;}
#zoomBtns button{width:48px;height:48px;background:white;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:26px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;touch-action:manipulation;}
#zoomBtns button:active{background:#f1f3f4;}

/* ── 나침반/회전잠금 버튼 ── */
#compassBtn{position:absolute;z-index:1000;bottom:32px;left:16px;padding:0;transition:background 0.2s;}
#compassBtn.locked{background:#fff3e0;box-shadow:0 2px 8px rgba(255,152,0,0.5);}
#compassNeedle{display:block;transition:transform 0.3s ease;}

/* ── 조준원 ── */
#crosshair{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40px;height:40px;border:3px solid #e53935;border-radius:50%;
  pointer-events:none;z-index:2000;box-shadow:0 0 0 1px rgba(0,0,0,0.15);
}
#crosshair::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:7px;height:7px;background:#e53935;border-radius:50%;}
#crosshair.show{display:block;}

/* ── 선 스타일 피커 (색상/굵기) ── */
#stylePicker{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9500;align-items:center;justify-content:center;}
#stylePicker.show{display:flex;}
#stylePickerBox{background:white;border-radius:14px;padding:18px 18px 16px;width:300px;box-shadow:0 4px 24px rgba(0,0,0,0.25);}
#stylePickerBox h3{margin:0 0 12px;font-size:15px;color:#333;}
.sp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:14px;}
.sp-swatch{width:100%;aspect-ratio:1;border-radius:50%;border:1.5px solid rgba(0,0,0,0.18);cursor:pointer;padding:0;}
.sp-swatch.sel{outline:3px solid #1a73e8;outline-offset:2px;}
.sp-widths{display:flex;gap:6px;margin-bottom:14px;}
.sp-w{flex:1;height:38px;border:1.5px solid #ddd;border-radius:8px;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.sp-w.sel{border-color:#1a73e8;background:#e8f0fe;}
.sp-w span{display:block;width:100%;border-radius:2px;background:#444;}
#spCloseBtn{width:100%;padding:11px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#f1f3f4;color:#555;}

/* ── 선 메뉴 ── */
#polyMenu{display:none;position:fixed;z-index:9999;background:white;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.25);overflow:hidden;min-width:140px;}
#polyMenu.show{display:block;}
#polyMenu button{display:block;width:100%;padding:13px 18px;border:none;background:none;text-align:left;font-size:15px;cursor:pointer;font-family:inherit;}
#polyMenu button:hover{background:#f1f3f4;}
#polyMenu .danger{color:#e53935;}

/* ── 팝업 ── */
.mpopup{background:#fff;padding:8px 10px;border-radius:7px;box-shadow:0 3px 12px rgba(0,0,0,.4);min-width:170px;font-size:13px;font-family:'맑은 고딕',sans-serif;position:relative;}
.mpopup .head{display:flex;justify-content:space-between;align-items:center;font-weight:bold;margin-bottom:5px;gap:8px;}
.mpopup .head button{border:none;background:none;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0;}
.mpopup .pimg{max-height:300px;max-width:300px;display:block;margin-top:4px;object-fit:contain;cursor:zoom-in;}
.mpopup .brow{display:flex;gap:5px;margin-top:6px;}
.mpopup .brow button{flex:1;padding:4px 0;font-size:12px;cursor:pointer;border:1px solid #ccc;border-radius:4px;background:#f5f5f5;font-family:inherit;}
.mpopup .inp{width:100%;box-sizing:border-box;padding:4px;font-size:13px;border:1px solid #ccc;border-radius:4px;font-family:inherit;margin-bottom:5px;}

/* ── 거리표시 ── */
.dist-tip{background:#fff;border:1.5px solid #db4040;border-radius:6px;padding:4px 8px;font-size:12px;font-weight:600;color:#db4040;white-space:nowrap;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.draw-mode,.draw-mode *{cursor:crosshair !important;}

/* ── 사진 정보/메타 수정 모달 ── */
#photoInfoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:7800;align-items:center;justify-content:center;padding:16px;}
#photoInfoModal.show{display:flex;}
#photoInfoBox{background:white;width:100%;max-width:420px;border-radius:14px;padding:18px 18px 16px;box-shadow:0 4px 24px rgba(0,0,0,.25);max-height:90vh;overflow-y:auto;}
#photoInfoBox h3{margin:0 0 12px;font-size:16px;color:#333;}
#photoInfoBox label{display:block;font-size:12px;color:#888;margin:8px 0 3px;}
#photoInfoBox input,#photoInfoBox textarea{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;outline:none;font-family:inherit;resize:vertical;}
#photoInfoBox input:focus,#photoInfoBox textarea:focus{border-color:#1a73e8;}
.pi-row{font-size:13px;color:#555;margin-top:8px;word-break:break-all;}
.pi-btns{display:flex;gap:8px;margin-top:14px;}
.pi-btns button{flex:1;padding:11px 4px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;}
#piSaveBtn{background:#1a73e8;color:white;}
#piDownloadBtn{background:#00897b;color:white;}
#piCloseBtn{background:#f1f3f4;color:#555;}

/* ── 마커 추가 모달 ── */
#markerModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:7000;align-items:flex-start;justify-content:center;}
#markerModal.show{display:flex;}
#markerModalBox{background:white;width:100%;max-width:480px;border-radius:0 0 16px 16px;padding:20px 20px 24px;box-shadow:0 4px 24px rgba(0,0,0,.2);animation:slideDown .22s ease;}
@keyframes slideDown{from{transform:translateY(-100%);}to{transform:translateY(0);}}
#markerModal h3{margin:0 0 14px;font-size:16px;color:#333;}
#markerNameInput{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s;}
#markerNameInput:focus{border-color:#1a73e8;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
#modalCancelBtn{background:#f1f3f4;color:#555;}
#modalConfirmBtn{background:#1a73e8;color:white;}

/* ── 마커 수정 모달 ── */
#markerEditModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:7500;align-items:flex-start;justify-content:center;}
#markerEditModal.show{display:flex;}
#markerEditModalBox{background:white;width:100%;max-width:480px;border-radius:0 0 16px 16px;padding:20px 20px 24px;box-shadow:0 4px 24px rgba(0,0,0,.2);animation:slideDown .22s ease;}
#markerEditModal h3{margin:0 0 14px;font-size:16px;color:#333;}
#markerEditNameInput{width:100%;padding:11px 14px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;outline:none;transition:border-color .15s;margin-bottom:14px;}
#markerEditNameInput:focus{border-color:#1a73e8;}
.edit-modal-btns{display:flex;gap:10px;}
.edit-modal-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
#editSaveBtn{background:#1a73e8;color:white;}
#editDeleteBtn{background:#e53935;color:white;}
#editCancelBtn{background:#f1f3f4;color:#555;}
#editMoveBtn{background:#00897b;color:white;}
#markerEditModalBox .edit-modal-btns button{font-size:13px;padding:10px 4px;}

/* ── 이동 힌트 ── */
#moveHint{display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.84);color:white;font-size:13px;padding:10px 18px;border-radius:12px;z-index:5100;pointer-events:auto;text-align:center;white-space:nowrap;}
#moveHint.show{display:block;}
#moveHint .mh-row{margin-top:8px;display:flex;gap:8px;justify-content:center;}
#moveHint .mh-row button{padding:6px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;}
#moveHint .mh-ok{background:#1a73e8;color:white;}
#moveHint .mh-cancel{background:#555;color:white;}

/* ── 지도종류 선택 ── */
#mapTypeBox{position:absolute;z-index:1000;top:352px;right:16px;}
#mapTypeBox select{width:48px;padding:5px 1px;border:none;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:11px;background:white;cursor:pointer;text-align:center;}

/* ── 전체화면 사진뷰어 ── */
#photoViewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:8000;align-items:center;justify-content:center;flex-direction:column;padding:16px;}
#photoViewer.show{display:flex;}
#photoViewer img{max-width:100%;max-height:85vh;border-radius:8px;object-fit:contain;}
#photoViewer .pv-name{color:rgba(255,255,255,.8);font-size:13px;margin-top:10px;}

/* ── 로딩 ── */
#loading{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;flex-direction:column;gap:12px;align-items:center;justify-content:center;color:white;font-size:15px;}
#loading.show{display:flex;}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── 삭제 힌트 토스트 ── */
#deleteHint{display:none;position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:white;font-size:13px;padding:8px 16px;border-radius:20px;z-index:5000;pointer-events:none;white-space:nowrap;}
#deleteHint.show{display:block;}

/* ── iOS 설치 배너 ── */
#installBanner{display:none;position:fixed;bottom:0;left:0;right:0;background:white;padding:14px 16px;box-shadow:0 -2px 12px rgba(0,0,0,.15);z-index:6000;flex-direction:column;gap:8px;}
#installBanner.show{display:flex;}
#installBanner .banner-row{display:flex;align-items:center;justify-content:space-between;}
#installBanner .banner-text{font-size:14px;color:#333;line-height:1.5;}
#installBanner .banner-close{background:none;border:none;font-size:20px;color:#999;cursor:pointer;padding:4px;}
#installBanner .banner-step{font-size:12px;color:#666;}

#fileInput{display:none;}
</style>
</head>
<body>


<!-- 지도 -->
<div id="vmap"></div>

<!-- 주소 표시 -->
<div id="address-display" onclick="copyAndMark()" title="탭하면 주소 복사">위치 확인 중...</div>

<!-- 플로팅 버튼 -->
<button class="btn" id="saveBtn" title="KMZ로 저장" disabled>💾</button>
<button class="btn" id="loadBtn" title="KMZ / 사진 불러오기">📂</button>
<button class="btn" id="myLocationBtn" title="현재 위치">
  <svg viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="4" stroke="#1a73e8" stroke-width="2"/>
    <circle cx="12" cy="12" r="8" stroke="#1a73e8" stroke-width="1.5" stroke-dasharray="2 2"/>
    <line x1="12" y1="2" x2="12" y2="6" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="12" y2="22" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="2" y1="12" x2="6" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="18" y1="12" x2="22" y2="12" stroke="#1a73e8" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<button class="btn" id="drawBtn" title="선 그리기">✏️</button>
<button class="btn" id="drawStyleBtn" title="선 색상/굵기"><span class="dsb-line"></span></button>
<button class="btn" id="markerBtn" title="마커 추가">📍</button>
<button class="btn" id="clearBtn" title="화면 초기화">
  <svg viewBox="0 0 24 24" fill="none" width="26" height="26">
    <path d="M20 20H7L3 16L13 6L21 14L20 20Z" fill="#ffcdd2" stroke="#e53935" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M13 6L21 14L17 18L9 10L13 6Z" fill="#ef9a9a" stroke="#e53935" stroke-width="1.8" stroke-linejoin="round"/>
    <line x1="4" y1="20" x2="20" y2="20" stroke="#e53935" stroke-width="2" stroke-linecap="round"/>
  </svg>
</button>
<button class="btn" id="cadastralBtn" onclick="toggleCadastral()" title="지적도">지적도</button>
<!-- 지도종류 선택 -->
<div id="mapTypeBox">
  <select id="mapTypeSelect" onchange="changeVWorldMapType(this.value)" title="지도 종류">
    <option value="PHOTO" selected>항공사진</option>
    <option value="PHOTO_HYBRID">항공+지도</option>
    <option value="GRAPHIC">일반지도</option>
    <option value="GRAY">회색지도</option>
  </select>
</div>
<input type="file" id="fileInput" accept=".kmz,.zip,.kml,image/jpeg,image/png,.jpg,.jpeg,.png" multiple>

<!-- 조준원 -->
<div id="crosshair"></div>

<!-- 줌 버튼 -->
<div id="zoomBtns">
  <button id="zoomInBtn">+</button>
  <button id="zoomOutBtn">−</button>
</div>

<!-- 나침반 / 회전 잠금 버튼 -->
<button class="btn" id="compassBtn" title="북방향으로 맞추기 / 길게 누르면 회전 잠금">
  <svg id="compassNeedle" viewBox="0 0 24 24" width="26" height="26" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 3 L10 12 L12 10.5 L14 12 Z" fill="#e53935"/>
    <path d="M12 21 L10 12 L12 13.5 L14 12 Z" fill="#aaa"/>
    <circle cx="12" cy="12" r="2" fill="#555"/>
    <text x="12" y="6.2" text-anchor="middle" dominant-baseline="middle" font-size="4.5" font-weight="bold" fill="#e53935" font-family="sans-serif">N</text>
  </svg>
</button>

<!-- 선 메뉴 -->
<div id="polyMenu">
  <button id="polyEditBtn">✏️ 수정</button>
  <button id="polyStyleBtn">🎨 색상/굵기</button>
  <button id="polyDeleteBtn" class="danger">🗑️ 삭제</button>
  <button id="polyMenuCancelBtn">✕ 취소</button>
</div>

<!-- 사진 정보/메타 수정 모달 -->
<div id="photoInfoModal">
  <div id="photoInfoBox">
    <h3>📷 사진 정보 <span style="font-size:11px;color:#bbb;font-weight:400">v3</span></h3>
    <label>제목</label>
    <input type="text" id="piTitle" maxlength="80">
    <label>설명</label>
    <textarea id="piDesc" rows="3"></textarea>
    <div class="pi-row" id="piTaken"></div>
    <div class="pi-row" id="piCoord"></div>
    <div class="pi-row" id="piAddr"></div>
    <div class="pi-btns">
      <button id="piSaveBtn">저장</button>
      <button id="piDownloadBtn">📥 사진저장</button>
      <button id="piCloseBtn">닫기</button>
    </div>
  </div>
</div>

<!-- 선 스타일 피커 (색상/굵기) -->
<div id="stylePicker">
  <div id="stylePickerBox">
    <h3>🎨 선 색상 / 굵기</h3>
    <div class="sp-grid" id="spGrid"></div>
    <div class="sp-widths" id="spWidths"></div>
    <button id="spCloseBtn">닫기</button>
  </div>
</div>

<!-- 마커 추가 모달 -->
<div id="markerModal">
  <div id="markerModalBox">
    <h3>📍 마커 추가</h3>
    <input type="text" id="markerNameInput" placeholder="마커 이름을 입력하세요" maxlength="50">
    <div class="modal-btns">
      <button id="modalCancelBtn">취소</button>
      <button id="modalConfirmBtn">추가</button>
    </div>
  </div>
</div>

<!-- 마커 수정/삭제 모달 -->
<div id="markerEditModal">
  <div id="markerEditModalBox">
    <h3>📍 마커 수정</h3>
    <input type="text" id="markerEditNameInput" placeholder="마커 이름" maxlength="50">
    <div class="edit-modal-btns">
      <button id="editSaveBtn">수정</button>
      <button id="editMoveBtn">이동</button>
      <button id="editDeleteBtn">삭제</button>
      <button id="editCancelBtn">취소</button>
    </div>
  </div>
</div>

<!-- 전체화면 사진뷰어 -->
<div id="photoViewer">

<script>
'use strict';

/* ════════════════════════════════
   전역 상태
════════════════════════════════ */
let vmap = null;
let markers   = [];  // {feat, lyr, ov, name, isPhoto, imgSrc}
let polylines = [];  // ol.layer.Vector[]
let drawing   = false, drawCoords = [], drawLayer = null;
let guideLine = null, distOv = null, distEl = null;
let suppressNextClick = false;
let polyTarget = null;
let lastCX = 0, lastCY = 0;
let lastAddr = '주소 없음', lastLL = null;
let locCount  = 0;
let locationMode = 0, watchId = null, locationFeat = null, locationLyr = null; // 0=끄기 1=내위치표시 2=따라가기
let markerPlacingMode = false;
let hintShown = false;
let deviceHeading = null;   // 기기 나침반 방향 (정지 중 방향 표시용)
let headingInterval = null; // 정지 중 방향 갱신 타이머
let cssScale = 1;           // 최대 줌 이후 CSS scale 확대 (+,- 버튼 전용)

const MAX_CSS_SCALE = 8;
function applyScale(s) {
  cssScale = Math.max(1, Math.min(MAX_CSS_SCALE, s));
  const el = document.getElementById('vmap');
  el.style.transformOrigin = '50% 50%';
  el.style.transform = cssScale === 1 ? '' : `scale(${cssScale})`;
}

const VWORLD_KEY = '55FD7275-A6F5-3B69-9966-CD4BFA2FD35F';

/* ════════════════════════════════
   유틸
════════════════════════════════ */
function toMerc(lng, lat) { return ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857'); }
function fromMerc(c)      { return ol.proj.transform(c, 'EPSG:3857', 'EPSG:4326'); }
function pad(n)           { return String(n).padStart(2, '0'); }
function randColor()      { return '#' + Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,'0'); }
function esc(s)           { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showLoading(msg) { document.getElementById('loadingMsg').textContent = msg||'불러오는 중...'; document.getElementById('loading').classList.add('show'); }
function hideLoading()    { document.getElementById('loading').classList.remove('show'); }

function showDeleteHint() {
  if (hintShown) return; hintShown = true;
  const el = document.getElementById('deleteHint');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

function openViewer(src, name) {
  document.getElementById('viewerImg').src = src;
  document.getElementById('viewerName').textContent = name;
  document.getElementById('photoViewer').classList.add('show');
}
document.getElementById('photoViewer').addEventListener('click', e => {
  if (e.target === document.getElementById('photoViewer') || e.target === document.getElementById('viewerName'))
    document.getElementById('photoViewer').classList.remove('show');
});

/* ════════════════════════════════
   IndexedDB 자동저장
════════════════════════════════ */
// 'orig' 스토어: 사진 원본(dataURL, 전체 EXIF)을 보관 — 메타 수정·사진저장은 원본 기준 (압축본 EXIF 유실 방지)
const DB_NAME = 'kmz-viewer-vw', DB_VER = 2, STORE = 'kmz', ORIG_STORE = 'orig';
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE);
      if (!db.objectStoreNames.contains(ORIG_STORE)) db.createObjectStore(ORIG_STORE);
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = () => reject(req.error);
  });
}
async function saveOrig(key, dataUrl) {
  try { const db = await openDB(); db.transaction(ORIG_STORE, 'readwrite').objectStore(ORIG_STORE).put(dataUrl, key); } catch(e) {}
}
async function getOrig(key) {
  if (!key) return null;
  try {
    const db = await openDB();
    return await new Promise(res => {
      const r = db.transaction(ORIG_STORE).objectStore(ORIG_STORE).get(key);
      r.onsuccess = () => res(r.result || null);
      r.onerror = () => res(null);
    });
  } catch(e) { return null; }
}
async function delOrig(key) {
  if (!key) return;
  try { const db = await openDB(); db.transaction(ORIG_STORE, 'readwrite').objectStore(ORIG_STORE).delete(key); } catch(e) {}
}
async function clearOrigs() {
  try { const db = await openDB(); db.transaction(ORIG_STORE, 'readwrite').objectStore(ORIG_STORE).clear(); } catch(e) {}
}
async function saveKMZtoDB(blob) {
  try {
    const db = await openDB();
    const buf = await blob.arrayBuffer();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({ buf, name: 'last_state.kmz' }, 'last');
  } catch(e) { console.warn('DB 저장 실패', e); }
}
async function loadKMZfromDB() {
  try {
    const db = await openDB();
    return new Promise(resolve => {
      const req = db.transaction(STORE).objectStore(STORE).get('last');
      req.onsuccess = () => {
        if (req.result) resolve(new File([req.result.buf], req.result.name, { type: 'application/vnd.google-earth.kmz' }));
        else resolve(null);
      };
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}
async function clearDB() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).delete('last');
  } catch(e) { console.warn('DB 초기화 오류', e); }
}

// 사진 재압축+ZIP 생성이 무거워 UI를 막으므로, 호출을 모아서(debounce) 화면이
// 먼저 그려진 뒤 백그라운드로 실행한다.
let _autoSaveTimer = null;
function autoSaveToDB() {
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(_autoSaveNow, 400);
}

async function _autoSaveNow() {
  try {
    // 모두 삭제된 경우 DB 항목 자체를 지워 재실행 시 복원되지 않도록 함
    if (markers.length === 0 && polylines.length === 0 && textLabelsV.length === 0) {
      await clearDB();
      return;
    }
    const zip = new JSZip();
    const ff = zip.folder('files');
    let xml = '';
    let pi = 0;
    for (const m of markers) {
      const ll = fromMerc(m.feat.getGeometry().getCoordinates());
      const sn = esc(m.name || '');
      if (m.isPhoto && m.imgSrc) {
        const c = await compressImage(m.imgSrc);
        const fn = `photo_${String(pi++).padStart(4,'0')}.jpg`;
        ff.file(fn, c.split(',')[1], { base64: true });
        xml += `\n<Placemark><name>${sn}</name><ExtendedData><Data name="photoFile"><value>${fn}</value></Data>${_photoMetaXmlV(m)}</ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>`;
      } else {
        xml += `\n<Placemark><name>${sn}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>`;
      }
    }
    const styles = new Map();
    for (const lyr of polylines) xml += _lineKmlPlacemarkV(lyr, styles);
    for (const t of textLabelsV) xml += _textKmlPlacemarkV(t);
    zip.file('doc.kml', `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document>${_lineKmlStyleDefsV(styles)}${xml}\n</Document></kml>`);
    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    await saveKMZtoDB(blob);
  } catch(e) { console.error('자동저장 오류', e); }
}

/* ════════════════════════════════
   위치 마커 스타일 (빨강 + 방향)
════════════════════════════════ */
function makeLocationStyle(heading) {
  const hasHeading = heading !== null && !isNaN(heading) && heading >= 0;
  if (!hasHeading) {
    return new ol.style.Style({
      image: new ol.style.Circle({
        radius: 9, fill: new ol.style.Fill({ color: '#e53935' }),
        stroke: new ol.style.Stroke({ color: 'white', width: 2.5 })
      })
    });
  }
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="50">' +
    '<polygon points="15,2 6,20 24,20" fill="rgba(229,57,53,0.82)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>' +
    '<circle cx="15" cy="25" r="9" fill="#e53935" stroke="white" stroke-width="2.5"/>' +
    '</svg>';
  return new ol.style.Style({
    image: new ol.style.Icon({
      src: 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg),
      anchor: [0.5, 0.5], anchorXUnits: 'fraction', anchorYUnits: 'fraction',
      rotation: heading * Math.PI / 180
    })
  });
}

/* ════════════════════════════════
   역지오코딩 / 주소 표시
════════════════════════════════ */
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    s.onerror = reject;
    document.head.appendChild(s);
    setTimeout(() => { delete window[cb]; try { s.remove(); } catch(_) {} reject(new Error('timeout')); }, 10000);
  });
}

function parseShortAddr(addr) {
  if (!addr) return '';
  const skipRe = /(도|시|군|구)$/;
  const parts = addr.trim().split(/\s+/);
  const idx = parts.findIndex(p => !skipRe.test(p));
  return idx === -1 ? addr : parts.slice(idx).join(' ');
}

let addrTimer = null;
function scheduleAddrUpdate(overrideLng, overrideLat) {
  clearTimeout(addrTimer);
  addrTimer = setTimeout(async () => {
    if (!vmap) return;
    const [lng, lat] = (overrideLng != null && overrideLat != null)
      ? [overrideLng, overrideLat]
      : fromMerc(vmap.getView().getCenter());
    const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0` +
      `&crs=epsg:4326&point=${lng},${lat}&type=parcel&format=json&key=${VWORLD_KEY}`;
    try {
      const d = await jsonp(url);
      const text = (d?.response?.status === 'OK') ? (d.response.result?.[0]?.text || '') : '';
      document.getElementById('address-display').textContent = parseShortAddr(text) || '주소 없음';
    } catch(e) { document.getElementById('address-display').textContent = ''; }
  }, 600);
}

/* ════════════════════════════════
   지도 초기화
════════════════════════════════ */
function initMap(lat, lng, zoom) {
  vw.ol3.CameraPosition.center = ol.proj.transform([lng, lat], 'EPSG:4326', 'EPSG:3857');
  vw.ol3.CameraPosition.zoom   = zoom || 14;
  vw.ol3.MapOptions = {
    basemapType        : vw.ol3.BasemapType.PHOTO,
    controlDensity     : vw.ol3.DensityType.EMPTY,
    interactionDensity : vw.ol3.DensityType.FULL,
    controlsAutoArrange: true,
    homePosition       : vw.ol3.CameraPosition,
    initPosition       : vw.ol3.CameraPosition,
    pixelRatio         : 1   // 고DPI 기기에서 2~3x 타일 요청 방지 → 로딩 속도 개선
  };
  vmap = new vw.ol3.Map('vmap', vw.ol3.MapOptions);

  // 더블클릭 확대 비활성화
  vmap.getInteractions().forEach(i => {
    if (i instanceof ol.interaction.DoubleClickZoom) i.setActive(false);
  });

  // VWorld가 베이스 레이어를 비동기로 추가하므로 여러 번 정리 시도
  [200, 800, 2000].forEach(t => setTimeout(prunePhotoBaseLayers, t));

  vmap.on('click', mapClick);
  vmap.on('pointermove', mapMove);
  vmap.getViewport().addEventListener('contextmenu', mapRightClick);
  vmap.getView().on('change:rotation', () => {
    const rot = vmap.getView().getRotation();
    // 회전 잠금 중이면 즉시 북방향으로 강제
    if (rotationLocked && Math.abs(rot) > 0.001) {
      vmap.getView().setRotation(0);
      return;
    }
    const deg = -(rot * 180 / Math.PI);
    document.getElementById('compassNeedle').style.transform = `rotate(${deg}deg)`;
  });
  scheduleAddrUpdate(); // 초기 로드 시 중심 주소 표시

  const vp = vmap.getViewport();

  let touchDrawStartX = 0, touchDrawStartY = 0;
  vp.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') {
      touchDrawStartX = e.clientX;
      touchDrawStartY = e.clientY;
    }
  }, { passive: true });

  vp.addEventListener('pointerup', e => {
    if (e.pointerType === 'touch') {
      const dx = e.clientX - touchDrawStartX;
      const dy = e.clientY - touchDrawStartY;
      if (Math.hypot(dx, dy) > 10) return; // 드래그(지도 이동)는 무시
      const rect = vp.getBoundingClientRect();
      const pixel = [
        (e.clientX - rect.left) * (vp.offsetWidth / rect.width),
        (e.clientY - rect.top)  * (vp.offsetHeight / rect.height)
      ];
      const coord = vmap.getCoordinateFromPixel(pixel);
      if (drawing) {
        if (coord) {
          drawCoords.push(coord);
          refreshDraw();
          if (drawCoords.length >= 1) updateDistDisplay();
        }
        suppressNextClick = true;
      } else {
        // 마커 조준원 모드
        if (markerPlacingMode) {
          markerPlacingMode = false;
          document.getElementById('markerBtn').classList.remove('active');
          document.getElementById('crosshair').classList.remove('show');
          if (coord) { pendingMarkerCoord = coord; openMarkerModal(); }
          suppressNextClick = true;
          return;
        }
        // 마커 탭 감지
        let hit = false;
        vmap.forEachFeatureAtPixel(pixel, feat => {
          if (hit) return;
          const m = markers.find(mk => mk.feat === feat);
          if (m) { hit = true; openPopup(m); }
        }, { hitTolerance: 20 });
        if (!hit) closeAllPopups();
        // 탭 지점 주소 업데이트
        if (coord) {
          const [lo, la] = fromMerc(coord);
          scheduleAddrUpdate(lo, la);
        }
        suppressNextClick = true;
      }
    }
  });

  // 줌 버튼 (최대 줌 이후에는 CSS scale로 화면 확대 — +,- 버튼 전용)
  document.getElementById('zoomInBtn').onclick = () => {
    if (cssScale > 1) { applyScale(cssScale * 2); return; }
    const v = vmap.getView();
    const z = v.getZoom() || 14;
    v.setZoom(z + 1);
    // 줌이 더 안 올라가면(최대 줌 도달) CSS scale로 추가 확대
    if (Math.abs((v.getZoom() || z) - z) < 0.01) applyScale(cssScale * 2);
  };
  document.getElementById('zoomOutBtn').onclick = () => {
    if (cssScale > 1) { applyScale(cssScale / 2); return; }
    vmap.getView().setZoom((vmap.getView().getZoom() || 14) - 1);
  };

  // 핀치 등으로 실제 줌이 바뀌면 CSS scale 리셋 (좌표 어긋남 방지)
  vmap.getView().on('change:resolution', () => { if (cssScale > 1) applyScale(1); });

  // 지도 이동/줌 변경 시 마지막 위치 저장
  let _savePosTimer = null;
  vmap.getView().on('change', () => {
    clearTimeout(_savePosTimer);
    _savePosTimer = setTimeout(() => {
      const c = fromMerc(vmap.getView().getCenter());
      const z = vmap.getView().getZoom();
      if (c && z) localStorage.setItem('lastPos', JSON.stringify({ lng: c[0], lat: c[1], z }));
    }, 500);
  });

  // DB 복원
  loadKMZfromDB().then(file => { if (file) loadKMZ(file, true); });
}


// 뒤로가기 = 절대 앱 종료 안 함. 항상 forward()로 복귀.
// 선그리기 중: 점 삭제 또는 모드 종료
// addEventListener 사용: window.onpopstate 방식은 외부 라이브러리가 덮어쓸 수 있어서 불안정함
let _ignoreNextPop = false;

window.removeEventListener('popstate', _earlyBackHandler); // 초기 임시 핸들러 제거
window.addEventListener('popstate', function() {
  if (_ignoreNextPop) { _ignoreNextPop = false; return; }
  if (drawing) {
    if (drawCoords.length > 0) { drawCoords.pop(); refreshDraw(); }
    else { endDraw(); }
  }
  _ignoreNextPop = true;
  window.history.forward();
});

window.onload = () => {
  // iOS 배너
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !localStorage.getItem('installBannerDismissed')) {
    setTimeout(() => document.getElementById('installBanner').classList.add('show'), 2000);
  }

  // 마지막으로 보던 위치 복원, 없으면 기본 좌표
  const _lp = (() => { try { return JSON.parse(localStorage.getItem('lastPos')); } catch(_) { return null; } })();
  initMap(_lp ? _lp.lat : 35.6472, _lp ? _lp.lng : 127.5219, _lp ? _lp.z : 14);
};

document.getElementById('bannerClose').onclick = () => {
  document.getElementById('installBanner').classList.remove('show');
  localStorage.setItem('installBannerDismissed', '1');
};

// Android 설치 프롬프트
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e;
  const btn = document.createElement('button');
  btn.className = 'btn';
  btn.style.cssText = 'top:16px;right:128px;font-size:18px;';
  btn.title = '앱 설치'; btn.textContent = '📥';
  btn.onclick = () => { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; btn.remove(); }); };
  document.body.appendChild(btn);
});

/* ════════════════════════════════
   지도 이벤트
════════════════════════════════ */
function mapClick(evt) {
  if (evt.originalEvent?.pointerType === 'touch') return; // 터치는 pointerup에서 처리
  if (suppressNextClick) { suppressNextClick = false; return; }
  if (drawing) {
    drawCoords.push(evt.coordinate);
    refreshDraw();
    if (drawCoords.length >= 1) updateDistDisplay();
    return;
  }

  // 마커 조준원 모드: 클릭 시 해당 위치에 마커 추가 모달
  if (markerPlacingMode) {
    markerPlacingMode = false;
    document.getElementById('markerBtn').classList.remove('active');
    document.getElementById('crosshair').classList.remove('show');
    pendingMarkerCoord = evt.coordinate;
    openMarkerModal();
    return;
  }

  // 클릭 지점 주소 업데이트
  const [lo, la] = fromMerc(evt.coordinate);
  scheduleAddrUpdate(lo, la);

  let hit = false;
  vmap.forEachFeatureAtPixel(evt.pixel, feat => {
    if (hit) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) { hit = true; openPopup(m); }
  }, { hitTolerance: 16 });
  if (hit) return;
  closeAllPopups();

}

function mapMove(evt) {
  // 미리보기 점선 없이 확정된 거리만 표시 (가이드 정리만)
  clearGuide();
}
document.addEventListener('mousemove', e => { lastCX = e.clientX; lastCY = e.clientY; }, { passive: true });

function mapRightClick(e) {
  e.preventDefault(); if (!vmap) return;
  if (drawing) return; // 선그리기 중 우클릭 무시 (원본과 동일)
  const px = vmap.getEventPixel(e);

  // 마커 우클릭 → 수정/삭제 모달
  let hitMk = false;
  vmap.forEachFeatureAtPixel(px, feat => {
    if (hitMk) return;
    const m = markers.find(mk => mk.feat === feat);
    if (m) { hitMk = true; openMarkerEditModalObj(m); }
  }, { hitTolerance: 16 });
  if (hitMk) return;

  // 선 우클릭 → 수정/삭제 메뉴
  const nearPoly = findNearPoly(px, 10);
  if (nearPoly) { showPolyMenu(lastCX || e.clientX, lastCY || e.clientY, nearPoly); return; }
  // 빈 공간 우클릭 → 아무것도 안 함 (원본과 동일)
}

/* ════════════════════════════════
   마커 추가 모달
════════════════════════════════ */
let pendingMarkerCoord = null;

function openMarkerModal() {

let moveViewHandler = null;

document.getElementById('editMoveBtn').onclick = () => {

  moveTargetObj = editTargetObj;

/* ════════════════════════════════
   선 색상/굵기 선택 (map.html 팔레트 이식)
════════════════════════════════ */
const PALETTE_COLORS = [
  '#000000','#404040','#808080','#BFBFBF','#FFFFFF','#C00000','#FF0000','#FFC000','#FFFF00','#92D050',
  '#00B050','#00B0F0','#0070C0','#002060','#7030A0','#FF6600','#00B0A0','#E91E63','#795548','#2E86C1'
];
const LINE_WIDTHS = [2, 3, 4, 6, 8, 10];
let currentDrawColor = '#FF0000', currentDrawWidth = 3;
let _styleTarget = null;   // null=그리기 기본값(그리는 중이면 현재 선), 아니면 polylines 레이어

function _updateDrawStyleBtn() {
  const el = document.querySelector('#drawStyleBtn .dsb-line');
  if (el) { el.style.background = currentDrawColor; el.style.height = Math.min(10, Math.max(3, currentDrawWidth)) + 'px'; }
}

(function buildStylePicker(){
  const grid = document.getElementById('spGrid');
  PALETTE_COLORS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'sp-swatch'; b.style.background = c; b.dataset.color = c;
    b.onclick = () => applyPickedStyle(c, null);
    grid.appendChild(b);
  });
  const ws = document.getElementById('spWidths');
  LINE_WIDTHS.forEach(w => {
    const b = document.createElement('button');
    b.className = 'sp-w'; b.dataset.width = w; b.title = w + 'px';
    b.innerHTML = `<span style="height:${Math.min(w, 12)}px"></span>`;
    b.onclick = () => applyPickedStyle(null, w);
    ws.appendChild(b);
  });
  document.getElementById('spCloseBtn').onclick = closeStylePicker;
  document.getElementById('stylePicker').addEventListener('click', e => {
    if (e.target === document.getElementById('stylePicker')) closeStylePicker();
  });
})();

function _spMarkSelected(color, width) {
  document.querySelectorAll('#spGrid .sp-swatch').forEach(b =>
    b.classList.toggle('sel', b.dataset.color.toUpperCase() === String(color || '').toUpperCase()));
  document.querySelectorAll('#spWidths .sp-w').forEach(b =>
    b.classList.toggle('sel', +b.dataset.width === +width));
}
function openStylePicker(target) {
  _styleTarget = target || null;
  const c = _styleTarget ? (_styleTarget._color || '#FF0000') : currentDrawColor;
  const w = _styleTarget ? (_styleTarget._width || 3) : currentDrawWidth;
  _spMarkSelected(c, w);
  document.getElementById('stylePicker').classList.add('show');
}
function closeStylePicker() {
  document.getElementById('stylePicker').classList.remove('show');
  _styleTarget = null;
}
// 색 또는 굵기 하나를 고르면 즉시 반영 (모달은 닫기 전까지 유지 — 색·굵기 연속 선택 가능)
function applyPickedStyle(color, width) {
  if (_styleTarget) {
    const lyr = _styleTarget;
    restyleLyrV(lyr, color || lyr._color || '#FF0000', width || lyr._width || 3);
    _spMarkSelected(lyr._color, lyr._width);
    autoSaveToDB();
  } else {
    if (color) currentDrawColor = color;
    if (width) currentDrawWidth = width;
    _updateDrawStyleBtn();
    _spMarkSelected(currentDrawColor, currentDrawWidth);
    // 그리는 중이면 현재 그리는 선에도 즉시 반영
    if (drawing && drawLayer) refreshDraw();
  }
}
// OL 은 피처 setStyle 로 즉시 반영 (Vmap.html recolorTrackV 방식 — 묶음선은 모든 피처)
function restyleLyrV(lyr, color, width) {
  lyr._color = color; lyr._width = width;
  lyr.getSource().getFeatures().forEach(f => {
    if (f.getGeometry() instanceof ol.geom.LineString) f.setStyle(lineSt(color, width));
  });
}
document.getElementById('drawStyleBtn').onclick = () => openStylePicker(null);

/* ════════════════════════════════
   선 그리기
════════════════════════════════ */
function toggleDraw() { drawing ? endDraw() : startDraw(); }

function startDraw() {
  if (drawing) return;
  drawing = true; drawCoords = [];
  drawLayer = mkLineLyr([], currentDrawColor, currentDrawWidth);
  addLyr(drawLayer);
  document.getElementById('vmap').classList.add('draw-mode');
  document.getElementById('drawBtn').classList.add('active');
  document.getElementById('drawBtn').title = '선 그리기 종료';
  document.getElementById('drawStyleBtn').classList.add('show');
  _updateDrawStyleBtn();
  // 거리표시는 첫 클릭 후 시작 (startDraw에서 표시 안 함)
}

function endDraw() {
  if (!drawing) return;
  drawing = false; clearAllGuide();
  document.getElementById('vmap').classList.remove('draw-mode');
  document.getElementById('drawBtn').classList.remove('active');
  document.getElementById('drawBtn').title = '선 그리기';
  document.getElementById('drawStyleBtn').classList.remove('show');
  if (drawCoords.length >= 2 && drawLayer) {
    polylines.push(drawLayer);
    document.getElementById('saveBtn').disabled = false;
    autoSaveToDB();
  } else if (drawLayer) removeLyr(drawLayer);
  drawLayer = null; drawCoords = [];
}

function refreshDraw() {
  if (!drawLayer) return;
  const src = drawLayer.getSource();
  src.clear(); // 점이 없어도 항상 먼저 지움
  drawLayer._color = currentDrawColor; drawLayer._width = currentDrawWidth;
  if (drawCoords.length >= 2) {
    const f = new ol.Feature(new ol.geom.LineString(drawCoords));
    f.setStyle(lineSt(currentDrawColor, currentDrawWidth));
    src.addFeature(f);
  } else if (drawCoords.length === 1) {
    const f = new ol.Feature(new ol.geom.Point(drawCoords[0]));
    f.setStyle(new ol.style.Style({
      image: new ol.style.Circle({
        radius: 5,
        fill: new ol.style.Fill({ color: currentDrawColor }),
        stroke: new ol.style.Stroke({ color: 'white', width: 1.5 })
      })
    }));
    src.addFeature(f);
  }
  drawLayer._coords = drawCoords.slice();
  if (drawCoords.length > 0) updateDistDisplay();
  else clearAllGuide(); // 점이 0개면 거리 표시도 제거
}

// 점 확정 후 거리 표시 (📍 총 거리)
function updateDistDisplay() {
  if (!drawCoords.length) return;
  const fmt = d => d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(2) + 'km';
  let dist = 0;
  for (let i = 1; i < drawCoords.length; i++) dist += haversine(drawCoords[i-1], drawCoords[i]);
  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = '📍 총 ' + fmt(dist);
  if (!distOv) {
    distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' });
    vmap.addOverlay(distOv);
  }
  distOv.setPosition(drawCoords[drawCoords.length - 1]);
}

// 마우스 이동 중 미리보기 거리 표시 (✏️ 총 거리)
function updateGuideDistDisplay(previewCoord) {
  if (!drawCoords.length) return;
  const fmt = d => d < 1000 ? Math.round(d) + 'm' : (d/1000).toFixed(2) + 'km';
  let dist = 0;
  for (let i = 1; i < drawCoords.length; i++) dist += haversine(drawCoords[i-1], drawCoords[i]);
  dist += haversine(drawCoords[drawCoords.length - 1], previewCoord);
  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = '✏️ 총 ' + fmt(dist);
  if (!distOv) {
    distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' });
    vmap.addOverlay(distOv);
  }
  distOv.setPosition(previewCoord);
}

document.getElementById('drawBtn').onclick = toggleDraw;

/* ════════════════════════════════
   레이어/스타일 헬퍼
════════════════════════════════ */
function lineSt(color, width) { return new ol.style.Style({ stroke: new ol.style.Stroke({ color, width }) }); }
function mkLineLyr(coords, color, width) {
  const src = new ol.source.Vector();
  if (coords.length >= 2) {
    const f = new ol.Feature(new ol.geom.LineString(coords));
    f.setStyle(lineSt(color, width)); src.addFeature(f);
  }
  const lyr = new ol.layer.Vector({ source: src, zIndex: 100 });
  lyr._color = color; lyr._width = width; lyr._coords = coords.slice(); lyr._name = '선';
  return lyr;
}
// 한 Placemark의 여러 도형(MultiGeometry/폴리곤 링)을 한 레이어에 전부 담기 (Vmap.html 이식)
// 선별 개별 레이어는 수천 개 KMZ 에서 무거움 → 색상/Placemark당 레이어 1개로 경량화.
function mkMultiLineLyr(coordsArrays, color, width) {
  const src = new ol.source.Vector();
  for (const cs of coordsArrays) {
    if (cs && cs.length >= 2) { const f = new ol.Feature(new ol.geom.LineString(cs)); f.setStyle(lineSt(color, width)); src.addFeature(f); }
  }
  const lyr = new ol.layer.Vector({ source: src, zIndex: 100 });
  lyr._color = color; lyr._width = width; lyr._coords = (coordsArrays[0] || []); lyr._name = '선';
  return lyr;
}
function getCoords(lyr) {
  const fs = lyr.getSource().getFeatures();
  return fs.length ? fs[0].getGeometry().getCoordinates() : (lyr._coords || []);
}
// 레이어의 '모든' LineString 피처 좌표 (Vmap.html coordParts 이식 — 첫 피처만 보면 묶음선 유실)
function coordParts(lyr) {
  const fs = lyr.getSource().getFeatures().filter(f => f.getGeometry() instanceof ol.geom.LineString);
  return fs.length ? fs.map(f => f.getGeometry().getCoordinates()) : ((lyr._coords && lyr._coords.length) ? [lyr._coords] : []);
}
function addLyr(lyr) { vmap.addLayer(lyr); }
function removeLyr(lyr) { try { vmap.removeLayer(lyr); } catch(e) {} }

/* ════════════════════════════════
   CAD 문자(kind=text) 텍스트 라벨 — 마커 없이 글자만(회전 포함, Vmap.html 이식)
   자동저장/내보내기 복원을 위해 좌표·회전·색을 textLabelsV 에 함께 보관.
════════════════════════════════ */
let textLabelLyr = null, textLabelsV = [];
function _ensureTextLabelLyr() {
  if (!textLabelLyr) { textLabelLyr = new ol.layer.Vector({ source: new ol.source.Vector(), zIndex: 120 }); addLyr(textLabelLyr); }
  return textLabelLyr;
}
function addTextLabelV(coord, text, rot, color) {
  const col = /^#[0-9a-fA-F]{6}$/.test(color || '') ? color : '#FFEB00';
  const f = new ol.Feature(new ol.geom.Point(coord));
  f.setStyle(new ol.style.Style({ text: new ol.style.Text({
    text: String(text == null ? '' : text),
    font: 'bold 13px sans-serif',
    fill: new ol.style.Fill({ color: col }),
    stroke: new ol.style.Stroke({ color: '#000', width: 3 }),
    rotation: -(Number(rot) || 0) * Math.PI / 180,   // CAD 반시계 -> OL 시계(부호 반전)
    rotateWithView: true, overflow: true })}));
  _ensureTextLabelLyr().getSource().addFeature(f);
  textLabelsV.push({ name: String(text == null ? '' : text), rot: Number(rot) || 0, color: col, coord });
}
function clearTextLabelsV() {
  if (textLabelLyr) textLabelLyr.getSource().clear();
  textLabelsV = [];
}

/* ════════════════════════════════
   트랙/라벨 → KML 직렬화 (내보내기/자동저장 공용, Vmap.html 대응)
   묶음선은 MultiGeometry 한 개로, 색·굵기는 공유 <Style id="ln_RRGGBB_W">로.
════════════════════════════════ */
function _lineKmlPlacemarkV(lyr, styles) {
  const segs = [];
  for (const cs of coordParts(lyr)) {
    if (!cs || cs.length < 2) continue;
    const coords = cs.map(c => { const ll = fromMerc(c); return `${ll[0]},${ll[1]},0`; }).join(' ');
    segs.push(`<LineString><coordinates>${coords}</coordinates></LineString>`);
  }
  if (!segs.length) return '';
  let su = '';
  if (styles) {
    const hex = ((lyr._color || '#FF0000') + '').replace('#','');
    const w = lyr._width || 3;
    const key = hex + '_' + w;
    if (!styles.has(key)) styles.set(key, 'ln_' + key);
    su = `<styleUrl>#${styles.get(key)}</styleUrl>`;
  }
  const geom = segs.length === 1 ? segs[0] : `<MultiGeometry>${segs.join('')}</MultiGeometry>`;
  return `\n<Placemark><name>${esc(lyr._name || '선')}</name>${su}${geom}</Placemark>`;
}
// styles(Map: 'RRGGBB_w' -> id) -> KML <Style> 정의 (KML 색은 aabbggrr)
function _lineKmlStyleDefsV(styles) {
  let out = '';
  for (const [key, id] of styles) {
    const [hex, w] = key.split('_');
    out += `\n<Style id="${id}"><LineStyle><color>ff${hex.slice(4,6)}${hex.slice(2,4)}${hex.slice(0,2)}</color><width>${w}</width></LineStyle></Style>`;
  }
  return out;
}
// 텍스트 라벨 → KML Placemark (kind=text — 자동저장/내보내기 복원용)
function _textKmlPlacemarkV(t) {
  const ll = fromMerc(t.coord);
  return `\n<Placemark><name>${esc(t.name)}</name><ExtendedData><Data name="kind"><value>text</value></Data><Data name="rot"><value>${t.rot}</value></Data><Data name="color"><value>${t.color}</value></Data></ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>`;
}

/* ════════════════════════════════
   가이드선 & 거리
════════════════════════════════ */
function updateGuide(from, to) {
  if (guideLine) { removeLyr(guideLine); guideLine = null; }
  // 점선 가이드
  const src = new ol.source.Vector();
  const f = new ol.Feature(new ol.geom.LineString([from, to]));
  f.setStyle(new ol.style.Style({
    stroke: new ol.style.Stroke({ color: '#db4040', width: 2, lineDash: [6, 6] })
  }));
  src.addFeature(f);
  guideLine = new ol.layer.Vector({ source: src, zIndex: 200 });
  addLyr(guideLine);
  const all = [...drawCoords, to];
  let dist = 0;
  for (let i = 1; i < all.length; i++) dist += haversine(all[i-1], all[i]);
  const fmt = d => d < 1000 ? `${d.toFixed(1)}m` : `${(d/1000).toFixed(2)}km`;
  if (!distEl) { distEl = document.createElement('div'); distEl.className = 'dist-tip'; }
  distEl.textContent = `총거리 ${fmt(dist)}`;
  if (!distOv) { distOv = new ol.Overlay({ element: distEl, offset: [8, -18], positioning: 'bottom-left' }); vmap.addOverlay(distOv); }
  distOv.setPosition(to);
}
// 가이드선(점선)만 제거 - 마우스 이동 중 호출
function clearGuide() {
  if (guideLine) { removeLyr(guideLine); guideLine = null; }
}
// 선그리기 종료 시 거리표시까지 모두 제거
function clearAllGuide() {
  if (guideLine) { removeLyr(guideLine); guideLine = null; }
  if (distOv) { vmap.removeOverlay(distOv); distOv = null; } distEl = null;
}
function haversine(c1, c2) {
  const [lo1,la1] = fromMerc(c1), [lo2,la2] = fromMerc(c2);
  const R=6371000, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ════════════════════════════════
   선 근처 탐색
════════════════════════════════ */
function findNearPoly(pixel, thr) {
  let near = null, minD = Infinity;
  polylines.forEach(lyr => {
    // 묶음선(멀티피처)도 모든 피처를 히트테스트 (Vmap.html coordParts 방식)
    for (const cs of coordParts(lyr)) {
      for (let i = 0; i < cs.length - 1; i++) {
        const a = vmap.getPixelFromCoordinate(cs[i]);
        const b = vmap.getPixelFromCoordinate(cs[i+1]);
        if (!a || !b) continue;
        const d = ptSegDist(pixel, a, b);
        if (d < minD) { minD = d; near = lyr; }
      }
    }
  });
  return minD <= thr ? near : null;
}
function ptSegDist(p, a, b) {
  const dx=b[0]-a[0], dy=b[1]-a[1];
  if (!dx&&!dy) return Math.hypot(p[0]-a[0],p[1]-a[1]);
  const t=Math.max(0,Math.min(1,((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy)));
  return Math.hypot(p[0]-(a[0]+t*dx),p[1]-(a[1]+t*dy));
}

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    window[cb] = d => { delete window[cb]; s.remove(); resolve(d); };
    const s = document.createElement('script');
    s.src = url + '&callback=' + cb;
    s.onerror = reject;
    document.head.appendChild(s);
    setTimeout(() => { delete window[cb]; try { s.remove(); } catch(_) {} reject(new Error('JSONP timeout')); }, 10000);
  });
}
async function reverseGeocode(lng, lat, cb) {
  const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0` +
    `&crs=epsg:4326&point=${lng},${lat}&type=both&format=json&key=${VWORLD_KEY}`;
  try {
    const d = await jsonp(url);
    if (d?.response?.status === 'OK' && d.response.result?.length) {
      const res = d.response.result;
      let parcel = '', road = '';
      for (const r of res) {
        if (r.type === 'parcel') parcel = r.text || '';
        else if (r.type === 'road') road = r.text || '';
      }
      if (!parcel && !road) { parcel = res[0]?.text||''; road = res[1]?.text||''; }
      if (road) {
        road = road.replace(/\s*\([^)]*\)/g, '').trim();
        const parts = road.split(' ');
        if (parts.length > 1) road = parts.slice(1).join(' ');
      }
      cb((parcel && road) ? `${parcel} / ${road}` : (parcel || road || '주소 없음'));
      return;
    }
  } catch(e) {}
  cb('주소 없음');
}

}

/* 기기 나침반 리스너 설정 */
function setupDeviceOrientation() {
  const addListeners = () => {
    // Android: deviceorientationabsolute (절대 방위각)
    window.addEventListener('deviceorientationabsolute', e => {
      if (e.alpha != null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
    // iOS: webkitCompassHeading, Android 폴백: deviceorientation
    window.addEventListener('deviceorientation', e => {
      if (e.webkitCompassHeading != null) deviceHeading = e.webkitCompassHeading;
      else if (e.absolute && e.alpha != null) deviceHeading = (360 - e.alpha) % 360;
    }, true);
  };
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    // iOS 13+: 권한 요청
    DeviceOrientationEvent.requestPermission()
      .then(s => { if (s === 'granted') addListeners(); })
      .catch(() => addListeners());
  } else {
    addListeners();
  }
}

// ── 내 위치 버튼 (3단계) ──────────────────────────────
// 0=끄기(흰색) → 2=위치따라가기(파란색) → 1=내위치만표시(하늘색) → 0=끄기
document.getElementById('myLocationBtn').onclick = () => {
  const nextMode = [2, 0, 1]; // 0→2→1→0 순환
  locationMode = nextMode[locationMode];
  applyLocationMode();
};

function applyLocationMode() {
  const btn = document.getElementById('myLocationBtn');
  btn.classList.remove('loc-show', 'loc-follow');

  if (locationMode === 0) {
    if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
    if (locationLyr) { removeLyr(locationLyr); locationLyr = null; locationFeat = null; }
    if (headingInterval) { clearInterval(headingInterval); headingInterval = null; }
  } else if (locationMode === 1) {
    btn.classList.add('loc-show');
    startLocationWatchIfNeeded();
  } else if (locationMode === 2) {
    btn.classList.add('loc-follow');
    startLocationWatchIfNeeded();
    if (locationFeat) vmap.getView().setCenter(locationFeat.getGeometry().getCoordinates());
  }
}

function startLocationWatchIfNeeded() {
  if (watchId !== null) return;
  setupDeviceOrientation();
  headingInterval = setInterval(() => {
    if (locationFeat && deviceHeading !== null) {
      locationFeat.setStyle(makeLocationStyle(deviceHeading));
    }
  }, 500);
  watchId = navigator.geolocation.watchPosition(pos => {
    const c = toMerc(pos.coords.longitude, pos.coords.latitude);
    // 나침반(바라보는 방향) 우선. GPS heading은 정지 중 무작위로 튀므로 나침반 없을 때만 폴백.
    const h = (deviceHeading !== null)
      ? deviceHeading
      : ((pos.coords.heading != null && !isNaN(pos.coords.heading) && pos.coords.heading >= 0) ? pos.coords.heading : null);
    if (!locationFeat) {
      locationFeat = new ol.Feature({ geometry: new ol.geom.Point(c) });
      locationFeat.setStyle(makeLocationStyle(h));
      locationLyr = new ol.layer.Vector({ source: new ol.source.Vector({ features: [locationFeat] }), zIndex: 200 });
      addLyr(locationLyr);
    } else {
      locationFeat.getGeometry().setCoordinates(c);
      locationFeat.setStyle(makeLocationStyle(h));
    }
    if (locationMode === 2) vmap.getView().setCenter(c); // 따라가기 모드에서만 중심 이동
  }, () => {
    alert('위치 정보를 가져올 수 없습니다.');
    locationMode = 0;
    applyLocationMode();
  }, { enableHighAccuracy: true, maximumAge: 3000 });
}

async function loadImage(file, getNG, setNG) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = async ev => {
      let src = ev.target.result, name = file.name.replace(/\.[^/.]+$/, '');
      const meta = readPhotoMeta(src);
      let ll = (meta.lat != null) ? [meta.lng, meta.lat] : null;

      // 방금 촬영한 사진 판별: GPS 없음 + 파일 시각이 1분 이내.
      // (📂 → 카메라 촬영은 브라우저가 GPS 를 안 넣고 임시파일이라 갤러리에도 안 남음)
      const justCaptured = !ll && (Date.now() - file.lastModified < 60000);
      if (justCaptured) {
        // 현재 위치(실패 시 지도 중심) + 촬영일시를 EXIF 에 기록하고 기기에 저장 (카메라앱처럼)
        const pos = await new Promise(res => navigator.geolocation
          ? navigator.geolocation.getCurrentPosition(p => res(p), () => res(null), { enableHighAccuracy: true, timeout: 5000 })
          : res(null));
        let lat, lng;
        if (pos) { lat = pos.coords.latitude; lng = pos.coords.longitude; }
        else { const c = fromMerc(vmap.getView().getCenter()); lng = c[0]; lat = c[1]; }
        const taken = meta.taken || exifNow(new Date(file.lastModified));
        name = 'IMG_' + taken.replace(/[: ]/g, '');
        src = writePhotoMeta(src, { lat, lng, taken });
        downloadPhoto(src, name);   // 다운로드 폴더에 저장 → 갤러리에서 보임
        meta.taken = taken;
        ll = [lng, lat];
      }

      // 원본(전체 EXIF) 보관 — 메타 수정·사진저장은 이 원본 기준 (압축본은 EXIF 유실 가능)
      const keepOrig = obj => {
        obj.taken = meta.taken || ''; obj.desc = meta.desc || '';
        obj.origKey = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        saveOrig(obj.origKey, src);
      };
      if (ll) {
        const c = toMerc(ll[0], ll[1]);
        keepOrig(addPhotoMarker(c, src, name));
        document.getElementById('saveBtn').disabled = false;
        resolve(c);
      } else {
        if (getNG() === null) setNG(confirm(`"${file.name}" 위치 정보 없음.\n지도 중심에 추가할까요?`));
        if (getNG()) {
          keepOrig(addPhotoMarker(vmap.getView().getCenter(), src, name));
          document.getElementById('saveBtn').disabled = false;
        }
        resolve(null);
      }
    };
    r.readAsDataURL(file);
  });
}

/* ════════════════════════════════
   KMZ 불러오기
════════════════════════════════ */
async function loadKMZ(file, silent = false) {
  if (silent) showLoading('이전 데이터 복원 중...');
  else showLoading('KMZ 불러오는 중...');

  if (silent) {
    closeAllPopups();
    markers.forEach(m => removeLyr(m.lyr)); markers = [];
    polylines.forEach(l => removeLyr(l)); polylines = [];
    clearTextLabelsV();
    document.getElementById('saveBtn').disabled = true;
  }

  try {
    // KMZ(zip)는 'PK'(0x50 0x4B)로 시작. 평문 .kml 은 zip 이 아니므로 헤더로 판별. (Vmap.html 이식)
    let zip = null, keys = [], kmlText = null;
    const head = new Uint8Array(await file.slice(0, 2).arrayBuffer());
    const isZip = head[0] === 0x50 && head[1] === 0x4B;
    if (isZip) {
      zip = await JSZip.loadAsync(file);
      keys = Object.keys(zip.files);
      for (const k of keys) {
        if (/\.kml$/i.test(k.replace(/\0/g, ''))) {
          try { const t = await zip.files[k].async('string'); if (t && t.length > 0) { kmlText = t; break; } } catch(e) {}
        }
      }
      if (!kmlText) { alert('KMZ 안에 .kml 파일이 없습니다.'); hideLoading(); return; }
    } else if (/\.kml$/i.test(file.name)) {
      kmlText = await file.text();   // 평문 KML (내부 임베드 사진 없음 — 마커/트랙만)
    } else {
      alert('KMZ / ZIP / KML 파일만 불러올 수 있습니다.'); hideLoading(); return;
    }

    showLoading('데이터 읽는 중...');
    const xml = new DOMParser().parseFromString(kmlText, 'application/xml');
    const pts = [];

    // KML 스타일 맵 (styleUrl -> 색·굵기). KML 색은 aabbggrr 순서. (Vmap.html 이식)
    const styleColors = {}, styleWidths = {};
    const kmlC2Hex = c => { c = (c||'').trim(); if (c.length < 8) return null; return '#' + c.slice(6,8) + c.slice(4,6) + c.slice(2,4); };
    for (const st of Array.from(xml.getElementsByTagName('Style'))) {
      const id = st.getAttribute('id'); if (!id) continue;
      const cs = (st.getElementsByTagName('LineStyle')[0] || st.getElementsByTagName('PolyStyle')[0]);
      const h = kmlC2Hex(cs?.getElementsByTagName('color')[0]?.textContent);
      if (h) styleColors['#'+id] = h;
      const w = parseFloat(cs?.getElementsByTagName('width')[0]?.textContent);
      if (!isNaN(w)) styleWidths['#'+id] = w;
    }
    const parseCoords = raw => raw.trim().split(/\s+/).map(c => {
      const p = c.split(','); const lo = parseFloat(p[0]), la = parseFloat(p[1]);
      return (!isNaN(lo)&&!isNaN(la)&&Math.abs(lo)<=180&&Math.abs(la)<=90) ? toMerc(lo,la) : null;
    }).filter(Boolean);

    for (const pm of Array.from(xml.getElementsByTagName('Placemark'))) {
      const name = pm.getElementsByTagName('name')[0]?.textContent?.trim() || pm.getElementsByTagName('n')[0]?.textContent?.trim() || '설명 없음';
      const pt = pm.getElementsByTagName('Point')[0];

      // ── CAD 문자(kind=text): 마커 대신 회전 텍스트 라벨만 ──
      if (pt) {
        let _kind = '';
        for (const d of Array.from(pm.getElementsByTagName('Data'))) {
          if (d.getAttribute('name') === 'kind') { _kind = (d.getElementsByTagName('value')[0]?.textContent || '').trim(); break; }
        }
        if (_kind === 'text') {
          const raw = pt.getElementsByTagName('coordinates')[0]?.textContent || '';
          const p = raw.trim().split(','); const lo = parseFloat(p[0]), la = parseFloat(p[1]);
          if (!isNaN(lo) && !isNaN(la) && Math.abs(lo) <= 180 && Math.abs(la) <= 90) {
            let _rot = 0, _col = '';
            for (const d of Array.from(pm.getElementsByTagName('Data'))) {
              const nm = d.getAttribute('name'); const v = d.getElementsByTagName('value')[0]?.textContent || '';
              if (nm === 'rot') _rot = parseFloat(v) || 0; else if (nm === 'color') _col = v.trim();
            }
            const c = toMerc(lo, la); pts.push(c);
            addTextLabelV(c, name, _rot, _col);
          }
          continue;
        }
      }

      // ── 선/폴리곤 도형 전부 수집 (MultiGeometry 안의 모든 LineString + Polygon 링) ──
      const coordArrays = [];
      for (const lsEl of Array.from(pm.getElementsByTagName('LineString'))) {
        const cs = parseCoords(lsEl.getElementsByTagName('coordinates')[0]?.textContent || '');
        if (cs.length >= 2) coordArrays.push(cs);
      }
      for (const pgEl of Array.from(pm.getElementsByTagName('Polygon'))) {
        for (const lr of Array.from(pgEl.getElementsByTagName('LinearRing'))) {
          const cs = parseCoords(lr.getElementsByTagName('coordinates')[0]?.textContent || '');
          if (cs.length >= 2) coordArrays.push(cs);
        }
      }

      if (coordArrays.length) {
        const su = pm.getElementsByTagName('styleUrl')[0]?.textContent?.trim();
        const color = (su && styleColors[su]) || randColor();
        const sw = (su && styleWidths[su] != null) ? Math.max(1, styleWidths[su]) : 4; // KMZ 굵기(없으면 4)
        // Placemark 하나(MultiGeometry 포함)의 모든 선을 레이어 1개에 — 수천 선 KMZ 경량화
        const lyr = mkMultiLineLyr(coordArrays, color, sw);
        lyr._name = name; addLyr(lyr); polylines.push(lyr);
        for (const cs of coordArrays) pts.push(...cs);
        continue;
      }

      // ── 점(사진/마커) ──
      if (pt) {
        let pf = '';
        for (const d of Array.from(pm.getElementsByTagName('Data'))) {
          if (d.getAttribute('name') === 'photoFile') { pf = d.getElementsByTagName('value')[0]?.textContent||''; break; }
        }
        if (!pf) {
          const desc = pm.getElementsByTagName('description')[0]?.textContent||'';
          const mImg = desc.match(/src=["']([^"']+\.(jpe?g|png))["']/i);
          if (mImg) {
            const thumbPath = mImg[1].trim(), rollPath = thumbPath.replace('_thumb.','_roll.');
            const rollEntry = keys.find(z => { const c = z.replace(/\0/g,''); return c===rollPath||c.endsWith('/'+rollPath.split('/').pop()); });
            pf = rollEntry ? rollPath : thumbPath;
          }
        }
        const raw = pt.getElementsByTagName('coordinates')[0]?.textContent||'';
        const p = raw.trim().split(','); const lo = parseFloat(p[0]), la = parseFloat(p[1]);
        if (isNaN(lo)||isNaN(la)||Math.abs(lo)>180||Math.abs(la)>90) continue;
        const c = toMerc(lo, la); pts.push(c);
        if (pf && zip) {
          const base = pf.split('/').pop(); let zipF = null;
          for (const k of keys) {
            const ck = k.replace(/\0/g,'');
            if (ck===pf||ck===`files/${pf}`||ck===`images/${base}`||ck.endsWith('/'+base)||ck===base) { zipF = zip.files[k]; break; }
          }
          if (zipF) {
            const b64 = await zipF.async('base64');
            const mime = base.toLowerCase().endsWith('.png') ? 'image/png' : 'image/jpeg';
            const obj = addPhotoMarker(c, `data:${mime};base64,${b64}`, name);
            // 저장된 사진 메타(설명/촬영일시) 복원
            for (const d of Array.from(pm.getElementsByTagName('Data'))) {
              const nm = d.getAttribute('name'); const v = d.getElementsByTagName('value')[0]?.textContent || '';
              if (nm === 'desc') obj.desc = v; else if (nm === 'taken') obj.taken = v;
              else if (nm === 'orig') obj.origKey = v;   // 원본 보관소 키 (이 기기 DB에 있을 때만 유효)
            }
          } else addMarker(c, name);
        } else addMarker(c, name);
      }
    }
    fitPts(pts);
    if (pts.length > 0 || markers.length > 0 || polylines.length > 0)
      document.getElementById('saveBtn').disabled = false;
    hideLoading();
  } catch(err) { hideLoading(); alert('KMZ 오류: ' + err.message); }
}

    bg.innerHTML =
      '<div style="background:white;border-radius:14px;padding:20px;width:270px;box-shadow:0 4px 24px rgba(0,0,0,0.25);">' +
      '<h3 style="margin:0 0 14px;font-size:15px;color:#333;text-align:center;">저장 범위 선택</h3>' +

      `<button data-scope="all" style="${btnCss}background:#00897b;color:white;">🌍 전체영역<br><span style="font-size:11px;font-weight:400;">모든 객체</span></button>` +
      `<button data-scope="" style="${btnCss}background:#f1f3f4;color:#555;margin-bottom:0;">취소</button>` +
      '</div>';
    bg.addEventListener('click', e => {
      const b = e.target.closest('button');

}

async function getAddrPrefix() {
  try {
    const center = vmap.getView().getCenter();
    const ll = fromMerc(center);
    const url = `https://api.vworld.kr/req/address?service=address&request=getAddress&version=2.0` +
      `&crs=epsg:4326&point=${ll[0]},${ll[1]}&type=parcel&format=json&key=${VWORLD_KEY}`;
    const d = await jsonp(url);
    if (d?.response?.status !== 'OK') return '';
    const text = d.response.result?.[0]?.text || '';
    const parts = text.split(' ').filter(p => !/^\d/.test(p));
    const eupMyeon = parts.find(p => /[읍면]$/.test(p))||'';
    const ri = parts.find(p => /리$/.test(p))||'';
    const gu = parts.find(p => /구$/.test(p))||'';
    const dong = [...parts].reverse().find(p => /동(\d+가)?$/.test(p))||'';
    if (eupMyeon && ri) return `${eupMyeon.replace(/[읍면]$/,'')}${ri}_`;
    if (eupMyeon) return `${eupMyeon}_`;
    if (gu && dong) return `${gu.replace(/구$/,'')}${dong}_`;
    if (gu) return `${gu.replace(/구$/,'')}_`;
    if (dong) return `${dong}_`;
    return '';
  } catch(e) { return ''; }
}

async function exportKMZ(scope = 'all') {
  // 저장 범위: 'view'=현재 화면에 보이는 객체만, 'all'=전체 객체
  const extent = scope === 'view' ? vmap.getView().calculateExtent(vmap.getSize()) : null;
  const inView = c => !extent || ol.extent.containsCoordinate(extent, c);
  const expMarkers = markers.filter(m => inView(m.feat.getGeometry().getCoordinates()));
  // 묶음선(멀티피처)은 어느 피처든 화면에 걸치면 포함 (coordParts — 첫 피처만 보면 유실)
  const expPolylines = polylines.filter(lyr => !extent || coordParts(lyr).some(cs => cs.some(inView)));
  const expLabels = textLabelsV.filter(t => inView(t.coord));
  if (expMarkers.length === 0 && expPolylines.length === 0 && expLabels.length === 0) {
    alert(scope === 'view' ? '현재 화면에 보이는 객체가 없습니다.' : '저장할 객체가 없습니다.');
    return;
  }

  const now = new Date();
  const dateStr = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}`;
  const prefix = await getAddrPrefix();
  const last = ([...expMarkers].reverse().find(m => !m.isPhoto) || expMarkers.at(-1))?.name || '';
  const cleanLast = last.replace(/_\d{8}.*$/, '').replace(/[\\/:*?"<>|]/g, '').trim();
  const defaultName = cleanLast ? `${prefix}${dateStr}_${cleanLast}` : `${prefix}${dateStr}_`;

  const userInput = prompt('저장할 파일 이름을 입력하세요 (확장자 제외):', defaultName);
  if (userInput === null) return;
  const fileName = (userInput.trim() || defaultName) + '.kmz';

  showLoading('KMZ 저장 중...');
  try {
    const zip = new JSZip();
    const ff = zip.folder('files');
    let kml = `<?xml version="1.0" encoding="UTF-8"?>\n<kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>${esc(fileName)}</name>\n`;
    const usedFn = new Set();

    const styles = new Map();
    let lineKml = '';
    for (const lyr of expPolylines) lineKml += _lineKmlPlacemarkV(lyr, styles);
    for (const t of expLabels) lineKml += _textKmlPlacemarkV(t);
    kml += _lineKmlStyleDefsV(styles) + lineKml + '\n';
    for (const m of expMarkers) {
      const ll = fromMerc(m.feat.getGeometry().getCoordinates());
      const sn = esc(m.name);
      if (m.isPhoto && m.imgSrc) {
        const c = await compressImage(m.imgSrc);
        let base = (m.name||'photo').replace(/[\/\\:*?"<>|]/g,'_').replace(/\.jpg$/i,'');
        let fn = base + '.jpg'; let sx = 1;
        while (usedFn.has(fn)) { fn = `${base}_${sx++}.jpg`; }
        usedFn.add(fn);
        ff.file(fn, c.split(',')[1], { base64: true });
        kml += `<Placemark><name>${sn}</name><description><![CDATA[<img src="files/${fn}" style="max-width:400px">]]></description><ExtendedData><Data name="photoFile"><value>${fn}</value></Data>${_photoMetaXmlV(m)}</ExtendedData><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
      } else {
        kml += `<Placemark><name>${sn}</name><Point><coordinates>${ll[0]},${ll[1]},0</coordinates></Point></Placemark>\n`;
      }
    }
    kml += '</Document></kml>';
    zip.file('doc.kml', kml);

    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', mimeType: 'application/vnd.google-earth.kmz' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fileName;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(a.href), 10000);
    hideLoading();
  } catch(err) { hideLoading(); alert('KMZ 저장 중 오류: ' + err.message); }
}
